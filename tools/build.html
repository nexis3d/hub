<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nexis Games</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: #030008; color: #e2e8f0; font-family: 'Fira Sans', system-ui, sans-serif; }
  body { display: flex; align-items: center; justify-content: center; padding: 24px; }
  .card { width: min(960px, 100%); background: rgba(10,10,15,0.7); border: 1px solid rgba(168,85,247,0.25); border-radius: 22px; padding: 28px; backdrop-filter: blur(12px); box-shadow: 0 20px 60px -20px rgba(0,0,0,0.7); }
  h1 { margin: 0 0 6px; background: linear-gradient(135deg, #c084fc, #c026d3); -webkit-background-clip: text; background-clip: text; color: transparent; letter-spacing: -0.02em; }
  p.lead { margin: 0 0 22px; color: #94a3b8; font-size: 14px; }
  label { display: block; font-size: 11px; letter-spacing: 0.25em; text-transform: uppercase; color: #c084fc; margin: 16px 0 6px; }
  textarea { width: 100%; height: 280px; background: #0a0a0f; border: 1px solid rgba(168,85,247,0.15); color: #cbd5e1; font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 12px; padding: 12px; border-radius: 12px; resize: vertical; outline: none; }
  textarea:focus { border-color: rgba(168,85,247,0.6); box-shadow: 0 0 0 3px rgba(168,85,247,0.15); }
  .row { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 18px; }
  button { padding: 12px 22px; border-radius: 12px; font-weight: 800; font-size: 13px; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); transition: transform 0.1s, background 0.15s; }
  .primary { background: linear-gradient(135deg, #7c3aed, #c026d3); color: #ede9fe; }
  .primary:hover { transform: translateY(-1px); }
  .ghost { background: rgba(168,85,247,0.08); color: #c084fc; border-color: rgba(168,85,247,0.35); }
  .ghost:hover { background: rgba(168,85,247,0.16); }
  .stat { margin-top: 12px; font-size: 12px; color: #64748b; letter-spacing: 0.1em; }
</style>
</head>
<body>
<div class="card">
  <h1>Bundle Encryptor</h1>
  <p class="lead">Paste the contents of <code>/src/core.js</code> below, click <b>Encrypt</b>, then download the resulting <code>core.dat</code> and drop it into <code>/app/</code>.</p>

  <label for="src">core.js (plaintext source)</label>
  <textarea id="src" placeholder="// paste the full contents of src/core.js here"></textarea>

  <div class="row">
    <button class="primary" id="goBtn">Encrypt → core.dat</button>
    <button class="ghost"   id="copyBtn">Copy result</button>
    <button class="ghost"   id="dlBtn">Download core.dat</button>
  </div>

  <div class="stat" id="stat">Awaiting source…</div>

  <label for="out">Encrypted bundle (preview)</label>
  <textarea id="out" readonly placeholder="output will appear here"></textarea>
</div>

<script>
  // Must stay in sync with app/loader.js and tools/build.py
  const KEY = "N3xis-G@meS-2026-NexisGD-x7k9P";

  function stripComments(src) {
    return src.split("\n").filter(l => !l.trimStart().startsWith("//")).join("\n").replace(/\n\s*\n+/g, "\n");
  }
  function xorEncode(str, key) {
    const enc = new TextEncoder();
    const tb = enc.encode(str), kb = enc.encode(key);
    const out = new Uint8Array(tb.length);
    for (let i = 0; i < tb.length; i++) out[i] = tb[i] ^ kb[i % kb.length];
    return out;
  }
  function bytesToBase64(bytes) {
    let s = "";
    for (let i = 0; i < bytes.length; i++) s += String.fromCharCode(bytes[i]);
    return btoa(s);
  }
  function chunk(b64, n) {
    const parts = [];
    for (let i = 0; i < b64.length; i += n) parts.push(b64.slice(i, i + n));
    return parts.join("\n");
  }

  let lastOutput = "";

  function build() {
    const src = document.getElementById("src").value;
    if (!src.trim()) { alert("Paste your core.js content first."); return; }
    const minified = stripComments(src.replace(/^\s*\/\*[\s\S]*?\*\/\s*/, ""));
    const bytes = xorEncode(minified, KEY);
    const b64 = bytesToBase64(bytes);
    const armoured =
      "# NEXIS-GAMES-BUNDLE v1 // Encrypted Application Core\n" +
      "# Do NOT edit this file. Edit /src/core.js and run tools/build.\n" +
      "# Contents below are XOR-encrypted, base64-armoured.\n" +
      "---BEGIN-NEXIS-CORE---\n" + chunk(b64, 80) + "\n---END-NEXIS-CORE---\n";
    lastOutput = armoured;
    document.getElementById("out").value = armoured;
    document.getElementById("stat").textContent =
      "OK — source: " + src.length.toLocaleString() + " chars · bundle: " + b64.length.toLocaleString() + " chars base64";
  }

  function download() {
    if (!lastOutput) { alert("Click Encrypt first."); return; }
    const blob = new Blob([lastOutput], { type: "text/plain" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "core.dat";
    document.body.appendChild(a); a.click(); a.remove();
  }

  document.getElementById("goBtn").addEventListener("click", build);
  document.getElementById("dlBtn").addEventListener("click", download);
  document.getElementById("copyBtn").addEventListener("click", () => {
    if (!lastOutput) return alert("Click Encrypt first.");
    navigator.clipboard.writeText(lastOutput).then(() => alert("Copied!"));
  });
</script>
</body>
</html>
