<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Nexis Games</title>
  <meta name="description" content="The page you tried to reach doesn't exist on Nexis Games.">
  <meta name="theme-color" content="#030008">
  <meta name="robots" content="noindex,follow">
  <link rel="icon" href="https://nexisgd.com/assets/fav.ico" />
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@500;700;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: 'Fira Sans', system-ui, sans-serif;
      color: #cbd5e1;
      background: #030008;
      overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }
    .bg {
      position: absolute; inset: 0; pointer-events: none;
      background:
        radial-gradient(60% 60% at 20% 20%, rgba(168,85,247,0.18) 0%, transparent 70%),
        radial-gradient(50% 50% at 85% 80%, rgba(192,38,211,0.18) 0%, transparent 70%),
        radial-gradient(circle at center, #1e1b4b 0%, #030008 65%);
    }
    .grain {
      position: absolute; inset: 0; pointer-events: none; opacity: 0.06;
      background-image:
        repeating-linear-gradient(0deg, rgba(255,255,255,0.6) 0 1px, transparent 1px 3px),
        repeating-linear-gradient(90deg, rgba(255,255,255,0.6) 0 1px, transparent 1px 3px);
      mix-blend-mode: overlay;
    }
    .card {
      position: relative; z-index: 1;
      max-width: 620px; padding: 56px 40px;
      text-align: left;
      border: 1px solid rgba(168,85,247,0.18);
      border-radius: 28px;
      background: rgba(10,10,15,0.55);
      backdrop-filter: blur(18px);
      box-shadow: 0 30px 60px -10px rgba(0,0,0,0.6), 0 0 60px -10px rgba(168,85,247,0.25);
    }
    .badge {
      display: inline-block;
      font-size: 11px; font-weight: 900; letter-spacing: 0.35em; text-transform: uppercase;
      color: #c084fc; background: rgba(168,85,247,0.12);
      border: 1px solid rgba(168,85,247,0.35);
      padding: 8px 14px; border-radius: 8px;
    }
    h1 {
      font-size: clamp(72px, 14vw, 132px);
      font-weight: 900;
      margin: 18px 0 4px;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, #ffffff 0%, #c084fc 50%, #c026d3 100%);
      -webkit-background-clip: text; background-clip: text; color: transparent;
      line-height: 0.95;
    }
    h2 {
      font-size: 22px; font-weight: 700; margin: 8px 0 18px;
      color: #e2e8f0;
    }
    p { font-size: 15px; line-height: 1.6; color: #94a3b8; margin: 0 0 28px; }
    .actions { display: flex; gap: 12px; flex-wrap: wrap; }
    a.btn {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 14px 22px; border-radius: 14px;
      font-weight: 800; font-size: 14px; letter-spacing: 0.08em; text-transform: uppercase;
      text-decoration: none;
      transition: transform 0.15s ease, box-shadow 0.2s ease, background 0.2s ease;
    }
    a.btn-primary {
      color: #ede9fe;
      background: linear-gradient(135deg, #7c3aed, #c026d3);
      box-shadow: 0 10px 30px -10px rgba(139,92,246,0.7);
      border: 1px solid rgba(255,255,255,0.12);
    }
    a.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 14px 36px -8px rgba(139,92,246,0.9); }
    a.btn-ghost {
      color: #c084fc; background: rgba(168,85,247,0.06);
      border: 1px solid rgba(168,85,247,0.25);
    }
    a.btn-ghost:hover { background: rgba(168,85,247,0.14); }
    footer {
      position: absolute; bottom: 22px; left: 0; right: 0;
      text-align: center; font-size: 11px; letter-spacing: 0.25em; text-transform: uppercase;
      color: #475569;
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="grain"></div>
  <div class="card">
    <span class="badge">Error 404</span>
    <h1>404</h1>
    <h2>You've wandered off the map.</h2>
    <p>The page you're looking for doesn't exist, has been moved, or maybe never existed in this dimension. Let's get you back to the games.</p>
    <div class="actions">
      <a class="btn btn-primary" href="/">Back to Home</a>
      <a class="btn btn-ghost" href="/#/games">Browse Games</a>
    </div>
  </div>
  <footer>nexis<span style="color:#c084fc;">gd</span>.com &nbsp;·&nbsp; Nexis Games</footer>
</body>
</html>
