        title: 'Shaddo Craft',
        developer: 'shaddo24mc',
        description: 'Explore a custom 3D web experience! Jump into this immersive world directly from your browser.',
        src: 'https://shaddo24mc.github.io/3d/',
        icon: ShaddoCraftIcon,
        theme: 'from-emerald-700 to-green-900',
        tags: ['3D', 'Adventure', 'Web'],
        isLocal: false,
      }
    ];

    // --- MAIN APPLICATION --- //
    function App() {
      const [activeView, setActiveView] = useState('discover'); 
      const [activeGame, setActiveGame] = useState(null);
      const [searchQuery, setSearchQuery] = useState('');
      const [iframeLoading, setIframeLoading] = useState(true);
      const [adCountdown, setAdCountdown] = useState(0);
      const [isCssFullscreen, setIsCssFullscreen] = useState(false);
      const [isSidebarOpen, setIsSidebarOpen] = useState(false); 
      const playerContainerRef = useRef(null);

      // Auth & User State
      const [user, setUser] = useState(null);
      const isRegistered = user && !user.isAnonymous;
      const [showAuthModal, setShowAuthModal] = useState(false);
      const [authMode, setAuthMode] = useState('login');
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [username, setUsername] = useState('');
      const [authError, setAuthError] = useState('');
      const [authLoading, setAuthLoading] = useState(false);

      // Profile State
      const [profileUsername, setProfileUsername] = useState('');
      const [profilePhotoUrl, setProfilePhotoUrl] = useState('');
      const [isUpdatingProfile, setIsUpdatingProfile] = useState(false);
      const [profileUpdateSuccess, setProfileUpdateSuccess] = useState(false);
      const [profileUpdateError, setProfileUpdateError] = useState('');
      
      // Leaderboard State
      const [currentUserStreak, setCurrentUserStreak] = useState(0);
      const [leaderboard, setLeaderboard] = useState([]);
      const [leaderboardError, setLeaderboardError] = useState('');

      // Settings State
      const [showSettingsModal, setShowSettingsModal] = useState(false);
      const [masterVolume, setMasterVolume] = useState(100);
      const [musicVolume, setMusicVolume] = useState(80);
      const [sfxVolume, setSfxVolume] = useState(100);

      // Auth Initialization
      useEffect(() => {
        const initAuth = async () => {
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              try {
                await signInWithCustomToken(auth, __initial_auth_token);
                return; 
              } catch (tokenError) {
                console.warn("Custom token failed. Trying anonymous sign-in...");
              }
            }
            try {
              await signInAnonymously(auth);
            } catch (anonError) {
              console.info("Anonymous sign-in disabled.");
            }
          } catch (e) {
            console.warn("Auth init note:", e.message);
          }
        };
        initAuth();

        const unsubscribe = onAuthStateChanged(auth, currentUser => {
          setUser(currentUser);
          if (currentUser && !currentUser.isAnonymous) {
            setProfileUsername(currentUser.displayName || '');
            setProfilePhotoUrl(currentUser.photoURL || '');
          }
        });
        return () => unsubscribe();
      }, []);

      // Daily Streak Tracker
      useEffect(() => {
        const updateStreak = async () => {
          if (!user || user.isAnonymous || !db) return;

          const userRef = doc(db, 'artifacts', APP_ID, 'public', 'data', 'users', user.uid);
          try {
            const snap = await getDoc(userRef);
            const today = new Date().toISOString().split('T')[0];
            let newStreak = 1;
            
            if (snap.exists()) {
               const data = snap.data();
               if (data.lastPlayedDate === today) {
                  newStreak = data.currentStreak || 1; 
               } else {
                  const yesterday = new Date();
                  yesterday.setDate(yesterday.getDate() - 1);
                  const yesterdayStr = yesterday.toISOString().split('T')[0];
                  
                  if (data.lastPlayedDate === yesterdayStr) {
                     newStreak = (data.currentStreak || 0) + 1;
                  } else {
                     newStreak = 1; 
                  }
               }
            }
            
            await setDoc(userRef, {
               uid: user.uid,
               username: user.displayName || 'Gamer',
               photoURL: user.photoURL || '',
               currentStreak: newStreak,
               lastPlayedDate: today
            }, { merge: true });
            
            setCurrentUserStreak(newStreak);
          } catch (e) {
            console.error("Streak tracking error:", e);
          }
        };

        updateStreak();
      }, [user]);

      // Leaderboard Fetch
      useEffect(() => {
        if (activeView === 'leaderboard' && db && user && !user.isAnonymous) {
          const usersRef = collection(db, 'artifacts', APP_ID, 'public', 'data', 'users');
          const unsubscribe = onSnapshot(usersRef, (snapshot) => {
            const usersData = [];
            snapshot.forEach(document => {
              if (document.data().username) usersData.push(document.data());
            });
            usersData.sort((a, b) => (b.currentStreak || 0) - (a.currentStreak || 0));
            setLeaderboard(usersData);
            setLeaderboardError('');
          }, (err) => {
            console.error("Leaderboard fetch error:", err);
            if (err.message && (err.message.includes("permission") || err.message.includes("Missing or insufficient"))) {
                setLeaderboardError("Leaderboard access blocked. Set Firebase Firestore Rules to Test Mode.");
            }
          });
          return () => unsubscribe();
        }
      }, [activeView, db, user]);

      const checkUsernameAvailability = async (desiredUsername) => {
        if (!db) throw new Error("Database not connected.");
        const lowerUsername = desiredUsername.toLowerCase();
        const usernameDocRef = doc(db, 'artifacts', APP_ID, 'public', 'data', 'usernames', lowerUsername);
        try {
          const snapshot = await getDoc(usernameDocRef);
          return { available: !snapshot.exists(), ref: usernameDocRef, doc: snapshot };
        } catch (e) {
          if (e.message && (e.message.includes("permission") || e.message.includes("Missing or insufficient"))) {
              throw new Error("Firebase Error: Set Firestore Rules to Test Mode to allow database access.");
          }
          return { available: true, ref: usernameDocRef, doc: null };
        }
      };

      const handleSignup = async (e) => {
        e.preventDefault();
        setAuthError('');
        setAuthLoading(true);
        
        try {
          if (!username || username.trim().length < 3) {
            throw new Error("Username must be at least 3 characters.");
          }

          const { available, ref: usernameDocRef } = await checkUsernameAvailability(username.trim());
          if (!available) throw new Error("That username is already taken. Please choose another.");

          const userCredential = await createUserWithEmailAndPassword(auth, email, password);
          await updateProfile(userCredential.user, { displayName: username.trim() });
          
          try {
             await setDoc(usernameDocRef, { uid: userCredential.user.uid, username: username.trim() });
             await setDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'users', userCredential.user.uid), {
               uid: userCredential.user.uid,
               username: username.trim(),
               photoURL: '',
               currentStreak: 1,
               lastPlayedDate: new Date().toISOString().split('T')[0]
             });
          } catch(e) {
             console.error("Failed to reserve username in DB.", e);
          }

          setUser({ ...userCredential.user, displayName: username.trim() }); 
          setProfileUsername(username.trim());
          setProfilePhotoUrl('');
          setCurrentUserStreak(1);
          setShowAuthModal(false);
        } catch (err) {
          setAuthError(err.message.replace('Firebase: ', ''));
        } finally {
          setAuthLoading(false);
        }
      };

      const handleLogin = async (e) => {
        e.preventDefault();
        setAuthError('');
        setAuthLoading(true);
        try {
          await signInWithEmailAndPassword(auth, email, password);
          setShowAuthModal(false);
        } catch (err) {
          setAuthError(err.message.replace('Firebase: ', ''));
        } finally {
          setAuthLoading(false);
        }
      };

      const handleLogout = async () => {
        if (auth) {
          await signOut(auth);
          setActiveView('discover');
        }
      };

      const handlePhotoChange = (e) => {
        const file = e.target.files[0];
        if (file) {
          if (file.size > 750000) { 
             setProfileUpdateError("Image is too large. Please choose an image under 750KB.");
             return;
          }
          const reader = new FileReader();
          reader.onloadend = () => {
            setProfilePhotoUrl(reader.result);
            setProfileUpdateError(''); 
          };
          reader.readAsDataURL(file);
        }
      };

      const handleUpdateProfile = async (e) => {
        e.preventDefault();
        if (!user || !auth.currentUser) return;
        
        setIsUpdatingProfile(true);
        setProfileUpdateSuccess(false);
        setProfileUpdateError('');
        
        try {
          if (!profileUsername || profileUsername.trim().length < 3) {
            throw new Error("Username must be at least 3 characters.");
          }

          const { available, ref: usernameDocRef, doc: snapshot } = await checkUsernameAvailability(profileUsername.trim());
          if (!available && snapshot && snapshot.data()?.uid !== auth.currentUser.uid) {
             throw new Error("That username is already taken.");
          }

          await updateProfile(auth.currentUser, { 
            displayName: profileUsername.trim(),
            photoURL: profilePhotoUrl
          });
          
          try {
             await setDoc(usernameDocRef, { uid: auth.currentUser.uid, username: profileUsername.trim() });
             await setDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'users', auth.currentUser.uid), {
               uid: auth.currentUser.uid,
               username: profileUsername.trim(),
               photoURL: profilePhotoUrl
             }, { merge: true });
          } catch(e) {
             console.error("Failed to update public DB.", e);
             if (e.message && (e.message.includes("permission") || e.message.includes("Missing or insufficient"))) {
                throw new Error("Profile changed visually, but Firestore permission denied writing. Set rules to Test Mode.");
             }
          }

          setUser({ 
            ...auth.currentUser, 
            displayName: profileUsername.trim(),
            photoURL: profilePhotoUrl
          });
          
          setProfileUpdateSuccess(true);
          setTimeout(() => setProfileUpdateSuccess(false), 3000);
        } catch (err) {
          setProfileUpdateError(err.message.replace('Firebase: ', ''));
        } finally {
          setIsUpdatingProfile(false);
        }
      };

      // Handle Sponsor Countdown
      useEffect(() => {
        if (!activeGame) {
          setAdCountdown(0);
          return;
        }
        setAdCountdown(5);
        const timerId = setInterval(() => {
          setAdCountdown(currentCount => {
            if (currentCount <= 1) {
              clearInterval(timerId);
              return 0; 
            }
            return currentCount - 1;
          });
        }, 1000);
        return () => clearInterval(timerId);
      }, [activeGame]);

      useEffect(() => {
        const handleEsc = (e) => {
          if (e.key === 'Escape' && isCssFullscreen) setIsCssFullscreen(false);
        };
        window.addEventListener('keydown', handleEsc);
        return () => window.removeEventListener('keydown', handleEsc);
      }, [isCssFullscreen]);

      const toggleFullscreen = async () => {
        if (!document.fullscreenElement && !isCssFullscreen) {
          try {
            if (playerContainerRef.current) await playerContainerRef.current.requestFullscreen();
          } catch (err) {
            console.warn("Native fullscreen blocked.", err.message);
            setIsCssFullscreen(true);
          }
        } else {
          if (document.fullscreenElement && document.exitFullscreen) {
            try { await document.exitFullscreen(); } catch (err) {}
          }
          setIsCssFullscreen(false);
        }
      };

      const filteredGames = GAMES.filter(g => 
        g.title.toLowerCase().includes(searchQuery.toLowerCase()) ||
        g.tags.some(t => t.toLowerCase().includes(searchQuery.toLowerCase()))
      );

      const handleLaunchGame = (game) => {
        setActiveGame(game);
        setIframeLoading(true);
        setIsCssFullscreen(false);
      };

      const handleCloseGame = () => {
        setActiveGame(null);
        setIsCssFullscreen(false);
      };

      const FeaturedGame = GAMES[0];
      const FeaturedIcon = FeaturedGame.icon;
      const ActiveIcon = activeGame ? activeGame.icon : null;

      return (
        <div className="h-screen w-screen bg-slate-950 text-slate-100 font-sans flex overflow-hidden relative">
          
          {/* Ambient Glowing Background Layer */}
          <div className="pointer-events-none fixed inset-0 overflow-hidden z-0">
            <div className="absolute top-[-10%] -left-10 w-96 h-96 bg-indigo-600 rounded-full mix-blend-screen filter blur-[150px] opacity-30 animate-blob"></div>
            <div className="absolute top-[20%] -right-20 w-96 h-96 bg-fuchsia-600 rounded-full mix-blend-screen filter blur-[150px] opacity-20 animate-blob" style={{ animationDelay: '2s' }}></div>
            <div className="absolute -bottom-32 left-[20%] w-96 h-96 bg-cyan-600 rounded-full mix-blend-screen filter blur-[150px] opacity-20 animate-blob" style={{ animationDelay: '4s' }}></div>
          </div>

          {/* SIDEBAR NAVIGATION */}
          <aside 
            onMouseEnter={() => setIsSidebarOpen(true)}
            onMouseLeave={() => setIsSidebarOpen(false)}
            className={`${isSidebarOpen ? 'w-64 absolute md:relative' : 'w-0 md:w-20 absolute md:relative'} bg-slate-900/60 backdrop-blur-2xl border-r border-slate-800/50 flex flex-col transition-all duration-300 z-[100] h-full flex-shrink-0 overflow-hidden whitespace-nowrap shadow-2xl md:shadow-none`}
          >
            <div className={`p-6 flex items-center ${isSidebarOpen ? 'space-x-3' : 'justify-center px-0'}`}>
              <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-indigo-500 to-fuchsia-600 flex items-center justify-center shadow-[0_0_20px_-5px_rgba(99,102,241,0.5)] flex-shrink-0 border border-white/10">
                <NexisLogo size={20} className="text-white" />
              </div>
              <h1 className={`text-2xl font-black tracking-wider bg-clip-text text-transparent bg-gradient-to-r from-white to-slate-400 transition-opacity duration-300 font-heading drop-shadow-md ${isSidebarOpen ? 'opacity-100' : 'opacity-0 hidden'}`}>
                NEXIS
              </h1>
            </div>

            <nav className={`flex-1 ${isSidebarOpen ? 'px-4' : 'px-3'} py-6 space-y-3`}>
              <button 
                onClick={() => { setActiveView('discover'); setActiveGame(null); }} 
                className={`w-full flex items-center ${isSidebarOpen ? 'space-x-3 px-4' : 'justify-center px-0'} py-3.5 ${activeView === 'discover' ? 'bg-indigo-500/20 text-indigo-300 shadow-[inset_4px_0_0_0_rgba(99,102,241,1)]' : 'text-slate-400 hover:bg-slate-800/50 hover:text-slate-200'} rounded-xl transition-all duration-300`} 
                title="Discover"
              >
                <Home size={22} className="flex-shrink-0" />
                <span className={`font-bold font-ui text-xl transition-opacity duration-300 tracking-wide ${isSidebarOpen ? 'opacity-100' : 'opacity-0 hidden'}`}>Discover</span>
              </button>

              <button 
                onClick={() => { setActiveView('leaderboard'); setActiveGame(null); }} 
                className={`w-full flex items-center ${isSidebarOpen ? 'space-x-3 px-4' : 'justify-center px-0'} py-3.5 ${activeView === 'leaderboard' ? 'bg-indigo-500/20 text-indigo-300 shadow-[inset_4px_0_0_0_rgba(99,102,241,1)]' : 'text-slate-400 hover:bg-slate-800/50 hover:text-slate-200'} rounded-xl transition-all duration-300`} 
                title="Leaderboard"
              >
                <TrophyIcon size={22} className="flex-shrink-0" />
                <span className={`font-bold font-ui text-xl transition-opacity duration-300 tracking-wide ${isSidebarOpen ? 'opacity-100' : 'opacity-0 hidden'}`}>Leaderboard</span>
              </button>

              <button 
                onClick={() => { setActiveView('profile'); setActiveGame(null); }} 
                className={`w-full flex items-center ${isSidebarOpen ? 'space-x-3 px-4' : 'justify-center px-0'} py-3.5 ${activeView === 'profile' ? 'bg-indigo-500/20 text-indigo-300 shadow-[inset_4px_0_0_0_rgba(99,102,241,1)]' : 'text-slate-400 hover:bg-slate-800/50 hover:text-slate-200'} rounded-xl transition-all duration-300`} 
                title="Profile"
              >
                <UserIcon size={22} className="flex-shrink-0" />
                <span className={`font-bold font-ui text-xl transition-opacity duration-300 tracking-wide ${isSidebarOpen ? 'opacity-100' : 'opacity-0 hidden'}`}>My Profile</span>
              </button>
            </nav>

            <div className="p-4 border-t border-slate-800/50">
              <button 
                onClick={() => setShowSettingsModal(true)}
                className={`w-full flex items-center ${isSidebarOpen ? 'space-x-3 px-4' : 'justify-center px-0'} py-3.5 text-slate-400 hover:bg-slate-800/50 hover:text-slate-200 rounded-xl transition-all duration-300`}
                title="Settings"
              >
                <SettingsIcon size={22} className="flex-shrink-0" />
                <span className={`font-bold font-ui text-xl transition-opacity duration-300 tracking-wide ${isSidebarOpen ? 'opacity-100' : 'opacity-0 hidden'}`}>Settings</span>
              </button>
            </div>
          </aside>

          {/* MAIN CONTENT AREA */}
          <main className="flex-1 flex flex-col h-full overflow-hidden relative z-10">
            
            {/* Hub Views Container */}
            <div className={`absolute inset-0 flex flex-col transition-all duration-500 ${activeGame ? 'opacity-0 scale-95 pointer-events-none' : 'opacity-100 scale-100 overflow-y-auto'}`}>
              
              {/* Header */}
              <header className="px-6 md:px-10 py-6 md:py-8 flex justify-between items-center sticky top-0 z-20 bg-slate-950/50 backdrop-blur-xl border-b border-slate-800/50">
                <div className="flex items-center flex-1">
                  <button 
                    onClick={() => setIsSidebarOpen(!isSidebarOpen)} 
                    className="mr-4 md:hidden p-2.5 bg-slate-900/80 rounded-xl text-slate-400 hover:text-white border border-slate-800 hover:border-indigo-500/50 transition-all flex-shrink-0"
                  >
                    <MenuIcon size={20} />
                  </button>
                  <div className="relative w-full max-w-md group">
                    <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                      <SearchIcon size={18} className="text-slate-500 group-focus-within:text-indigo-400 transition-colors" />
                    </div>
                    <input 
                      type="text" 
                      className="w-full bg-slate-900/60 backdrop-blur-sm border border-slate-800/60 text-slate-100 font-ui text-xl font-bold rounded-2xl py-3 pl-12 pr-4 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 focus:border-indigo-500 transition-all shadow-inner placeholder-slate-500"
                      placeholder="Search your library..."
                      value={searchQuery}
                      onChange={(e) => setSearchQuery(e.target.value)}
                    />
                  </div>
                </div>
                <div className="flex items-center space-x-4 ml-4">
                  {isRegistered ? (
                    <div className="flex items-center space-x-4">
                      <div className="hidden sm:flex flex-col items-end">
                        <div className="flex items-center gap-2">
                           <span className="text-base font-bold font-heading text-white">{user.displayName || 'Gamer'}</span>
                           {currentUserStreak > 0 && (
                              <div className="flex items-center bg-slate-900/80 border border-slate-700/50 px-2.5 py-1 rounded-lg shadow-inner" title="Game Streak">
                                 <span className="text-orange-500 text-sm mr-1.5 drop-shadow-[0_0_8px_rgba(249,115,22,0.8)]">🔥</span>
                                 <span className="text-sm font-bold text-white font-ui tracking-widest">{currentUserStreak}</span>
                              </div>
                           )}
                        </div>
                        <button onClick={handleLogout} className="text-sm text-rose-400 hover:text-rose-300 font-bold transition-colors mt-1 font-ui tracking-wide">Sign Out</button>
                      </div>
                      
                      <div 
                        className="w-12 h-12 rounded-2xl bg-gradient-to-br from-indigo-600 to-fuchsia-600 border border-white/20 flex items-center justify-center shadow-[0_0_15px_-3px_rgba(99,102,241,0.5)] cursor-pointer sm:cursor-default overflow-hidden flex-shrink-0 hover:scale-105 transition-transform" 
                        onClick={() => window.innerWidth < 640 && handleLogout()} 
                      >
                        {user.photoURL ? (
                           <img src={user.photoURL} alt="Avatar" className="w-full h-full object-cover" />
                        ) : (
                           <span className="font-bold text-xl text-white font-heading">{(user.displayName || 'U').charAt(0).toUpperCase()}</span>
                        )}
                      </div>
                    </div>
                  ) : (
                    <button 
                      onClick={() => setShowAuthModal(true)}
                      className="px-8 py-3 bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 text-white font-bold font-ui text-xl tracking-wider rounded-2xl transition-all shadow-[0_0_20px_-5px_rgba(99,102,241,0.6)] hover:shadow-[0_0_25px_-2px_rgba(99,102,241,0.8)] whitespace-nowrap"
                    >
                      Sign In
                    </button>
                  )}
                </div>
              </header>

              {/* View: DISCOVER */}
              {activeView === 'discover' && (
                <>
                  {/* Hero Banner */}
                  {!searchQuery && (
                    <div className="px-6 md:px-10 pb-10 pt-4">
                      <div className="relative w-full h-96 rounded-[2rem] overflow-hidden group cursor-pointer border border-white/5 shadow-2xl" onClick={() => handleLaunchGame(FeaturedGame)}>
                        {/* Animated Gradient Background */}
                        <div className="absolute inset-0 bg-gradient-to-br from-indigo-900 via-slate-900 to-fuchsia-900 animate-gradient-x"></div>
                        <div className="absolute inset-0 bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-indigo-400/20 via-transparent to-transparent mix-blend-overlay"></div>
                        
                        <div className="absolute right-0 top-0 w-1/2 h-full opacity-40 transform translate-x-10 -translate-y-10 group-hover:scale-110 group-hover:-translate-x-5 transition-all duration-700 ease-out filter drop-shadow-[0_0_30px_rgba(0,0,0,0.5)]">
                          <FeaturedIcon />
                        </div>
                        
                        <div className="absolute inset-0 bg-gradient-to-t from-slate-950 via-slate-950/60 to-transparent"></div>
                        <div className="absolute inset-0 bg-gradient-to-r from-slate-950/80 via-transparent to-transparent"></div>
                        
                        <div className="absolute bottom-0 left-0 p-8 md:p-12 w-full md:w-2/3 transform group-hover:-translate-y-2 transition-transform duration-500">
                          <span className="px-4 py-1.5 text-sm font-bold font-ui uppercase tracking-widest text-indigo-200 bg-indigo-500/20 border border-indigo-500/30 rounded-xl mb-6 inline-block backdrop-blur-md shadow-[0_0_15px_-3px_rgba(99,102,241,0.3)]">Featured Launch</span>
                          <h2 className="text-5xl md:text-7xl font-black font-heading text-white mb-4 tracking-tight drop-shadow-lg">{FeaturedGame.title}</h2>
                          <p className="text-slate-300 text-lg md:text-xl mb-8 line-clamp-2 max-w-xl font-medium">{FeaturedGame.description}</p>
                          <button className="relative flex items-center space-x-3 bg-white text-slate-950 px-8 py-4 rounded-2xl font-bold font-ui text-2xl tracking-wide overflow-hidden group/btn shadow-[0_0_20px_rgba(255,255,255,0.3)] hover:shadow-[0_0_30px_rgba(255,255,255,0.5)] transition-all transform active:scale-95">
                            <span className="absolute inset-0 bg-gradient-to-r from-white via-slate-200 to-white transform -translate-x-full group-hover/btn:translate-x-full transition-transform duration-700 ease-in-out"></span>
                            <PlayIcon size={24} fill="currentColor" className="relative z-10" />
                            <span className="relative z-10">Play Now</span>
                          </button>
                        </div>
                      </div>
                    </div>
                  )}

                  {/* Game Grid */}
                  <div className="px-6 md:px-10 pb-20 flex-1">
                    <div className="flex items-center justify-between mb-8">
                      <h3 className="text-3xl font-bold font-heading text-white tracking-wide">All Games</h3>
                      <span className="text-indigo-400 font-bold font-ui text-xl px-4 py-1 bg-indigo-500/10 rounded-full border border-indigo-500/20 shadow-inner">{filteredGames.length} Available</span>
                    </div>
                    
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 md:gap-8">
                      {filteredGames.map((game) => {
                        const GameIcon = game.icon;
                        return (
                          <div 
                            key={game.id} 
                            className="group relative bg-slate-900/40 backdrop-blur-md border border-slate-800/60 rounded-3xl overflow-hidden hover:bg-slate-800/60 hover:border-indigo-500/50 transition-all duration-500 hover:shadow-[0_10px_40px_-10px_rgba(99,102,241,0.3)] hover:-translate-y-2 cursor-pointer flex flex-col h-full"

                              onChange={(e) => setMasterVolume(e.target.value)}
                              className="w-full accent-indigo-500 h-3 bg-slate-950 border border-slate-800 rounded-full appearance-none cursor-pointer"
                            />
                          </div>
                          
                          <div>
                            <div className="flex justify-between text-sm mb-3 font-ui text-xl">
                              <span className="text-slate-300 font-bold">Music Volume</span>
                              <span className="text-indigo-400 font-black">{musicVolume}%</span>
                            </div>
                            <input 
                              type="range" 
                              min="0" max="100" 
                              value={musicVolume} 
                              onChange={(e) => setMusicVolume(e.target.value)}
                              className="w-full accent-indigo-500 h-3 bg-slate-950 border border-slate-800 rounded-full appearance-none cursor-pointer"
                            />
                          </div>

                          <div>
                            <div className="flex justify-between text-sm mb-3 font-ui text-xl">
                              <span className="text-slate-300 font-bold">Sound Effects</span>
                              <span className="text-indigo-400 font-black">{sfxVolume}%</span>
                            </div>
                            <input 
                              type="range" 
                              min="0" max="100" 
                              value={sfxVolume} 
                              onChange={(e) => setSfxVolume(e.target.value)}
                              className="w-full accent-indigo-500 h-3 bg-slate-950 border border-slate-800 rounded-full appearance-none cursor-pointer"
                            />
                          </div>
                        </div>
                      </div>
                    </div>
                    
                    <button 
                      onClick={() => setShowSettingsModal(false)} 
                      className="w-full py-4 bg-slate-800 hover:bg-slate-700 text-white font-bold font-heading text-xl tracking-widest uppercase rounded-2xl transition-all mt-10 active:scale-95"
                    >
                      Save & Close
                    </button>
                 </div>
              </div>
            )}

          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
