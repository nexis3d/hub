                         <div className="flex gap-4">
                             <div className="bg-slate-950/80 px-5 py-3 rounded-2xl border border-slate-800 shadow-[inset_0_2px_4px_rgba(0,0,0,0.4)] flex-1 text-center"><span className="block text-slate-400 text-xs uppercase tracking-widest font-bold mb-1">Level</span><span className="text-2xl font-black text-indigo-400 font-heading">{viewingPlayer.currentLevel || 1}</span></div>
                             <div className="bg-slate-950/80 px-5 py-3 rounded-2xl border border-slate-800 shadow-[inset_0_2px_4px_rgba(0,0,0,0.4)] flex-1 text-center"><span className="block text-slate-400 text-xs uppercase tracking-widest font-bold mb-1">Streak</span><span className={`text-2xl font-black font-heading flex items-center justify-center gap-2 ${getEffectiveStreak(viewingPlayer) > 0 ? 'text-orange-500' : 'text-slate-500'}`}><span className={getEffectiveStreak(viewingPlayer) > 0 ? 'animate-pulse' : 'grayscale'}>🔥</span> {getEffectiveStreak(viewingPlayer)}</span></div>
                         </div>
                     </div>
                 </div>
              </div>
            )}

            {/* ADMIN MANAGE PLAYER MODAL */}
            {adminEditingUser && (
              <div className="absolute inset-0 z-[250] flex items-center justify-center bg-slate-950/80 backdrop-blur-md p-4 animate-modal-pop">
                 <div className="bg-slate-900/90 backdrop-blur-xl border border-slate-800 rounded-[2.5rem] p-6 sm:p-10 w-full max-w-2xl shadow-[0_20px_50px_rgba(0,0,0,0.5)] relative max-h-[95vh] overflow-y-auto">
                    <button onClick={() => setAdminEditingUser(null)} className="absolute top-4 right-4 sm:top-6 sm:right-6 p-2 bg-slate-800/50 rounded-xl text-slate-400 hover:text-white transition-colors active:scale-95 shadow-inner"><XIcon size={24} /></button>
                    <div className="flex items-center gap-4 mb-8"><div className="p-3 bg-rose-500/20 text-rose-500 rounded-xl border border-rose-500/50"><ShieldIcon size={28} /></div><div><h2 className="text-2xl sm:text-3xl font-black font-heading text-white">Manage Player</h2><p className="text-slate-400 font-ui text-sm sm:text-base">Editing profile for <span className="text-white font-bold">{adminEditingUser.username}</span></p></div></div>
                    <form onSubmit={submitAdminAction} className="space-y-6">
                      <div className="grid grid-cols-1 sm:grid-cols-2 gap-6">
                         <div><label className="block text-xs sm:text-sm font-bold font-ui tracking-widest uppercase text-slate-400 mb-2 ml-1">Username</label><input type="text" required value={adminEditUsername} onChange={e => setAdminEditUsername(e.target.value)} className="w-full bg-slate-950/80 border border-slate-800 rounded-2xl px-5 py-4 font-ui text-lg sm:text-xl font-bold text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all shadow-[inset_0_2px_4px_rgba(0,0,0,0.3)]" /></div>
                         <div><label className="block text-xs sm:text-sm font-bold font-ui tracking-widest uppercase text-slate-400 mb-2 ml-1">ID Tag</label><div className="relative"><span className="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-500 font-heading text-xl">#</span><input type="text" maxLength={4} required value={adminEditTag} onChange={e => setAdminEditTag(e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, ''))} className="w-full bg-slate-950/80 border border-slate-800 rounded-2xl px-4 pl-8 py-4 font-ui text-lg sm:text-xl font-bold text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all shadow-[inset_0_2px_4px_rgba(0,0,0,0.3)] uppercase" /></div></div>
                      </div>
                      <div><label className="block text-xs sm:text-sm font-bold font-ui tracking-widest uppercase text-slate-400 mb-2 ml-1">Profile Image URL</label><input type="text" value={adminEditPhoto} onChange={e => setAdminEditPhoto(e.target.value)} className="w-full bg-slate-950/80 border border-slate-800 rounded-2xl px-5 py-4 font-ui text-base sm:text-lg text-slate-300 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all shadow-[inset_0_2px_4px_rgba(0,0,0,0.3)]" placeholder="https://..." /></div>
                      <div className="grid grid-cols-1 sm:grid-cols-2 gap-6">
                         <div><label className="block text-xs sm:text-sm font-bold font-ui tracking-widest uppercase text-slate-400 mb-2 ml-1">Daily Streak</label><input type="number" required min="0" value={adminEditStreak} onChange={e => setAdminEditStreak(e.target.value)} className="w-full bg-slate-950/80 border border-slate-800 rounded-2xl px-5 py-4 font-ui text-lg sm:text-xl font-bold text-orange-400 focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-transparent transition-all shadow-[inset_0_2px_4px_rgba(0,0,0,0.3)]" /></div>
                         <div><label className="block text-xs sm:text-sm font-bold font-ui tracking-widest uppercase text-slate-400 mb-2 ml-1">Player Level</label><input type="number" required min="1" value={adminEditLevel} onChange={e => setAdminEditLevel(e.target.value)} className="w-full bg-slate-950/80 border border-slate-800 rounded-2xl px-5 py-4 font-ui text-lg sm:text-xl font-bold text-indigo-300 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all shadow-[inset_0_2px_4px_rgba(0,0,0,0.3)]" /></div>
                      </div>
                      <div>
                        <label className="block text-xs sm:text-sm font-bold font-ui tracking-widest uppercase text-slate-400 mb-2 ml-1">Account Status</label>
                        <select value={adminEditStatus} onChange={(e) => setAdminEditStatus(e.target.value)} className="w-full bg-slate-950/80 border border-slate-800 rounded-2xl px-5 py-4 font-ui text-lg sm:text-xl font-bold text-white focus:outline-none focus:ring-2 focus:ring-rose-500 focus:border-transparent transition-all shadow-[inset_0_2px_4px_rgba(0,0,0,0.3)] appearance-none cursor-pointer"><option value="active">🟢 Active</option><option value="suspended">🟡 Suspended</option><option value="banned">🔴 Banned</option></select>
                      </div>
                      <div className="pt-4 mt-8 border-t border-slate-800 flex justify-end"><button disabled={adminActionLoading} type="submit" className="w-full sm:w-auto px-10 py-4 bg-indigo-600 hover:bg-indigo-500 text-white font-bold font-heading text-lg sm:text-xl tracking-wider uppercase rounded-2xl transition-all disabled:opacity-50 flex justify-center active:scale-95 shadow-[0_0_20px_-5px_rgba(99,102,241,0.5)] border border-white/10">{adminActionLoading ? (<div className="w-6 h-6 sm:w-7 sm:h-7 border-4 border-white border-t-transparent rounded-full animate-spin"></div>) : ('Save Changes')}</button></div>
                    </form>
                 </div>
              </div>
            )}

            {/* Game Player View */}
            <div className={`absolute inset-0 flex flex-col bg-black transition-all duration-500 ease-out z-[70] ${activeGame ? 'opacity-100 scale-100 pointer-events-auto' : 'opacity-0 scale-105 pointer-events-none'}`}>
              {activeGame && (
                <>
                  <div className={`h-16 bg-slate-900 border-b border-slate-800 flex items-center justify-between px-6 flex-shrink-0 transition-all ${isCssFullscreen ? 'hidden' : 'flex'}`}>
                    <div className="flex items-center space-x-6">
                      <button onClick={handleCloseGame} className="flex items-center space-x-2 text-slate-400 hover:text-white bg-slate-800 hover:bg-slate-700 px-4 py-2 rounded-xl transition-colors border border-slate-700 active:scale-95 shadow-inner"><ChevronLeftIcon size={20} /><span className="font-bold text-lg font-ui tracking-wide">Exit</span></button>
                      <div className="h-8 w-px bg-slate-700 hidden sm:block"></div>
                      <div className="flex items-center space-x-4"><div className="w-10 h-10 rounded-xl overflow-hidden bg-slate-800 hidden sm:block border border-white/10 shadow-lg"><ActiveIcon /></div><span className="font-black font-heading text-xl text-white tracking-wider truncate max-w-[150px] sm:max-w-xs drop-shadow-sm">{activeGame.title}</span></div>
                    </div>
                    <div className="flex items-center space-x-3"><button onClick={toggleFullscreen} className="flex items-center space-x-2 text-slate-300 hover:text-white p-2.5 rounded-xl hover:bg-slate-800 border border-transparent hover:border-slate-700 transition-colors tooltip group relative active:scale-95" title="Full Screen"><Maximize2Icon size={22} /></button></div>
                  </div>
                  
                  <div className={`flex-1 w-full bg-slate-950 relative ${isCssFullscreen ? 'fixed inset-0 z-[100]' : ''}`} ref={playerContainerRef}>
                    {isCssFullscreen && <button onClick={toggleFullscreen} className="absolute top-6 right-6 z-[60] opacity-30 hover:opacity-100 bg-slate-900/80 hover:bg-slate-700 text-slate-300 hover:text-white p-3 rounded-2xl border border-slate-700 backdrop-blur-md transition-all shadow-2xl active:scale-95" title="Exit Full Screen (Esc)"><Minimize2Icon size={24} /></button>}
                    {adCountdown > 0 && (
                      <div className="absolute inset-0 z-50 bg-slate-950 flex flex-col items-center justify-center px-4 text-center">
                        <div className="absolute inset-0 bg-indigo-500/5 mix-blend-screen animate-pulse"></div>
                        <div className="bg-slate-900/80 backdrop-blur-xl p-12 rounded-[2.5rem] border border-slate-800/80 shadow-[0_0_50px_-10px_rgba(0,0,0,0.8)] max-w-xl w-full relative overflow-hidden animate-in zoom-in-95 duration-300">
                          <div className="absolute bottom-0 left-0 h-2 bg-indigo-600 transition-all duration-1000 ease-linear" style={{width: `${(5 - adCountdown) * 20}%`}}></div>
                          <h2 className="text-3xl font-black font-heading text-white mb-6 uppercase tracking-widest drop-shadow-md">Sponsor Break</h2>
                          <div className="text-7xl mb-8 animate-bounce drop-shadow-2xl">💧</div>
                          <p className="text-2xl text-indigo-300 font-bold font-ui mb-10">Hydrate and sit up straight before your game starts!</p>
                          <div className="flex flex-col items-center">
                            <div className="relative w-20 h-20 mb-6"><svg className="w-full h-full transform -rotate-90" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="none" stroke="#1e293b" strokeWidth="8" /><circle cx="50" cy="50" r="45" fill="none" stroke="#6366f1" strokeWidth="8" strokeDasharray="283" strokeDashoffset={283 - (283 * adCountdown) / 5} className="transition-all duration-1000 ease-linear" strokeLinecap="round" /></svg><div className="absolute inset-0 flex items-center justify-center"><span className="text-3xl font-black font-heading text-white">{adCountdown}</span></div></div>
                            <p className="text-slate-400 font-bold font-ui text-xl tracking-wider">Starting soon...</p>
                          </div>
                          
                          {/* AdSense Sponsored Inject */}
                          <AdSenseWidget />
                          
                        </div>
                      </div>
                    )}
                  {iframeLoading && adCountdown === 0 && <div className="absolute inset-0 flex flex-col items-center justify-center z-0 bg-slate-950"><div className="w-32 h-32 mb-8 animate-pulse text-indigo-500 drop-shadow-[0_0_20px_rgba(99,102,241,0.5)]"><ActiveIcon /></div><p className="text-indigo-300 font-bold font-ui text-2xl tracking-widest animate-pulse drop-shadow-md">CONNECTING SERVER...</p></div>}
                  {adCountdown === 0 && <iframe src={activeGame.src} title={activeGame.title} onLoad={() => setIframeLoading(false)} className={`w-full h-full border-0 relative z-10 transition-opacity duration-1000 ${iframeLoading ? 'opacity-0' : 'opacity-100 bg-slate-950'}`} allow="fullscreen; autoplay; gamepad; keyboard; pointer-lock"></iframe>}
                  </div>
                </>
              )}
            </div>

            {/* TOAST NOTIFICATION */}
            {toast && <div className={`fixed bottom-6 right-6 px-6 py-4 rounded-2xl shadow-[0_10px_40px_-10px_rgba(0,0,0,0.5)] z-[300] font-ui font-bold text-xl flex items-center gap-3 animate-toast-slide border border-white/10 ${toast.type === 'error' ? 'bg-rose-600 text-white' : 'bg-indigo-600 text-white'}`}>{toast.type === 'error' ? <XIcon size={24}/> : <TrophyIcon size={24}/>}{toast.message}</div>}

            {/* AUTH MODAL */}
            {showAuthModal && (
              <div className="absolute inset-0 z-[200] flex items-center justify-center bg-slate-950/80 backdrop-blur-md p-4 animate-modal-pop">
                 <div className="bg-slate-900/90 backdrop-blur-xl border border-slate-800 rounded-[2.5rem] p-6 sm:p-10 w-full max-w-lg shadow-[0_20px_50px_rgba(0,0,0,0.5)] relative max-h-[95vh] overflow-y-auto">
                    <button onClick={() => { setShowAuthModal(false); setAuthMode('login'); setAuthError(''); setResetMessage(''); }} className="absolute top-4 right-4 sm:top-6 sm:right-6 p-2 bg-slate-800/50 rounded-xl text-slate-400 hover:text-white hover:bg-rose-500/20 transition-colors active:scale-95 shadow-inner"><XIcon size={24} /></button>
                    <div className="w-12 h-12 sm:w-16 sm:h-16 bg-gradient-to-br from-indigo-500 to-fuchsia-600 rounded-2xl flex items-center justify-center mb-4 sm:mb-6 shadow-lg border border-white/10"><UserIcon size={24} className="text-[#ffffff] sm:hidden" /><UserIcon size={32} className="text-[#ffffff] hidden sm:block" /></div>
                    <h2 className="text-3xl sm:text-4xl font-black font-heading text-white mb-6 sm:mb-8 tracking-wide drop-shadow-sm">{authMode === 'login' ? 'Welcome Back' : authMode === 'signup' ? 'Join Nexis Games' : 'Reset Password'}</h2>
                    {authError && <div className="mb-4 sm:mb-6 p-4 bg-rose-500/10 border border-rose-500/30 text-rose-400 font-ui font-bold text-base sm:text-lg rounded-xl flex items-center gap-3"><XIcon size={20}/> {authError}</div>}
                    {resetMessage && <div className="mb-4 sm:mb-6 p-4 bg-emerald-500/10 border border-emerald-500/30 text-emerald-400 font-ui font-bold text-base sm:text-lg rounded-xl flex items-center gap-3"><svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7"></path></svg> {resetMessage}</div>}
                    <form onSubmit={authMode === 'login' ? handleLogin : authMode === 'signup' ? handleSignup : handlePasswordReset} className="space-y-4 sm:space-y-5">
                      {authMode === 'signup' && <div><label className="block text-xs sm:text-sm font-bold font-ui tracking-widest uppercase text-slate-400 mb-1.5 sm:mb-2 ml-1">Username</label><input type="text" required value={username} onChange={e => setUsername(e.target.value)} className="w-full bg-slate-950/80 border border-slate-800 rounded-2xl px-4 sm:px-5 py-3 sm:py-4 font-ui text-lg sm:text-xl text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all shadow-[inset_0_2px_4px_rgba(0,0,0,0.3)]" placeholder="ProGamer123" /></div>}
                      <div><label className="block text-xs sm:text-sm font-bold font-ui tracking-widest uppercase text-slate-400 mb-1.5 sm:mb-2 ml-1">Email Address</label><input type="email" required value={email} onChange={e => setEmail(e.target.value)} className="w-full bg-slate-950/80 border border-slate-800 rounded-2xl px-4 sm:px-5 py-3 sm:py-4 font-ui text-lg sm:text-xl text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all shadow-[inset_0_2px_4px_rgba(0,0,0,0.3)]" placeholder="player@example.com" /></div>
                      {authMode !== 'reset' && (
                        <div>
                          <label className="block text-xs sm:text-sm font-bold font-ui tracking-widest uppercase text-slate-400 mb-1.5 sm:mb-2 ml-1">Password</label>
                          <div className="relative"><input type={showPassword ? "text" : "password"} required minLength={6} value={password} onChange={e => setPassword(e.target.value)} className="w-full bg-slate-950/80 border border-slate-800 rounded-2xl px-4 sm:px-5 py-3 sm:py-4 pr-12 font-ui text-lg sm:text-xl text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all shadow-[inset_0_2px_4px_rgba(0,0,0,0.3)]" placeholder="••••••••" /><button type="button" onClick={() => setShowPassword(!showPassword)} className="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-400 hover:text-white transition-colors active:scale-95">{showPassword ? <EyeOffIcon size={20} /> : <EyeIcon size={20} />}</button></div>
                          {authMode === 'login' && <div className="mt-3 text-right"><button type="button" onClick={() => { setAuthMode('reset'); setAuthError(''); setResetMessage(''); }} className="text-sm font-ui font-bold text-indigo-400 hover:text-indigo-300 transition-colors drop-shadow-sm">Forgot password?</button></div>}
                        </div>
                      )}
                      <button disabled={authLoading} type="submit" className="w-full py-3 sm:py-4 bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 text-white font-bold font-heading text-lg sm:text-xl tracking-wider uppercase rounded-2xl transition-all mt-6 sm:mt-8 disabled:opacity-50 flex justify-center shadow-[0_0_20px_-5px_rgba(99,102,241,0.5)] active:scale-95 border border-white/10">{authLoading ? (<div className="w-6 h-6 sm:w-7 sm:h-7 border-4 border-white border-t-transparent rounded-full animate-spin"></div>) : ( authMode === 'login' ? 'Sign In' : authMode === 'signup' ? 'Create Account' : 'Send Reset Link' )}</button>
                    </form>
                    <div className="mt-6 sm:mt-8 text-center border-t border-slate-800 pt-6">
                      {authMode === 'reset' ? <button onClick={() => { setAuthMode('login'); setAuthError(''); setResetMessage(''); }} className="text-slate-400 hover:text-indigo-300 font-ui font-bold text-base sm:text-lg tracking-wide transition-colors">Back to Sign In</button> : <button onClick={() => { setAuthMode(authMode === 'login' ? 'signup' : 'login'); setAuthError(''); }} className="text-slate-400 hover:text-indigo-300 font-ui font-bold text-base sm:text-lg tracking-wide transition-colors">{authMode === 'login' ? "Don't have an account? Sign up" : "Already have an account? Sign in"}</button>}
                    </div>
                 </div>
              </div>
            )}
          </main>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);
  </script>
</body>
</html>
