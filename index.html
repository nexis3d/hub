    // --- MAIN APPLICATION --- //
    function App() {
      const [activeView, setActiveView] = useState('discover');

      // Auth & User State

      const isRegistered = user && !user.isAnonymous;
      const isAdmin = isRegistered && currentUserTag === "MOFU"; 
      
      const [showAuthModal, setShowAuthModal] = useState(false);
      const [authMode, setAuthMode] = useState('login');
      const [email, setEmail] = useState('');

      const [username, setUsername] = useState('');
      const [authError, setAuthError] = useState('');
      const [authLoading, setAuthLoading] = useState(false);
      const [showPassword, setShowPassword] = useState(false);
      const [resetMessage, setResetMessage] = useState('');

      // Profile State
      const [profileUsername, setProfileUsername] = useState('');
      const [profileUserTag, setProfileUserTag] = useState('');
      const [profilePhotoUrl, setProfilePhotoUrl] = useState('');
      const [isUpdatingProfile, setIsUpdatingProfile] = useState(false);
      
      // Leaderboard & Admin State
      const [currentUserStreak, setCurrentUserStreak] = useState(0);
      const [leaderboard, setLeaderboard] = useState([]);
      const [isLeaderboardLoading, setIsLeaderboardLoading] = useState(true);
      const [leaderboardError, setLeaderboardError] = useState('');
      const [adminAction, setAdminAction] = useState(null); 
      const [adminActionLoading, setAdminActionLoading] = useState(false);

      // Settings State
      const [showSettingsModal, setShowSettingsModal] = useState(false);
      const [masterVolume, setMasterVolume] = useState(100);
      const [musicVolume, setMusicVolume] = useState(80);
      const [sfxVolume, setSfxVolume] = useState(100);
      const [isLightMode, setIsLightMode] = useState(false);

      // Auth Resolution Tracker
      const [authResolved, setAuthResolved] = useState(false);

      useEffect(() => {
        if (isLightMode) {
          document.documentElement.classList.add('light-mode');
        } else {
          document.documentElement.classList.remove('light-mode');
        }
      }, [isLightMode]);

      // Derived UI variables
      const userLevel = 1 + Math.floor(currentUserStreak / 2);
      const levelProgress = ((currentUserStreak % 2) / 2) * 100;

      const showToast = (message, type = 'success') => {
        setToast({ message, type });
        setTimeout(() => setToast(null), 3500);
      };

      // Auth Initialization
      useEffect(() => {
        const initAuth = async () => {
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              try {
                await signInWithCustomToken(auth, __initial_auth_token);
                return; 
              } catch (tokenError) {
                console.warn("Custom token failed. Trying anonymous sign-in...");
              }
            }
            try {
              await signInAnonymously(auth);
            } catch (anonError) {}
          } catch (e) {}
        };
        initAuth();

        const unsubscribe = onAuthStateChanged(auth, currentUser => {
          setUser(currentUser);
          setAuthResolved(true); // Tell the app we finished checking who is logged in!
          if (currentUser && !currentUser.isAnonymous) {
            setProfileUsername(currentUser.displayName || '');
            setProfilePhotoUrl(currentUser.photoURL || '');
          }
        });
        return () => unsubscribe();
      }, []);

      // Daily Streak Tracker & Live Data Sync
      useEffect(() => {
        if (!user || user.isAnonymous || !db) return;

        const userRef = doc(db, 'artifacts', APP_ID, 'public', 'data', 'users', user.uid);
        
        const updateStreak = async () => {
          try {
            const snap = await getDoc(userRef);
            const now = new Date();
            const today = getGMT7DateString(now);
            let newStreak = 1;
            let currentTag = user.uid.substring(0, 4).toUpperCase();
            let currentUsername = user.displayName;
            let currentPhoto = user.photoURL;
            
            if (snap.exists()) {
               const data = snap.data();
               if (data.userTag) currentTag = data.userTag;
               
               // Prevent username from wiping out on a fast reload
               if (!currentUsername && data.username) currentUsername = data.username;
               if (!currentPhoto && data.photoURL) currentPhoto = data.photoURL;
               
               if (data.lastPlayedDate === today) {
                  newStreak = data.currentStreak || 1; 
               } else {
                  const yesterday = new Date(now);
                  yesterday.setDate(yesterday.getDate() - 1);
                  const yesterdayStr = getGMT7DateString(yesterday);
                  
                  if (data.lastPlayedDate === yesterdayStr) {
                     newStreak = (data.currentStreak || 0) + 1;
                  } else {
                     newStreak = 1; 
                  }
               }
            }
            
            const newLevel = 1 + Math.floor(newStreak / 2);

            // Firmly save the Tag, Streak, and Level into Firebase at GMT-7
            await setDoc(userRef, {
               uid: user.uid,
               username: currentUsername || 'Gamer',
               userTag: currentTag,
               photoURL: currentPhoto || '',
               currentStreak: newStreak,
               currentLevel: newLevel,
               lastPlayedDate: today
            }, { merge: true });
            
            setCurrentUserStreak(newStreak);
            setCurrentUserTag(currentTag);
            setProfileUserTag(currentTag);
          } catch (e) {
            console.error("Streak tracking error:", e);
          }
        };

        updateStreak();

        // Listen for live updates (e.g. from Admin edits)
        const unsubscribe = onSnapshot(userRef, (docSnap) => {
          if (docSnap.exists()) {
            const data = docSnap.data();
            if (data.currentStreak !== undefined) setCurrentUserStreak(data.currentStreak);
            if (data.userTag !== undefined) {
              setCurrentUserTag(data.userTag);
              setProfileUserTag(data.userTag);
            }
          }
        });

        return () => unsubscribe();
      }, [user]);

      // Fetch Leaderboard (Live Data Sync)
      useEffect(() => {
        if (activeView === 'leaderboard' && db && authResolved) {
          
          // If auth resolved but there is NO user, it means Anonymous Auth is disabled in Firebase!
          if (!user) {
             setIsLeaderboardLoading(false);
             setLeaderboardError("Please login to see the leaderboard");
             return;
          }

          setIsLeaderboardLoading(true);
          const usersRef = collection(db, 'artifacts', APP_ID, 'public', 'data', 'users');
          const unsubscribe = onSnapshot(usersRef, (snapshot) => {
            const usersData = [];
            snapshot.forEach(document => {
              if (document.data().username) usersData.push(document.data());
            });
            usersData.sort((a, b) => (b.currentStreak || 0) - (a.currentStreak || 0));
            setLeaderboard(usersData);
            setIsLeaderboardLoading(false);
            setLeaderboardError('');
          }, (err) => {
            console.error("Leaderboard fetch error:", err);
            setIsLeaderboardLoading(false);
            if (err.message && (err.message.includes("permission") || err.message.includes("Missing or insufficient"))) {
                setLeaderboardError("Leaderboard access blocked. Set Firebase Firestore Rules to Test Mode.");
            }
          });
          return () => unsubscribe();
        }
      }, [activeView, db, user, authResolved]);

      const checkTagAvailability = async (desiredTag) => {
        if (!db) throw new Error("Database not connected.");
        const tagRef = doc(db, 'artifacts', APP_ID, 'public', 'data', 'uniqueTags', desiredTag.toUpperCase());
        try {
          const snapshot = await getDoc(tagRef);
          return { available: !snapshot.exists(), ref: tagRef, doc: snapshot };
        } catch (e) {
          if (e.message && (e.message.includes("permission") || e.message.includes("Missing or insufficient"))) {
              throw new Error("Firebase Error: Set Firestore Rules to Test Mode to allow database access.");
          }
          return { available: true, ref: tagRef, doc: null };
        }
      };

      const handleSignup = async (e) => {
        e.preventDefault();
        setAuthError('');
        setAuthLoading(true);
        
        try {
          if (!username || username.trim().length < 3) {
            throw new Error("Username must be at least 3 characters.");
          }

          let tempTag = Math.random().toString(36).substring(2, 6).toUpperCase();
          let { available, ref: tagDocRef } = await checkTagAvailability(tempTag);
          if (!available) throw new Error("Please try signing up again. ID Tag generation collision.");

          const userCredential = await createUserWithEmailAndPassword(auth, email, password);
          await updateProfile(userCredential.user, { displayName: username.trim() });
          
          try {
             await setDoc(tagDocRef, { uid: userCredential.user.uid, username: username.trim(), userTag: tempTag });
             await setDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'users', userCredential.user.uid), {
               uid: userCredential.user.uid,
               username: username.trim(),
               userTag: tempTag,
               photoURL: '',
               currentStreak: 1,
               currentLevel: 1,
               lastPlayedDate: getGMT7DateString()
             });
          } catch(e) {}

          setUser({ ...userCredential.user, displayName: username.trim() }); 
          setProfileUsername(username.trim());
          setProfileUserTag(tempTag);
          setCurrentUserTag(tempTag);
          setProfilePhotoUrl('');
          setCurrentUserStreak(1);
          setShowAuthModal(false);
          showToast(`Welcome to Nexis Games, ${username}!`, 'success');
        } catch (err) {
          setAuthError(err.message.replace('Firebase: ', ''));
        } finally {
          setAuthLoading(false);
        }
      };

      const handleLogin = async (e) => {
        e.preventDefault();
        setAuthError('');
        setAuthLoading(true);
        try {
          await signInWithEmailAndPassword(auth, email, password);
          setShowAuthModal(false);
          showToast("Successfully logged in!", 'success');
        } catch (err) {
          setAuthError(err.message.replace('Firebase: ', ''));
        } finally {
          setAuthLoading(false);
        }
      };

      const handleLogout = async () => {
        if (auth) {
          await signOut(auth);
          setActiveView('discover');
          showToast("Signed out successfully.", 'success');
          // Ensure they are placed back into a guest state to continue viewing leaderboard securely!
          try { await signInAnonymously(auth); } catch (e) {}
        }
      };

      const handlePasswordReset = async (e) => {
        e.preventDefault();
        setAuthError('');
        setResetMessage('');
        setAuthLoading(true);
        try {
          if (!email) throw new Error("Please enter your email address first.");
          await sendPasswordResetEmail(auth, email);
          setResetMessage('Password reset email sent! Check your inbox (it might be in your Spam/Junk folder).');
        } catch (err) {
          setAuthError(err.message.replace('Firebase: ', ''));
        } finally {
          setAuthLoading(false);
        }
      };

      const handlePhotoChange = (e) => {
        const file = e.target.files[0];
        if (file) {
          if (file.size > 750000) { 
             showToast("Image is too large (max 750KB).", 'error');
             return;
          }
          const reader = new FileReader();
          reader.onloadend = () => setProfilePhotoUrl(reader.result);
          reader.readAsDataURL(file);
        }
      };

      const handleUpdateProfile = async (e) => {
        e.preventDefault();
        if (!user || !auth.currentUser) return;
        
        setIsUpdatingProfile(true);
        
        try {
          if (!profileUsername || profileUsername.trim().length < 3) throw new Error("Username must be at least 3 characters.");
          if (!profileUserTag || profileUserTag.trim().length !== 4) throw new Error("ID Tag must be exactly 4 characters.");

          const upperTag = profileUserTag.trim().toUpperCase();
          if (upperTag !== currentUserTag) {
            const { available, ref: tagDocRef, doc: snapshot } = await checkTagAvailability(upperTag);
            if (!available && snapshot && snapshot.data()?.uid !== auth.currentUser.uid) {
               throw new Error(`The tag #${upperTag} is already taken!`);
            }
            await setDoc(tagDocRef, { uid: auth.currentUser.uid, username: profileUsername.trim(), userTag: upperTag });
            
            // Free up the old tag so others can claim it
            if (currentUserTag) {
               try {
                  await deleteDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'uniqueTags', currentUserTag));
               } catch (err) {
                  console.warn("Could not free up old tag.", err);
               }
            }
          }

          await updateProfile(auth.currentUser, { displayName: profileUsername.trim(), photoURL: profilePhotoUrl });
          
          try {
             await setDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'users', auth.currentUser.uid), {
               uid: auth.currentUser.uid,
               username: profileUsername.trim(),
               userTag: upperTag,
               photoURL: profilePhotoUrl
             }, { merge: true });
          } catch(e) {
             throw new Error("Profile changed locally, but Firestore denied writing. Set rules to Test Mode.");
          }

          setUser({ ...auth.currentUser, displayName: profileUsername.trim(), photoURL: profilePhotoUrl });
          setCurrentUserTag(upperTag);
          showToast("Profile updated successfully!", 'success');
        } catch (err) {
          showToast(err.message.replace('Firebase: ', ''), 'error');
        } finally {
          setIsUpdatingProfile(false);
        }
      };

                        <div>
                          <label className="block text-xs sm:text-sm font-bold font-ui tracking-widest uppercase text-slate-400 mb-1.5 sm:mb-2 ml-1">Username</label>
                          <input type="text" required value={username} onChange={e => setUsername(e.target.value)} className="w-full bg-slate-950/50 border border-slate-800 rounded-2xl px-4 sm:px-5 py-3 sm:py-4 font-ui text-lg sm:text-xl text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all shadow-inner" placeholder="ProGamer123" />
                        </div>
                      )}
                      <div>
                        <label className="block text-xs sm:text-sm font-bold font-ui tracking-widest uppercase text-slate-400 mb-1.5 sm:mb-2 ml-1">Email Address</label>
                        <input type="email" required value={email} onChange={e => setEmail(e.target.value)} className="w-full bg-slate-950/50 border border-slate-800 rounded-2xl px-4 sm:px-5 py-3 sm:py-4 font-ui text-lg sm:text-xl text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all shadow-inner" placeholder="player@example.com" />
                      </div>
                      
                      {authMode !== 'reset' && (
                        <div>
                          <label className="block text-xs sm:text-sm font-bold font-ui tracking-widest uppercase text-slate-400 mb-1.5 sm:mb-2 ml-1">Password</label>
                          <div className="relative">
                            <input type={showPassword ? "text" : "password"} required minLength={6} value={password} onChange={e => setPassword(e.target.value)} className="w-full bg-slate-950/50 border border-slate-800 rounded-2xl px-4 sm:px-5 py-3 sm:py-4 pr-12 font-ui text-lg sm:text-xl text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all shadow-inner" placeholder="••••••••" />
                            <button type="button" onClick={() => setShowPassword(!showPassword)} className="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-400 hover:text-white transition-colors active:scale-95">
                              {showPassword ? <EyeOffIcon size={20} /> : <EyeIcon size={20} />}
                            </button>
                          </div>
                          {authMode === 'login' && (
                            <div className="mt-3 text-right">
                              <button type="button" onClick={() => { setAuthMode('reset'); setAuthError(''); setResetMessage(''); }} className="text-sm font-ui font-bold text-indigo-400 hover:text-indigo-300 transition-colors">Forgot password?</button>
                            </div>
                          )}
                        </div>
                      )}
                      
                      <button disabled={authLoading} type="submit" className="w-full py-3 sm:py-4 bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 text-white font-bold font-heading text-lg sm:text-xl tracking-wider uppercase rounded-2xl transition-all mt-6 sm:mt-8 disabled:opacity-50 flex justify-center shadow-[0_0_20px_-5px_rgba(99,102,241,0.5)] active:scale-95">
                        {authLoading ? (
                           <div className="w-6 h-6 sm:w-7 sm:h-7 border-4 border-white border-t-transparent rounded-full animate-spin"></div>
                        ) : (
                           authMode === 'login' ? 'Sign In' : authMode === 'signup' ? 'Create Account' : 'Send Reset Link'
                        )}
                      </button>
                    </form>
                    
                    <div className="mt-6 sm:mt-8 text-center border-t border-slate-800 pt-6">
                      {authMode === 'reset' ? (
                        <button onClick={() => { setAuthMode('login'); setAuthError(''); setResetMessage(''); }} className="text-slate-400 hover:text-indigo-300 font-ui font-bold text-base sm:text-lg tracking-wide transition-colors">
                          Back to Sign In
                        </button>
                      ) : (
                        <button onClick={() => { setAuthMode(authMode === 'login' ? 'signup' : 'login'); setAuthError(''); }} className="text-slate-400 hover:text-indigo-300 font-ui font-bold text-base sm:text-lg tracking-wide transition-colors">
                          {authMode === 'login' ? "Don't have an account? Sign up" : "Already have an account? Sign in"}
                        </button>
                      )}
                    </div>
                 </div>
              </div>
            )}

            {/* ADMIN MODAL */}
            {adminAction && (
              <div className="absolute inset-0 z-[250] flex items-center justify-center bg-slate-950/80 backdrop-blur-md p-4 animate-modal-pop">
                 <div className="bg-slate-900/90 backdrop-blur-xl border border-slate-800 rounded-[2rem] p-6 sm:p-10 w-full max-w-sm shadow-[0_0_50px_-10px_rgba(0,0,0,0.8)] relative max-h-[95vh] overflow-y-auto">
                    <button onClick={() => setAdminAction(null)} className="absolute top-4 right-4 sm:top-6 sm:right-6 p-2 bg-slate-800/50 rounded-xl text-slate-400 hover:text-white transition-colors active:scale-95">
                      <XIcon size={24} />
                    </button>
                    
                    <h2 className="text-2xl sm:text-3xl font-black font-heading text-white mb-2">Admin Tools</h2>
                    <p className="text-slate-400 font-ui text-base sm:text-lg mb-6 sm:mb-8">Modifying player <span className="text-indigo-300 font-bold">{adminAction.username}</span></p>
                    
                    <form onSubmit={submitAdminAction} className="space-y-6">
                      {adminAction.type === 'edit' ? (
                        <div>
                          <label className="block text-xs sm:text-sm font-bold font-ui tracking-widest uppercase text-slate-400 mb-2 ml-1">New Streak Count</label>
                          <input type="number" required min="0" value={adminAction.newStreak} onChange={e => setAdminAction({...adminAction, newStreak: e.target.value})} className="w-full bg-slate-950/50 border border-slate-800 rounded-2xl px-5 py-4 font-ui text-xl sm:text-2xl font-bold text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all shadow-inner" />
                        </div>
                      ) : (
                        <div className="p-4 bg-rose-500/10 border border-rose-500/30 rounded-xl">
                          <p className="text-rose-400 font-ui text-base sm:text-lg font-bold">Are you sure you want to permanently remove this player from the leaderboard?</p>
                        </div>
                      )}
                      
                      <button disabled={adminActionLoading} type="submit" className={`w-full py-3 sm:py-4 text-white font-bold font-heading text-lg sm:text-xl tracking-wider uppercase rounded-2xl transition-all disabled:opacity-50 flex justify-center active:scale-95 ${adminAction.type === 'edit' ? 'bg-indigo-600 hover:bg-indigo-500 shadow-[0_0_20px_-5px_rgba(99,102,241,0.5)]' : 'bg-rose-600 hover:bg-rose-500 shadow-[0_0_20px_-5px_rgba(225,29,72,0.5)]'}`}>
                        {adminActionLoading ? (
                           <div className="w-6 h-6 sm:w-7 sm:h-7 border-4 border-white border-t-transparent rounded-full animate-spin"></div>
                        ) : (
                           adminAction.type === 'edit' ? 'Update Streak' : 'Confirm Deletion'
                        )}
                      </button>
                    </form>
                 </div>
              </div>
            )}

            {/* SETTINGS MODAL */}
            {showSettingsModal && (
              <div className="absolute inset-0 z-[200] flex items-center justify-center bg-slate-950/80 backdrop-blur-md p-4 animate-modal-pop">
                 <div className="bg-slate-900/90 backdrop-blur-xl border border-slate-800 rounded-[2rem] p-6 sm:p-10 w-full max-w-md shadow-[0_0_50px_-10px_rgba(0,0,0,0.8)] relative max-h-[95vh] overflow-y-auto">
                    <button onClick={() => setShowSettingsModal(false)} className="absolute top-4 right-4 sm:top-6 sm:right-6 p-2 bg-slate-800/50 rounded-xl text-slate-400 hover:text-white hover:bg-rose-500/20 transition-colors active:scale-95">
                      <XIcon size={24} />
                    </button>
                    <h2 className="text-3xl sm:text-4xl font-black font-heading text-white mb-6 sm:mb-8 tracking-wide">Settings</h2>
                    
                    <div className="space-y-6 sm:space-y-8">
                      <div>
                        <h3 className="text-xl sm:text-2xl font-bold font-heading text-indigo-300 mb-4 sm:mb-6 flex items-center gap-3">
                          <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                          Appearance
                        </h3>
                        <div className="flex justify-between items-center text-sm mb-2 sm:mb-3 font-ui text-lg sm:text-xl">
                          <span className="text-slate-300 font-bold">Theme</span>
                          <button 
                            onClick={() => setIsLightMode(!isLightMode)}
                            className="px-5 py-2.5 bg-indigo-500/20 text-indigo-300 rounded-xl border border-indigo-500/30 transition-all hover:bg-indigo-500/30 active:scale-95 font-bold font-ui tracking-widest text-sm uppercase shadow-inner"
                          >
                            {isLightMode ? 'Switch to Dark' : 'Switch to Light'}
                          </button>
                        </div>
                      </div>

                      <div className="border-t border-slate-800/60 pt-6 sm:pt-8">
                        <h3 className="text-xl sm:text-2xl font-bold font-heading text-indigo-300 mb-4 sm:mb-6 flex items-center gap-3">
                          <SettingsIcon size={24} /> Audio
                        </h3>
                        
                        <div className="space-y-4 sm:space-y-6">
                          <div>
                            <div className="flex justify-between text-sm mb-2 sm:mb-3 font-ui text-lg sm:text-xl">
                              <span className="text-slate-300 font-bold">Master Volume</span>
                              <span className="text-indigo-400 font-black">{masterVolume}%</span>
                            </div>
                            <input 
                              type="range" 
                              min="0" max="100" 
                              value={masterVolume} 
                              onChange={(e) => setMasterVolume(e.target.value)}
                              className="w-full accent-indigo-500 h-3 bg-slate-950 border border-slate-800 rounded-full appearance-none cursor-pointer"
                            />
                          </div>
                          
                          <div>
                            <div className="flex justify-between text-sm mb-2 sm:mb-3 font-ui text-lg sm:text-xl">
                              <span className="text-slate-300 font-bold">Music Volume</span>
                              <span className="text-indigo-400 font-black">{musicVolume}%</span>
                            </div>
                            <input 
                              type="range" 
                              min="0" max="100" 
                              value={musicVolume} 
                              onChange={(e) => setMusicVolume(e.target.value)}
                              className="w-full accent-indigo-500 h-3 bg-slate-950 border border-slate-800 rounded-full appearance-none cursor-pointer"
                            />
                          </div>

                          <div>
                            <div className="flex justify-between text-sm mb-2 sm:mb-3 font-ui text-lg sm:text-xl">
                              <span className="text-slate-300 font-bold">Sound Effects</span>
                              <span className="text-indigo-400 font-black">{sfxVolume}%</span>
                            </div>
                            <input 
                              type="range" 
                              min="0" max="100" 
                              value={sfxVolume} 
                              onChange={(e) => setSfxVolume(e.target.value)}
                              className="w-full accent-indigo-500 h-3 bg-slate-950 border border-slate-800 rounded-full appearance-none cursor-pointer"
                            />
                          </div>
                        </div>
                      </div>
                    </div>
                    
                    <div className="flex flex-col sm:flex-row gap-4 mt-8 sm:mt-10">
                      {isRegistered && (
                        <button 
                          onClick={() => { handleLogout(); setShowSettingsModal(false); }}
                          className="w-full py-3 sm:py-4 bg-rose-600 hover:bg-rose-500 text-white font-bold font-heading text-lg sm:text-xl tracking-widest uppercase rounded-2xl transition-all active:scale-95"
                        >
                          Sign Out
                        </button>
                      )}
                      <button 
                        onClick={() => setShowSettingsModal(false)} 
                        className="w-full py-3 sm:py-4 bg-slate-800 hover:bg-slate-700 text-white font-bold font-heading text-lg sm:text-xl tracking-widest uppercase rounded-2xl transition-all active:scale-95"
                      >
                        Save & Close
                      </button>
                    </div>
                 </div>
              </div>
            )}

          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
