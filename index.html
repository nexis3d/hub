    const generateOfflineHTML = (type, bg, fg) => {
      if (type === 0) return `<!DOCTYPE html><html><body style="margin:0;background:${bg};overflow:hidden;color:white;font-family:sans-serif" onclick="if(event.target.tagName==='DIV'){score++;event.target.remove();add()};document.getElementById('s').innerText=score"><h2 style="position:absolute;padding:20px;margin:0;font-size:2rem;text-shadow:0 2px 4px #000">Score: <span id="s">0</span></h2><script>let score=0;function add(){let d=document.createElement('div');let sz=40+Math.random()*60;d.style.cssText=\`position:absolute;left:\${Math.random()*(window.innerWidth-sz)}px;top:\${Math.random()*(window.innerHeight-sz)}px;width:\${sz}px;height:\${sz}px;background:radial-gradient(circle at 30% 30%, #fff, ${fg});border-radius:50%;cursor:pointer;box-shadow:0 0 20px rgba(0,0,0,0.5)\`;document.body.appendChild(d);setTimeout(()=>{if(d.parentElement)d.remove()},1000+Math.random()*2000)};setInterval(add,700);add();<\/script></body></html>`;
      if (type === 1) return `<!DOCTYPE html><html><body style="margin:0;background:#0f172a;color:white;display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;font-size:3rem;font-weight:bold;user-select:none;text-shadow:0 4px 20px rgba(0,0,0,0.5);text-align:center" onclick="clk()"><div id="t">Wait for <span style="color:${fg}">FLASH</span>...</div><script>let st=0,wt=0,ok=0;function r(){document.body.style.background='#0f172a';document.getElementById('t').innerHTML='Wait for <span style="color:${fg}">FLASH</span>...';ok=0;wt=Date.now()+1000+Math.random()*4000;setTimeout(()=>{if(!ok){document.body.style.background='${bg}';document.getElementById('t').innerText='TAP NOW!';st=Date.now();ok=1}},wt-Date.now())}function clk(){if(ok===1){document.getElementById('t').innerText=(Date.now()-st)+' ms';ok=2;setTimeout(r,2000)}else if(ok===0){document.getElementById('t').innerText='Too early!';ok=2;setTimeout(r,2000)}}r()<\/script></body></html>`;
      if (type === 2) return `<!DOCTYPE html><html><body style="margin:0;overflow:hidden;background:${bg};touch-action:none" onpointerdown="vy=-7;if(!alive){alive=1;y=window.innerHeight/2;score=0;obs=[];loop()}"><canvas id="c"></canvas><script>let c=document.getElementById('c'),ctx=c.getContext('2d'),w=c.width=window.innerWidth,h=c.height=window.innerHeight,y=h/2,vy=0,obs=[],frame=0,alive=1,score=0;function loop(){if(!alive){ctx.fillStyle='white';ctx.font='bold 40px sans-serif';ctx.fillText('Tap to Restart',w/2-140,h/2);return}ctx.clearRect(0,0,w,h);ctx.fillStyle='white';ctx.font='bold 30px sans-serif';ctx.fillText('Score: '+score,20,50);vy+=0.4;y+=vy;ctx.fillStyle='${fg}';ctx.shadowBlur=15;ctx.shadowColor='${fg}';ctx.beginPath();ctx.arc(65,y+15,15,0,7);ctx.fill();ctx.shadowBlur=0;if(frame++%90===0)obs.push({x:w,y:Math.random()*(h-200)});for(let i=obs.length-1;i>=0;i--){let o=obs[i];o.x-=6+score*0.1;ctx.fillStyle='#ffffff';ctx.fillRect(o.x,0,50,o.y);ctx.fillRect(o.x,o.y+200,50,h);if(o.x<80&&o.x>10&&((y<o.y)||(y+30>o.y+200)))alive=0;if(o.x<-50){obs.splice(i,1);score++}}if(y>h||y<0)alive=0;requestAnimationFrame(loop)}loop()<\/script></body></html>`;

    const ADJECTIVES = ["Neon", "Cosmic", "Retro", "Super", "Mega", "Ultra", "Galactic", "Pixel", "Shadow", "Cyber", "Void", "Quantum", "Mystic", "Crystal", "Iron"];
    
    const GENERATED_GAMES = Array.from({length: 97}, (_, i) => {
      const type = i % 4;
      const color = COLORS[i % COLORS.length];
      const adj = ADJECTIVES[(i * 3) % ADJECTIVES.length];
      
      let noun, desc, tags;
      if (type === 0) {
        noun = ["Blaster", "Popper", "Sniper", "Hunter"][i % 4];
        desc = "Pop the targets as fast as you can before they disappear! An intense test of precision and speed.";
        tags = ['Target', 'Arcade', 'Fast'];
      } else if (type === 1) {
        noun = ["Reflex", "Dash", "Speed", "Ninja"][i % 4];
        desc = "Wait for the flash, then tap instantly! Measure your reaction time in milliseconds.";
        tags = ['Reflex', 'Timing', 'Skill'];
      } else if (type === 2) {
        noun = ["Jumper", "Glider", "Flyer", "Pilot"][i % 4];
        desc = "Tap to jump and fight gravity while weaving through closing barriers. How far can you go?";
        tags = ['Runner', 'Dodge', 'Action'];
      } else {
        noun = ["Catcher", "Collector", "Hoarder", "Magnet"][i % 4];
        desc = "Slide back and forth to catch all the falling stars. Miss 5 and it's game over!";
        tags = ['Casual', 'Collect', 'Swipe'];
      }

      const htmlStr = generateOfflineHTML(type, color.bg, color.fg);
      const dataUri = `data:text/html;charset=utf-8,${encodeURIComponent(htmlStr)}`;

      return {
        id: `offline-gen-${i}`,
        title: `${adj} ${noun} ${Math.floor(i/4) + 1}`,
        developer: `IndieStudio ${(i % 9) + 1}`,
        description: desc,

        tags: tags,

      // Handle Anonymous fallback requirement for database writes
      useEffect(() => {

                await signInWithCustomToken(auth, __initial_auth_token);
                return; 
              } catch (tokenError) {
                console.warn("Custom token failed. Trying anonymous sign-in...");
              }
            }
            
            try {
              await signInAnonymously(auth);
            } catch (anonError) {
              console.info("Anonymous sign-in is disabled. The app will start signed-out.");
            }
          } catch (e) {
            console.warn("Auth initialization note:", e.message);
          }

        initAuth();

        const unsubscribe = onAuthStateChanged(auth, currentUser => {
          setUser(currentUser);
          if (currentUser && !currentUser.isAnonymous) {
            setProfileUsername(currentUser.displayName || '');
            setProfilePhotoUrl(currentUser.photoURL || '');
          }
        });
        return () => unsubscribe();
      }, []);

      // Handle Daily Game Streak logic
      useEffect(() => {
        const updateStreak = async () => {
          if (!user || user.isAnonymous || !db) return;

          const userRef = doc(db, 'artifacts', APP_ID, 'public', 'data', 'users', user.uid);
          try {
            const snap = await getDoc(userRef);
            const today = new Date().toISOString().split('T')[0];
            let newStreak = 1;
            
            if (snap.exists()) {
               const data = snap.data();
               if (data.lastPlayedDate === today) {
                  newStreak = data.currentStreak || 1; 
               } else {
                  const yesterday = new Date();
                  yesterday.setDate(yesterday.getDate() - 1);
                  const yesterdayStr = yesterday.toISOString().split('T')[0];
                  
                  if (data.lastPlayedDate === yesterdayStr) {
                     newStreak = (data.currentStreak || 0) + 1;
                  } else {
                     newStreak = 1; 
                  }
               }
            }
            
            await setDoc(userRef, {
               uid: user.uid,
               username: user.displayName || 'Gamer',
               photoURL: user.photoURL || '',
               currentStreak: newStreak,
               lastPlayedDate: today
            }, { merge: true });
            
            setCurrentUserStreak(newStreak);
          } catch (e) {
            console.error("Streak tracking error:", e);
            // Failing silently here so the game experience continues even if their DB rules block tracking
          }
        };

        updateStreak();
      }, [user]);

      // Fetch Leaderboard
      useEffect(() => {
        if (activeView === 'leaderboard' && db && user && !user.isAnonymous) {
          const usersRef = collection(db, 'artifacts', APP_ID, 'public', 'data', 'users');
          const unsubscribe = onSnapshot(usersRef, (snapshot) => {
            const usersData = [];
            snapshot.forEach(document => {
              if (document.data().username) usersData.push(document.data());
            });
            usersData.sort((a, b) => (b.currentStreak || 0) - (a.currentStreak || 0));
            setLeaderboard(usersData);
            setLeaderboardError('');

            if (err.message && (err.message.includes("permission") || err.message.includes("Missing or insufficient"))) {
                setLeaderboardError("Leaderboard access blocked. Please enable Test Mode in your Firebase Firestore Rules.");
            }
          });
          return () => unsubscribe();
        }
      }, [activeView, db, user]);

      // Improved Error Handling Check
      const checkUsernameAvailability = async (desiredUsername) => {
        if (!db) throw new Error("Database not connected.");
        const lowerUsername = desiredUsername.toLowerCase();
        const usernameDocRef = doc(db, 'artifacts', APP_ID, 'public', 'data', 'usernames', lowerUsername);
        try {
          const snapshot = await getDoc(usernameDocRef);
          return { available: !snapshot.exists(), ref: usernameDocRef, doc: snapshot };
        } catch (e) {
          if (e.message && (e.message.includes("permission") || e.message.includes("Missing or insufficient"))) {
              throw new Error("Firebase Error: Update Firestore Rules to Test Mode in your Console to allow database access.");
          }
          console.warn("Could not pre-verify username, attempting write...", e);
          return { available: true, ref: usernameDocRef, doc: null };
        }
      };

      const handleSignup = async (e) => {
        e.preventDefault();
        setAuthError('');
        setAuthLoading(true);

            throw new Error("Username must be at least 3 characters.");

          // Fail cleanly here if rules are not set up

          if (!available) {
             throw new Error("That username is already taken. Please choose another.");
          }

          // Register in Auth
          const userCredential = await createUserWithEmailAndPassword(auth, email, password);
          await updateProfile(userCredential.user, { displayName: username.trim() });
          
          try {
             // Reserve username in DB
             await setDoc(usernameDocRef, { 
               uid: userCredential.user.uid, 
               username: username.trim() 
             });
             // Initialize public profile for leaderboard
             await setDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'users', userCredential.user.uid), {
               uid: userCredential.user.uid,
               username: username.trim(),
               photoURL: '',
               currentStreak: 1,
               lastPlayedDate: new Date().toISOString().split('T')[0]
             });
          } catch(e) {
             console.error("Failed to reserve username in DB.", e);
             // If DB write fails but auth passes, let them log in anyway
          }

          setUser({ ...userCredential.user, displayName: username.trim() }); 
          setProfileUsername(username.trim());
          setProfilePhotoUrl('');
          setCurrentUserStreak(1);
          setShowAuthModal(false);
        } catch (err) {
          setAuthError(err.message.replace('Firebase: ', ''));
        } finally {
          setAuthLoading(false);
        }
      };

      const handleLogin = async (e) => {
        e.preventDefault();
        setAuthError('');
        setAuthLoading(true);
        try {
          await signInWithEmailAndPassword(auth, email, password);

          setAuthError(err.message.replace('Firebase: ', ''));
        } finally {
          setAuthLoading(false);
        }

      const handlePhotoChange = (e) => {
        const file = e.target.files[0];
        if (file) {
          if (file.size > 750000) { 
             setProfileUpdateError("Image is too large. Please choose an image under 750KB.");
             return;
          }
          const reader = new FileReader();
          reader.onloadend = () => {
            setProfilePhotoUrl(reader.result);
            setProfileUpdateError(''); 
          };
          reader.readAsDataURL(file);
        }
      };

      const handleUpdateProfile = async (e) => {
        e.preventDefault();
        if (!user || !auth.currentUser) return;
        
        setIsUpdatingProfile(true);
        setProfileUpdateSuccess(false);
        setProfileUpdateError('');
        
        try {
          if (!profileUsername || profileUsername.trim().length < 3) {
            throw new Error("Username must be at least 3 characters.");
          }

          const { available, ref: usernameDocRef, doc: snapshot } = await checkUsernameAvailability(profileUsername.trim());
          
          if (!available && snapshot && snapshot.data()?.uid !== auth.currentUser.uid) {
             throw new Error("That username is already taken.");
          }

          // Update actual Auth profile
          await updateProfile(auth.currentUser, { 
            displayName: profileUsername.trim(),
            photoURL: profilePhotoUrl
          });
          
          try {
             // Reserve username in global list
             await setDoc(usernameDocRef, { 
               uid: auth.currentUser.uid, 
               username: profileUsername.trim() 
             });
             // Update public user profile for leaderboard syncing
             await setDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'users', auth.currentUser.uid), {
               uid: auth.currentUser.uid,
               username: profileUsername.trim(),
               photoURL: profilePhotoUrl
             }, { merge: true });
          } catch(e) {
             console.error("Failed to update public DB.", e);
             if (e.message && (e.message.includes("permission") || e.message.includes("Missing or insufficient"))) {
                throw new Error("Profile changed visually, but Firestore permission denied writing public update. Set your rules to Test Mode.");
             }
          }

          setUser({ 
            ...auth.currentUser, 
            displayName: profileUsername.trim(),
            photoURL: profilePhotoUrl
          });
          
          setProfileUpdateSuccess(true);
          setTimeout(() => setProfileUpdateSuccess(false), 3000);
        } catch (err) {
          setProfileUpdateError(err.message.replace('Firebase: ', ''));
        } finally {
          setIsUpdatingProfile(false);
        }
      };

      // Robust Countdown Logic completely decoupled from blocking rendering issues
      useEffect(() => {
        if (!activeGame) {
          setAdCountdown(0);
          return;
        }

        // When a game is clicked, immediately start the countdown
        setAdCountdown(5);
        
        const timerId = setInterval(() => {

              clearInterval(timerId);
              return 0; // Trigger iframe render
            }
            return currentCount - 1;

                    <div className="px-6 md:px-10 pb-8">
                      <div className="relative w-full h-80 rounded-3xl overflow-hidden group cursor-pointer" onClick={() => handleLaunchGame(FeaturedGame)}>
                        <div className="absolute inset-0 bg-gradient-to-r from-slate-900 via-slate-800 to-slate-900">
                          <div className="absolute inset-0 opacity-20 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-indigo-500 via-slate-900 to-slate-900"></div>
                          <div className="absolute right-0 top-0 w-1/2 h-full opacity-30 transform translate-x-20 -translate-y-10 group-hover:scale-105 transition-transform duration-700">
                            <FeaturedIcon />
                          </div>
                        </div>
                        
                        <div className="absolute inset-0 bg-gradient-to-t from-slate-950 via-slate-950/40 to-transparent"></div>
                        
                        <div className="absolute bottom-0 left-0 p-6 md:p-10 w-full md:w-2/3">
                          <span className="px-3 py-1 text-xs font-bold font-ui uppercase tracking-wider text-white bg-indigo-500 rounded-full mb-4 inline-block">Featured Launch</span>
                          <h2 className="text-4xl md:text-5xl font-black font-heading text-white mb-3 tracking-tight">{FeaturedGame.title}</h2>
                          <p className="text-slate-300 text-sm md:text-lg mb-6 line-clamp-2">{FeaturedGame.description}</p>
                          <button className="flex items-center space-x-2 bg-white text-slate-950 px-8 py-3 rounded-xl font-bold font-ui text-lg tracking-wide hover:bg-slate-200 transition-colors transform active:scale-95">
                            <PlayIcon size={20} fill="currentColor" />
                            <span>Play Now</span>
                          </button>
                        </div>
                      </div>
                    </div>
                  )}

                  {/* Game Grid */}
                  <div className="px-6 md:px-10 pb-20 flex-1">
                    <div className="flex items-center justify-between mb-6">
                      <h3 className="text-2xl font-bold font-heading text-white">All Games</h3>
                      <span className="text-slate-500 font-medium font-ui text-lg">{filteredGames.length} available</span>
                    </div>
                    
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                      {filteredGames.map((game) => {
                        const GameIcon = game.icon;
                        return (
                          <div 
                            key={game.id} 
                            className="group bg-slate-900 border border-slate-800 rounded-2xl overflow-hidden hover:border-slate-600 transition-all duration-300 hover:shadow-xl hover:-translate-y-1 cursor-pointer flex flex-col h-full"
                            onClick={() => handleLaunchGame(game)}
                          >
                            <div className={`w-full aspect-video bg-gradient-to-br ${game.theme} p-6 relative flex items-center justify-center overflow-hidden`}>
                              <div className="absolute inset-0 bg-black/20 group-hover:bg-transparent transition-colors duration-300"></div>
                              <div className="w-32 h-32 transform group-hover:scale-110 transition-transform duration-500 drop-shadow-2xl">
                                <GameIcon />
                              </div>
                              
                              <div className="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity duration-300 bg-black/40 backdrop-blur-sm">
                                <div className="w-16 h-16 bg-white/20 border border-white/40 rounded-full flex items-center justify-center backdrop-blur-md">
                                  <PlayIcon size={32} className="text-white ml-1" fill="currentColor" />
                                </div>
                              </div>
                            </div>
                            
                            <div className="p-5 flex flex-col flex-1">
                              <div className="flex justify-between items-start mb-2">
                                <h4 className="text-lg font-bold font-heading text-slate-100 line-clamp-1">{game.title}</h4>
                              </div>
                              <p className="text-xs text-slate-400 mb-4">{game.developer}</p>
                              
                              <div className="mt-auto flex flex-wrap gap-2">
                                {game.tags.map(tag => (
                                  <span key={tag} className="px-2.5 py-1 text-[10px] font-bold font-ui uppercase tracking-wider bg-slate-800 text-slate-300 rounded-md">
                                    {tag}
                                  </span>
                                ))}
                              </div>
                            </div>
                          </div>
                        )
                      })}
                      
                      {filteredGames.length === 0 && (
                        <div className="col-span-full py-20 flex flex-col items-center justify-center text-slate-500">
                          <Gamepad2Icon size={48} className="mb-4 opacity-50" />
                          <p className="text-xl">No games found matching "{searchQuery}"</p>
                        </div>
                      )}
                    </div>
                  </div>
                </>
              )}

              {/* View: LEADERBOARD */}
              {activeView === 'leaderboard' && (
                <div className="px-6 md:px-10 pb-20 flex-1 flex justify-center">
                  <div className="w-full max-w-4xl">
                    <div className="flex items-center justify-between mb-8">
                       <h2 className="text-3xl font-black font-heading text-white flex items-center gap-3">
                          <TrophyIcon size={32} className="text-yellow-400" />
                          Game Streak Leaderboard
                       </h2>
                    </div>
                    
                    {!isRegistered ? (
                       <div className="bg-slate-900 border border-slate-800 rounded-3xl p-10 text-center shadow-xl">
                         <h3 className="text-xl font-bold font-heading text-white mb-2">Sign in to view the leaderboard</h3>
                         <p className="text-slate-400 mb-6">Create an account to track your daily streak and compete globally!</p>
                         <button onClick={() => setShowAuthModal(true)} className="px-6 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white font-bold font-ui tracking-wide rounded-xl transition-all">
                           Sign In
                         </button>
                       </div>
                    ) : (
                       <div className="bg-slate-900 border border-slate-800 rounded-3xl overflow-hidden shadow-xl">
                          {leaderboardError ? (
                             <div className="p-10 text-center flex flex-col items-center justify-center">
                                <p className="text-rose-400 font-bold font-ui text-lg mb-2">Database Access Denied</p>
                                <p className="text-slate-400 font-ui text-md">{leaderboardError}</p>
                             </div>
                          ) : leaderboard.length === 0 ? (
                             <div className="p-10 text-center flex flex-col items-center justify-center">
                                <div className="w-10 h-10 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                                <p className="text-slate-400 font-bold font-ui text-lg">Loading Top Players...</p>
                             </div>
                          ) : (
                             <div className="divide-y divide-slate-800/50">
                                {leaderboard.map((player, idx) => (
                                   <div key={player.uid} className={`flex items-center justify-between p-4 sm:p-6 hover:bg-slate-800/50 transition-colors ${player.uid === user?.uid ? 'bg-indigo-500/5' : ''}`}>
                                      <div className="flex items-center gap-4 sm:gap-6">
                                         <span className={`text-xl sm:text-2xl font-black font-heading w-8 text-center ${idx === 0 ? 'text-yellow-400' : idx === 1 ? 'text-slate-300' : idx === 2 ? 'text-amber-600' : 'text-slate-600'}`}>
                                            #{idx + 1}
                                         </span>
                                         
                                         <div className="w-12 h-12 rounded-xl bg-slate-800 overflow-hidden flex-shrink-0 flex items-center justify-center border border-slate-700">
                                            {player.photoURL ? (
                                               <img src={player.photoURL} alt="PFP" className="w-full h-full object-cover"/>
                                            ) : (
                                               <span className="font-bold text-slate-400 font-heading">{(player.username || 'U').charAt(0).toUpperCase()}</span>
                                            )}
                                         </div>
                                         
                                         <div className="flex flex-col">
                                           <span className="font-bold font-heading text-lg text-white truncate max-w-[120px] sm:max-w-[200px]">{player.username}</span>
                                           {player.uid === user?.uid && <span className="text-[10px] uppercase tracking-wider text-indigo-400 font-bold font-ui">You</span>}
                                         </div>
                                      </div>
                                      
                                      <div className="flex items-center gap-2 bg-slate-950 px-4 py-2 rounded-xl border border-slate-800 shadow-inner">
                                         <span className="text-orange-500 animate-pulse drop-shadow-md">🔥</span>
                                         <span className="font-black font-ui text-white text-xl">{player.currentStreak || 1}</span>
                                         <span className="text-slate-500 text-sm font-bold font-ui hidden sm:inline">Days</span>
                                      </div>
                                   </div>
                                ))}
                             </div>
                          )}
                       </div>
                    )}
                  </div>
                </div>
              )}

              {/* View: PROFILE */}
              {activeView === 'profile' && (
                <div className="px-6 md:px-10 pb-20 flex-1 flex justify-center">
                  <div className="w-full max-w-2xl">
                    <h2 className="text-3xl font-black font-heading text-white mb-8">My Profile</h2>
                    {!isRegistered ? (
                       <div className="bg-slate-900 border border-slate-800 rounded-3xl p-10 text-center shadow-xl mt-8">
                         <UserIcon size={64} className="mx-auto text-slate-700 mb-6" />
                         <h3 className="text-2xl font-bold font-heading text-white mb-3">Sign in to view your profile</h3>
                         <p className="text-slate-400 mb-8 max-w-sm mx-auto">Create an account or sign in to customize your profile identity across Nexis Games.</p>
                         <button onClick={() => setShowAuthModal(true)} className="px-8 py-3.5 bg-indigo-600 hover:bg-indigo-700 text-white font-bold font-ui tracking-wide rounded-xl transition-all shadow-lg shadow-indigo-500/20">
                           Sign In to Continue
                         </button>
                       </div>
                    ) : (
                       <div className="bg-slate-900 border border-slate-800 rounded-3xl p-8 shadow-xl mt-8">
                         <div className="flex items-center space-x-6 mb-8 pb-8 border-b border-slate-800">
                           
                           {/* Hover-to-Upload Profile Picture Component */}
                           <div className="relative group w-24 h-24 rounded-2xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center shadow-lg shadow-indigo-500/20 overflow-hidden flex-shrink-0 cursor-pointer border border-transparent hover:border-indigo-400 transition-all">
                             {profilePhotoUrl ? (
                                <img src={profilePhotoUrl} alt="Profile" className="w-full h-full object-cover" />
                             ) : (
                                <span className="font-bold text-4xl text-white font-heading">{(profileUsername || 'U').charAt(0).toUpperCase()}</span>
                             )}
                             
                             {/* Overlay overlay shows on hover */}
                             <div className="absolute inset-0 bg-slate-950/70 flex flex-col items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity backdrop-blur-sm">
                                <UploadIcon size={24} className="text-white mb-1" />
                                <span className="text-[10px] font-bold text-white font-ui uppercase tracking-wider">Upload</span>
                             </div>
                             
                             <input 
                               type="file" 
                               accept="image/*"
                               onChange={handlePhotoChange}
                               className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" 
                               title="Upload a custom profile picture"
                             />
                           </div>
                           
                           <div className="overflow-hidden">
                             <h3 className="text-2xl font-black font-heading text-white tracking-wide truncate">{user.displayName || 'Gamer'}</h3>
                             <p className="text-slate-400 mt-1 font-medium truncate font-ui text-lg">{user.email}</p>
                           </div>
                         </div>
                         
                         <form onSubmit={handleUpdateProfile} className="space-y-6">
                           <div>
                             <label className="block text-sm font-bold font-ui text-slate-400 mb-2 uppercase tracking-wider">Display Username</label>
                             <input 
                               type="text" 
                               value={profileUsername} 
                               onChange={e => setProfileUsername(e.target.value)} 
                               className="w-full bg-slate-950 border border-slate-800 rounded-xl px-5 py-4 font-ui text-lg text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all shadow-inner" 
                               placeholder="Enter your username" 
                             />
                           </div>
                           
                           <div className="pt-4 flex flex-col sm:flex-row items-center justify-between gap-4">
                             <div className="text-sm font-medium w-full sm:w-auto text-center sm:text-left">
                               {profileUpdateSuccess && (
                                 <span className="text-emerald-400 font-ui font-bold text-lg flex items-center justify-center sm:justify-start">
                                   <svg className="w-4 h-4 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7"></path></svg> 
                                   Profile updated successfully
                                 </span>
                               )}
                               {profileUpdateError && <span className="text-rose-400 font-ui font-bold text-lg">{profileUpdateError}</span>}
                             </div>
                             <button type="submit" disabled={isUpdatingProfile} className="w-full sm:w-auto px-8 py-3.5 bg-indigo-600 hover:bg-indigo-700 text-white font-bold font-ui tracking-wide text-lg rounded-xl transition-all disabled:opacity-50 shadow-lg shadow-indigo-500/20">
                               {isUpdatingProfile ? 'Saving...' : 'Save Changes'}
                             </button>
                           </div>
                         </form>
                       </div>
                    )}
                  </div>
                </div>
              )}
            </div>

            {/* Game Player View */}
            <div className={`absolute inset-0 flex flex-col bg-black transition-opacity duration-300 z-30 ${activeGame ? 'opacity-100 pointer-events-auto' : 'opacity-0 pointer-events-none'}`}>
              {activeGame && (
                <>
                  <div className={`h-14 bg-slate-900 border-b border-slate-800 flex items-center justify-between px-4 flex-shrink-0 transition-all ${isCssFullscreen ? 'hidden' : 'flex'}`}>
                    <div className="flex items-center space-x-4">
                      <button 
                        onClick={handleCloseGame}
                        className="flex items-center space-x-2 text-slate-400 hover:text-white bg-slate-800 hover:bg-slate-700 px-3 py-1.5 rounded-lg transition-colors"
                      >
                        <ChevronLeftIcon size={18} />
                        <span className="font-semibold text-sm font-ui">Hub</span>
                      </button>
                      <div className="h-6 w-px bg-slate-700"></div>
                      <div className="flex items-center space-x-3">
                      <div className="w-8 h-8 rounded-md overflow-hidden bg-slate-800 hidden sm:block">
                        <ActiveIcon />
                      </div>
                      <span className="font-bold font-heading text-white tracking-wide truncate max-w-[150px] sm:max-w-xs">{activeGame.title}</span>
                    </div>
                  </div>
                  
                  <div className="flex items-center space-x-3">
                    <button 
                      onClick={toggleFullscreen}
                      className="flex items-center space-x-2 text-slate-300 hover:text-white px-3 py-1.5 rounded-lg hover:bg-slate-800 transition-colors tooltip group relative"
                      title="Full Screen"
                    >
                      <Maximize2Icon size={18} />
                    </button>
                  </div>
                </div>
                
                <div 
                  className={`flex-1 w-full bg-slate-950 relative ${isCssFullscreen ? 'fixed inset-0 z-[100]' : ''}`} 
                    ref={playerContainerRef}
                  >
                    {isCssFullscreen && (
                      <button 
                        onClick={toggleFullscreen}
                        className="absolute top-4 right-4 z-[60] opacity-25 hover:opacity-100 bg-slate-900/80 hover:bg-slate-700 text-slate-300 hover:text-white p-2.5 rounded-lg border border-slate-700 backdrop-blur-sm transition-all shadow-xl"
                        title="Exit Full Screen (Esc)"
                      >
                        <Minimize2Icon size={20} />
                      </button>
                    )}

                    {adCountdown > 0 && (
                      <div className="absolute inset-0 z-50 bg-slate-900 flex flex-col items-center justify-center px-4 text-center">
                        <div className="bg-slate-800 p-8 rounded-3xl border border-slate-700 shadow-2xl max-w-lg w-full">
                          <h2 className="text-2xl font-black font-heading text-white mb-2 uppercase tracking-wider">Quick Sponsor Break</h2>
                          <div className="w-full h-px bg-slate-700 mb-6"></div>
                          <div className="text-6xl mb-6 animate-bounce">💧</div>
                          <p className="text-xl text-indigo-400 font-bold mb-8">Remember to drink a glass of water and sit up straight!</p>
                          <div className="flex flex-col items-center">
                            <div className="w-12 h-12 rounded-full border-4 border-indigo-500 border-t-transparent animate-spin mb-4"></div>
                            <p className="text-slate-400 font-medium font-ui text-lg">Your game will resume in <span className="text-white font-bold">{adCountdown}</span> seconds...</p>
                          </div>
                        </div>
                      </div>
                    )}

                  {iframeLoading && adCountdown === 0 && (
                    <div className="absolute inset-0 flex flex-col items-center justify-center z-0">
                      <div className="w-24 h-24 mb-6 animate-pulse text-indigo-500">
                        <ActiveIcon />
                      </div>
                      <p className="text-slate-400 font-medium font-ui text-lg animate-pulse">Connecting to {activeGame.title}...</p>
                    </div>
                  )}

                  {adCountdown === 0 && (
                    <iframe 
                      src={activeGame.src} 
                      title={activeGame.title}
                      onLoad={() => setIframeLoading(false)}
                      className={`w-full h-full border-0 relative z-10 transition-opacity duration-500 ${iframeLoading ? 'opacity-0' : 'opacity-100 bg-slate-950'}`}
                      allow="fullscreen; autoplay; gamepad; keyboard; pointer-lock"
                    ></iframe>
                  )}
                  </div>
                </>
              )}
            </div>

            {/* AUTH MODAL */}
            {showAuthModal && (
              <div className="absolute inset-0 z-[200] flex items-center justify-center bg-slate-950/80 backdrop-blur-sm p-4">
                 <div className="bg-slate-900 border border-slate-800 rounded-3xl p-8 w-full max-w-md shadow-2xl relative">
                    <button onClick={() => setShowAuthModal(false)} className="absolute top-4 right-4 text-slate-500 hover:text-white transition-colors">
                      <XIcon size={24} />
                    </button>
                    <h2 className="text-3xl font-black font-heading text-white mb-6">
                      {authMode === 'login' ? 'Welcome Back' : 'Join Nexis Games'}
                    </h2>
                    
                    {authError && <div className="mb-4 p-3 bg-rose-500/10 border border-rose-500/50 text-rose-400 font-ui font-bold rounded-lg text-sm">{authError}</div>}

                    <form onSubmit={authMode === 'login' ? handleLogin : handleSignup} className="space-y-4">
                      {authMode === 'signup' && (
                        <div>
                          <label className="block text-sm font-bold font-ui tracking-wide text-slate-400 mb-1">Username</label>
                          <input type="text" required value={username} onChange={e => setUsername(e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 font-ui text-lg text-white focus:outline-none focus:border-indigo-500 transition-colors" placeholder="ProGamer123" />
                        </div>
                      )}
                      <div>
                        <label className="block text-sm font-bold font-ui tracking-wide text-slate-400 mb-1">Email Address</label>
                        <input type="email" required value={email} onChange={e => setEmail(e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 font-ui text-lg text-white focus:outline-none focus:border-indigo-500 transition-colors" placeholder="player@example.com" />
                      </div>
                      <div>
                        <label className="block text-sm font-bold font-ui tracking-wide text-slate-400 mb-1">Password</label>
                        <div className="relative">
                          <input type={showPassword ? "text" : "password"} required minLength={6} value={password} onChange={e => setPassword(e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 pr-12 font-ui text-lg text-white focus:outline-none focus:border-indigo-500 transition-colors" placeholder="••••••••" />
                          <button type="button" onClick={() => setShowPassword(!showPassword)} className="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-400 hover:text-white transition-colors">
                            {showPassword ? <EyeOffIcon size={20} /> : <EyeIcon size={20} />}
                          </button>
                        </div>
                      </div>
                      
                      <button disabled={authLoading} type="submit" className="w-full py-3.5 bg-indigo-600 hover:bg-indigo-700 text-white font-bold font-ui text-lg tracking-wide rounded-xl transition-all mt-6 disabled:opacity-50 flex justify-center">
                        {authLoading ? (
                           <div className="w-6 h-6 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
                        ) : (
                           authMode === 'login' ? 'Sign In' : 'Create Account'
                        )}
                      </button>
                    </form>
                    
                    <div className="mt-6 text-center">
                      <button onClick={() => setAuthMode(authMode === 'login' ? 'signup' : 'login')} className="text-slate-400 hover:text-white font-ui font-bold text-sm transition-colors">
                        {authMode === 'login' ? "Don't have an account? Sign up" : "Already have an account? Sign in"}
                      </button>
                    </div>
                 </div>
              </div>
            )}

            {/* SETTINGS MODAL */}
            {showSettingsModal && (
              <div className="absolute inset-0 z-[200] flex items-center justify-center bg-slate-950/80 backdrop-blur-sm p-4">
                 <div className="bg-slate-900 border border-slate-800 rounded-3xl p-8 w-full max-w-md shadow-2xl relative">
                    <button onClick={() => setShowSettingsModal(false)} className="absolute top-4 right-4 text-slate-500 hover:text-white transition-colors">
                      <XIcon size={24} />
                    </button>
                    <h2 className="text-3xl font-black font-heading text-white mb-6">Settings</h2>
                    
                    <div className="space-y-6">
                      <div>
                        <h3 className="text-xl font-bold font-heading text-slate-200 mb-4">Audio</h3>
                        
                        <div className="space-y-4">
                          <div>
                            <div className="flex justify-between text-sm mb-2 font-ui text-lg">
                              <span className="text-slate-400 font-bold">Master Volume</span>
                              <span className="text-white font-bold">{masterVolume}%</span>
                            </div>
                            <input 
                              type="range" 
                              min="0" max="100" 
                              value={masterVolume} 
                              onChange={(e) => setMasterVolume(e.target.value)}
                              className="w-full accent-indigo-500 h-2 bg-slate-800 rounded-lg appearance-none cursor-pointer"
                            />
                          </div>
                          
                          <div>
                            <div className="flex justify-between text-sm mb-2 font-ui text-lg">
                              <span className="text-slate-400 font-bold">Music Volume</span>
                              <span className="text-white font-bold">{musicVolume}%</span>
                            </div>
                            <input 
                              type="range" 
                              min="0" max="100" 
                              value={musicVolume} 
                              onChange={(e) => setMusicVolume(e.target.value)}
                              className="w-full accent-indigo-500 h-2 bg-slate-800 rounded-lg appearance-none cursor-pointer"
                            />
                          </div>

                          <div>
                            <div className="flex justify-between text-sm mb-2 font-ui text-lg">
                              <span className="text-slate-400 font-bold">Sound Effects</span>
                              <span className="text-white font-bold">{sfxVolume}%</span>
                            </div>
                            <input 
                              type="range" 
                              min="0" max="100" 
                              value={sfxVolume} 
                              onChange={(e) => setSfxVolume(e.target.value)}
                              className="w-full accent-indigo-500 h-2 bg-slate-800 rounded-lg appearance-none cursor-pointer"
                            />
                          </div>
                        </div>
                      </div>
                    </div>
                    
                    <button 
                      onClick={() => setShowSettingsModal(false)} 
                      className="w-full py-3.5 bg-slate-800 hover:bg-slate-700 text-white font-bold font-ui text-lg tracking-wide rounded-xl transition-all mt-8"
                    >
                      Done
                    </button>
                 </div>
              </div>
            )}

          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
