    const getStreakDateString = (dateObj = new Date()) => { 
      const utc = dateObj.getTime() + (dateObj.getTimezoneOffset() * 60000); 
      const gmt7 = utc - (3600000 * 7); 
      const rolloverShift = new Date(gmt7 - (3600000 * 8)); 
      return rolloverShift.getFullYear() + '-' + String(rolloverShift.getMonth() + 1).padStart(2, '0') + '-' + String(rolloverShift.getDate()).padStart(2, '0'); 
    };

    const getDaysDifference = (d1, d2) => { 
      if (!d1 || !d2) return 999; 
      return Math.floor((new Date(d1 + 'T00:00:00Z') - new Date(d2 + 'T00:00:00Z')) / 86400000); 
    };

    const getEffectiveStreak = (p) => {

    };

    const processImageFile = (file, maxWidth, maxHeight, callback, isBanner = false) => {
      if (file.size > 5000000) { alert("Image is too large (max 5MB)."); return; }
      const reader = new FileReader();
      reader.onloadend = () => {
         const img = new Image();
         img.onload = () => {
           const canvas = document.createElement('canvas'); 
           let width = img.width; 
           let height = img.height;
           if (width > height) { 
             if (width > maxWidth) { height *= maxWidth / width; width = maxWidth; } 
           } else { 
             if (height > maxHeight) { width *= maxHeight / height; height = maxHeight; } 
           }
           canvas.width = width; 
           canvas.height = height; 
           const ctx = canvas.getContext('2d');
           if (isBanner) { 
             ctx.drawImage(img, 0, 0, width, height); 
             const grd = ctx.createLinearGradient(0, height - 100, 0, height); 
             grd.addColorStop(0, "transparent"); 
             grd.addColorStop(1, "rgba(0,0,0,0.5)"); 
             ctx.fillStyle = grd; 
             ctx.fillRect(0, height - 100, width, 100); 
           } else { 
             ctx.drawImage(img, 0, 0, width, height); 
           }
           callback(canvas.toDataURL('image/jpeg', 0.85));
         }; 
         img.src = reader.result;
      }; 
      reader.readAsDataURL(file);
    };

            userTag: tag,

            bio: profileBio.trim().slice(0, 160)

                      </button>
                    </div>
                  </div>
                  
                  <div className={`flex-1 w-full bg-slate-950 relative ${isCssFullscreen ? 'fixed inset-0 z-[100]' : ''}`} ref={playerContainerRef}>
                    
                    {/* Floating Exit Fullscreen Button (Only shows in CSS Fallback mode) */}
                    {isCssFullscreen && (
                      <button onClick={requestFullscreenSequence} className="absolute top-6 right-6 z-[60] opacity-30 hover:opacity-100 bg-slate-900/80 hover:bg-slate-700 text-slate-300 hover:text-white p-3 rounded-2xl border border-slate-700 backdrop-blur-md transition-all shadow-2xl active:scale-95" title="Exit Full Screen (Esc)">
                        <Minimize2Icon size={24} />
                      </button>
                    )}
                    
                    {/* Sponsor Break UI */}
                    {adCountdown > 0 && (
                      <div className="absolute inset-0 z-50 bg-slate-950 flex flex-col items-center justify-center px-4 text-center">
                        <div className="absolute inset-0 bg-indigo-500/5 mix-blend-screen animate-pulse"></div>
                        <div className="bg-slate-900/80 backdrop-blur-xl p-8 sm:p-12 rounded-[2.5rem] border border-slate-800/80 shadow-[0_0_50px_-10px_rgba(0,0,0,0.8)] max-w-3xl w-full relative overflow-hidden animate-in zoom-in-95 duration-300">
                          <div className="absolute bottom-0 left-0 h-2 bg-indigo-600 transition-all duration-1000 ease-linear" style={{width: `${(5 - adCountdown) * 20}%`}}></div>
                          <div className="flex flex-col sm:flex-row sm:justify-between items-center gap-4 mb-2">
                            <h2 className="text-3xl font-black font-heading text-white uppercase tracking-widest drop-shadow-md">Sponsor Break</h2>
                            <span className="text-slate-400 font-bold font-ui px-4 py-2 bg-slate-950/80 rounded-xl border border-slate-800 shadow-inner text-sm tracking-wider uppercase">Starting in {adCountdown}s</span>
                          </div>
                          
                          <AdSenseWidget />
                          
                        </div>
                      </div>
                    )}

                    {/* Pending Fullscreen (Requires user click) */}
                    {pendingFullscreen && adCountdown === 0 && (
                      <div className="absolute inset-0 z-50 bg-slate-950/90 backdrop-blur-sm flex flex-col items-center justify-center px-4 text-center">
                         <div className="bg-slate-900/90 border border-slate-800 p-8 rounded-[2.5rem] shadow-2xl max-w-sm w-full animate-in zoom-in-95 duration-300">
                            <h2 className="text-3xl font-black font-heading text-white mb-8 uppercase tracking-widest">Ready</h2>
                            <button onClick={executeFullscreen} className="w-full py-4 bg-indigo-600 hover:bg-indigo-500 text-white font-bold font-ui text-xl tracking-widest rounded-xl transition-all shadow-[0_0_15px_-3px_rgba(99,102,241,0.5)] active:scale-95 mb-4">
                              Enter Fullscreen
                            </button>
                            <button onClick={() => setPendingFullscreen(false)} className="text-slate-400 hover:text-white font-ui font-bold tracking-widest uppercase transition-colors">
                              Cancel
                            </button>
                         </div>
                      </div>
                    )}

                    {/* Loading Screen beneath game */}
                    {iframeLoading && adCountdown === 0 && !pendingFullscreen && (
                      <div className="absolute inset-0 flex flex-col items-center justify-center z-0 bg-slate-950">
                        <div className="w-32 h-32 mb-8 animate-pulse text-indigo-500 drop-shadow-[0_0_20px_rgba(99,102,241,0.5)]">
                          <ActiveIcon />
                        </div>
                        <p className="text-indigo-300 font-bold font-ui text-2xl tracking-widest animate-pulse drop-shadow-md">
                          CONNECTING SERVER...
                        </p>
                      </div>
                    )}
                    
                    {/* Game Iframe */}
                    {adCountdown === 0 && !pendingFullscreen && (
                      <iframe 
                        src={activeGame.src} 
                        title={activeGame.title} 
                        onLoad={() => setIframeLoading(false)} 
                        className={`w-full h-full border-0 relative z-10 transition-opacity duration-1000 ${iframeLoading ? 'opacity-0' : 'opacity-100 bg-slate-950'}`} 
                        allow="fullscreen; autoplay; gamepad; keyboard; pointer-lock"
                      ></iframe>
                    )}
                  </div>
                </>
              )}
            </div>

            {/* --- AUTHENTICATION MODAL --- */}
            {showAuthModal && (
              <div className="absolute inset-0 z-[200] flex items-center justify-center bg-black/80 backdrop-blur-md p-4 animate-modal-pop">
                 <div className="bg-[#0a0a0a] border border-white/10 rounded-3xl p-8 sm:p-10 w-full max-w-md shadow-2xl relative">
                    <button 
                      onClick={() => { setShowAuthModal(false); setAuthMode('login'); setAuthError(''); setResetMessage(''); }} 
                      className="absolute top-6 right-6 p-2 bg-white/5 rounded-xl text-slate-400 hover:text-white hover:bg-white/10 transition-colors active:scale-95"
                    >
                      <XIcon size={20} />
                    </button>
                    
                    <h2 className="text-3xl font-black font-heading text-white mb-8 tracking-wide">
                      {authMode === 'login' ? 'Welcome Back' : authMode === 'signup' ? 'Create Account' : 'Reset Password'}
                    </h2>
                    
                    {authError && (
                      <div className="mb-6 p-4 bg-white/5 border border-white/10 text-slate-200 font-ui font-semibold text-sm rounded-xl flex items-center gap-3">
                        <XIcon size={18} className="text-rose-500" /> {authError}
                      </div>
                    )}
                    
                    {resetMessage && (
                      <div className="mb-6 p-4 bg-white/5 border border-white/10 text-slate-200 font-ui font-semibold text-sm rounded-xl flex items-center gap-3">
                        <svg className="w-4 h-4 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7"></path>
                        </svg> 
                        {resetMessage}
                      </div>
                    )}
                    
                    <form onSubmit={authMode === 'login' ? handleLogin : authMode === 'signup' ? handleSignup : handlePasswordReset} className="space-y-4">
                      {authMode === 'signup' && (
                        <div>
                          <label className="block text-xs font-bold tracking-widest uppercase text-slate-500 mb-2 ml-1">Username</label>
                          <input 
                            type="text" 
                            required 
                            value={username} 
                            onChange={e => setUsername(e.target.value)} 
                            className="w-full bg-[#111] border border-white/10 rounded-xl px-4 py-3.5 font-ui text-base text-white focus:outline-none focus:border-white/30 transition-colors placeholder-slate-600" 
                            placeholder="ProGamer123" 
                          />
                        </div>
                      )}
                      
                      <div>
                        <label className="block text-xs font-bold tracking-widest uppercase text-slate-500 mb-2 ml-1">Email Address</label>
                        <input 
                          type="email" 
                          required 
                          value={email} 
                          onChange={e => setEmail(e.target.value)} 
                          className="w-full bg-[#111] border border-white/10 rounded-xl px-4 py-3.5 font-ui text-base text-white focus:outline-none focus:border-white/30 transition-colors placeholder-slate-600" 
                          placeholder="player@example.com" 
                        />
                      </div>
                      
                      {authMode !== 'reset' && (
                        <div>
                          <label className="block text-xs font-bold tracking-widest uppercase text-slate-500 mb-2 ml-1">Password</label>
                          <div className="relative">
                            <input 
                              type={showPassword ? "text" : "password"} 
                              required 
                              minLength={6} 
                              value={password} 
                              onChange={e => setPassword(e.target.value)} 
                              className="w-full bg-[#111] border border-white/10 rounded-xl px-4 py-3.5 pr-12 font-ui text-base text-white focus:outline-none focus:border-white/30 transition-colors placeholder-slate-600" 
                              placeholder="••••••••" 
                            />
                            <button 
                              type="button" 
                              onClick={() => setShowPassword(!showPassword)} 
                              className="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-500 hover:text-white transition-colors"
                            >
                              {showPassword ? <EyeOffIcon size={18} /> : <EyeIcon size={18} />}
                            </button>
                          </div>
                          {authMode === 'login' && (
                            <div className="mt-3 text-right">
                              <button 
                                type="button" 
                                onClick={() => { setAuthMode('reset'); setAuthError(''); setResetMessage(''); }} 
                                className="text-xs font-ui font-bold text-slate-400 hover:text-white transition-colors"
                              >
                                Forgot password?
                              </button>
                            </div>
                          )}
                        </div>
                      )}
                      
                      {authMode === 'signup' && (
                        <div className="bg-[#111] p-4 rounded-xl border border-white/5 mt-2">
                          <label className="block text-xs font-bold tracking-widest uppercase text-slate-500 mb-2 flex items-center gap-2">
                            <ShieldIcon size={14}/> Anti-Bot Check
                          </label>
                          <div className="flex items-center gap-3">
                            <span className="text-lg font-bold text-white">{botCheck.num1} + {botCheck.num2} = </span>
                            <input 
                              type="number" 
                              required 
                              value={botCheck.answer} 
                              onChange={e => setBotCheck({...botCheck, answer: e.target.value})} 
                              className="flex-1 bg-[#0a0a0a] border border-white/10 rounded-lg px-3 py-2 font-ui text-base text-white focus:outline-none focus:border-white/30 transition-colors" 
                              placeholder="?" 
                            />
                          </div>
                        </div>
                      )}

                      <button 
                        disabled={authLoading || authCooldown} 
                        type="submit" 
                        className="w-full py-4 bg-white hover:bg-slate-200 text-black font-bold font-ui text-sm tracking-widest uppercase rounded-xl transition-all mt-8 disabled:opacity-50 flex justify-center active:scale-95"
                      >
                        {authLoading ? (
                          <div className="w-5 h-5 border-2 border-black border-t-transparent rounded-full animate-spin"></div>
                        ) : ( 
                          authMode === 'login' ? 'Sign In' : authMode === 'signup' ? 'Create Account' : 'Send Reset Link' 
                        )}
                      </button>
                    </form>
                    
                    <div className="mt-8 text-center border-t border-white/5 pt-6">
                      {authMode === 'reset' ? (
                        <button 
                          onClick={() => { setAuthMode('login'); setAuthError(''); setResetMessage(''); }} 
                          className="text-slate-400 hover:text-white font-ui font-bold text-sm transition-colors"
                        >
                          Back to Sign In
                        </button>
                      ) : (
                        <button 
                          onClick={() => { setAuthMode(authMode === 'login' ? 'signup' : 'login'); setAuthError(''); }} 
                          className="text-slate-400 hover:text-white font-ui font-bold text-sm transition-colors"
                        >
                          {authMode === 'login' ? "Don't have an account? Sign up" : "Already have an account? Sign in"}
                        </button>
                      )}
                    </div>
                 </div>
              </div>
            )}
            
            {/* --- TOAST NOTIFICATIONS --- */}
            {toast && (
              <div className={`fixed bottom-6 right-6 px-6 py-4 rounded-2xl shadow-[0_10px_40px_-10px_rgba(0,0,0,0.5)] z-[300] font-ui font-bold text-xl flex items-center gap-3 animate-toast-slide border border-white/10 ${toast.type === 'error' ? 'bg-rose-600 text-white' : 'bg-indigo-600 text-white'}`}>
                {toast.type === 'error' ? <XIcon size={24}/> : <TrophyIcon size={24}/>}
                {toast.message}
              </div>
            )}

          </main>
        </div>
      );
    }
    
    // --- APP INITIALIZATION ---
    const root = ReactDOM.createRoot(document.getElementById('root')); 
    root.render(<App />);
  </script>
</body>
</html>
