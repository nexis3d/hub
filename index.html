                          <h2 className="text-4xl md:text-6xl font-black font-heading text-white mb-4">{FeaturedGame.title}</h2>
                          <button className="flex items-center space-x-3 bg-white text-slate-950 px-8 py-4 rounded-2xl font-bold text-xl hover:shadow-[0_0_30px_rgba(255,255,255,0.5)] transition-all"><PlayIcon size={24} fill="currentColor"/><span>Play Now</span></button>
                        </div>
                      </div>
                    </div>
                  )}

                  <div className="px-6 md:px-10 relative z-0 pb-10">
                    <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-8">
                      <h3 className="text-3xl font-bold font-heading text-white">{activeCategory === 'Favorites' ? 'Your Favorites' : 'Library'}</h3>
                      <div className="flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
                        {GAME_CATEGORIES.map(cat => (
                          <button key={cat} onClick={() => setActiveCategory(cat)} className={`px-5 py-2.5 rounded-2xl font-bold text-lg whitespace-nowrap transition-all border ${activeCategory === cat ? 'bg-indigo-600 text-white' : 'bg-slate-900/80 text-slate-400'}`}>{cat}</button>
                        ))}
                      </div>
                    </div>
                    
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                      {filteredGames.map((game) => (
                        <div key={game.id} className="group relative bg-slate-900/80 backdrop-blur-xl border border-slate-800/80 rounded-[2rem] overflow-hidden hover:border-indigo-500/50 hover:-translate-y-2 transition-all cursor-pointer flex flex-col h-full" onClick={() => handleLaunchGame(game)}>
                          <div className={`w-full aspect-video bg-gradient-to-br ${game.theme} p-6 relative flex items-center justify-center`}><div className="w-32 h-32 group-hover:scale-[1.15] transition-transform duration-500"><game.icon /></div></div>
                          <div className="p-6 flex flex-col flex-1">
                            <div className="flex items-center gap-2 mb-1"><h4 className="text-2xl font-bold text-slate-100 truncate">{game.title}</h4>{game.isBeta && <span className="px-2 py-0.5 text-[10px] font-black uppercase bg-rose-500/20 text-rose-400 rounded-md">Beta</span>}</div>
                            <p className="text-slate-400 mb-6">{game.developer}</p>
                            <div className="mt-auto flex flex-wrap gap-2">{game.tags.map(tag => <span key={tag} className="px-3 py-1 text-xs font-bold uppercase bg-slate-950/80 text-slate-300 rounded-lg">{tag}</span>)}</div>
                          </div>
                          <button onClick={(e) => toggleFavorite(e, game.id)} className={`absolute top-4 right-4 z-20 p-2.5 rounded-full border ${favorites.includes(game.id) ? 'bg-rose-500/20 text-rose-500' : 'bg-slate-900/60 text-white'}`}><HeartIcon size={20} fill={favorites.includes(game.id) ? "currentColor" : "none"} /></button>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              )}

              {activeView === 'leaderboard' && (
                <div className="animate-in fade-in p-6 md:px-10">
                   <h2 className="text-4xl font-black text-white mb-10 flex items-center gap-4"><div className="p-3 bg-yellow-500 rounded-2xl"><TrophyIcon size={32}/></div> Global Rankings</h2>
                   <div className="bg-slate-900/80 rounded-[2.5rem] overflow-hidden shadow-2xl p-4">
                      {leaderboard.map((p, i) => (
                         <div key={p.uid} onClick={() => setViewingPlayer(p)} className="flex items-center justify-between p-5 rounded-2xl hover:bg-slate-800 cursor-pointer">
                            <div className="flex items-center gap-6"><span className="text-3xl font-black text-slate-500">#{i+1}</span><div className="w-16 h-16 rounded-2xl bg-slate-800 overflow-hidden">{p.photoURL ? <img src={p.photoURL}/> : <span className="flex justify-center items-center h-full text-2xl font-bold text-white">{p.username.charAt(0)}</span>}</div><span className="text-2xl font-bold text-white">{p.username}</span></div>
                            <div className="bg-slate-950 px-6 py-3 rounded-2xl flex items-center gap-3"><span className="text-2xl text-orange-500 animate-pulse">🔥</span><span className="text-3xl font-black text-white">{getEffectiveStreak(p)}</span></div>
                         </div>
                      ))}
                   </div>
                </div>
              )}

              {activeView === 'profile' && (
                <div className="animate-in fade-in p-6 md:px-10 flex justify-center">
                  <div className="w-full max-w-3xl">
                    <h2 className="text-4xl font-black text-white mb-10">User Profile</h2>
                    {!isRegistered ? <div className="text-center p-10"><button onClick={()=>setShowAuthModal(true)} className="px-10 py-4 bg-indigo-600 text-white rounded-2xl">Sign In</button></div> : <div className="bg-slate-900/80 rounded-[2.5rem] overflow-hidden shadow-2xl">
                      <div className="h-48 bg-slate-800">{profileBannerUrl && <img src={profileBannerUrl} className="w-full h-full object-cover"/>}</div>
                      <div className="p-10 pt-0">
                        <div className="w-40 h-40 rounded-[2.5rem] bg-indigo-600 -mt-20 border-4 border-slate-900 flex justify-center items-center overflow-hidden mb-6">{profilePhotoUrl ? <img src={profilePhotoUrl} className="w-full h-full object-cover"/> : <span className="text-6xl text-white font-bold">{user.displayName?.charAt(0)}</span>}</div>
                        <h3 className="text-4xl font-black text-white">{user.displayName} <span className="text-slate-500 text-xl">#{currentUserTag}</span></h3>
                        <div className="mt-8 flex gap-4"><button onClick={()=>handleLogout()} className="px-8 py-3 bg-rose-600 text-white font-bold rounded-xl">Sign Out</button></div>
                      </div>
                    </div>}
                  </div>
                </div>
              )}

            </div>

            <div className={`absolute inset-0 flex flex-col bg-black transition-all duration-500 z-[70] ${activeGame ? 'opacity-100' : 'opacity-0 pointer-events-none'}`}>
              {activeGame && (
                <>
                  <div className={`h-16 bg-slate-900 border-b border-slate-800 flex items-center justify-between px-6 ${isCssFullscreen ? 'hidden' : 'flex'}`}>
                    <div className="flex items-center space-x-6"><button onClick={handleCloseGame} className="flex items-center space-x-2 text-white bg-slate-800 px-4 py-2 rounded-xl"><ChevronLeftIcon size={20} /><span>Exit</span></button><h3 className="text-xl font-bold text-white">{activeGame.title}</h3></div>
                    <button onClick={toggleFullscreen} className="text-white p-2 bg-slate-800 rounded-xl"><Maximize2Icon size={22} /></button>
                  </div>
                  <div className={`flex-1 w-full bg-slate-950 relative ${isCssFullscreen ? 'fixed inset-0 z-[100]' : ''}`} ref={playerContainerRef}>
                    {adCountdown > 0 && <div className="absolute inset-0 z-50 bg-slate-950 flex flex-col items-center justify-center"><h2 className="text-3xl text-white">Sponsor Break</h2><span className="text-6xl text-white">{adCountdown}</span></div>}
                    {adCountdown === 0 && <iframe src={activeGame.src} className="w-full h-full border-0 relative z-10" allow="fullscreen; autoplay; gamepad; keyboard;"></iframe>}
                  </div>
                </>
              )}
            </div>

            {showAuthModal && (
              <div className="absolute inset-0 z-[200] flex items-center justify-center bg-slate-950/80 backdrop-blur-md">
                 <div className="bg-slate-900 border border-slate-800 rounded-[2.5rem] p-10 w-full max-w-lg relative">
                    <button onClick={() => setShowAuthModal(false)} className="absolute top-6 right-6 text-slate-400"><XIcon size={24}/></button>
                    <h2 className="text-4xl font-black text-white mb-8">{authMode === 'login' ? 'Sign In' : 'Sign Up'}</h2>
                    {authError && <p className="text-rose-400 mb-4">{authError}</p>}
                    <form onSubmit={authMode === 'login' ? handleLogin : handleSignup} className="space-y-4">
                      {authMode === 'signup' && <input type="text" value={username} onChange={e=>setUsername(e.target.value)} className="w-full bg-slate-950 rounded-2xl px-5 py-4 text-white" placeholder="Username" />}
                      <input type="email" value={email} onChange={e=>setEmail(e.target.value)} className="w-full bg-slate-950 rounded-2xl px-5 py-4 text-white" placeholder="Email" />
                      <input type="password" value={password} onChange={e=>setPassword(e.target.value)} className="w-full bg-slate-950 rounded-2xl px-5 py-4 text-white" placeholder="Password" />
                      <button disabled={authLoading} type="submit" className="w-full bg-indigo-600 text-white font-bold py-4 rounded-2xl mt-4">{authMode === 'login' ? 'Login' : 'Create Account'}</button>
                    </form>
                    <button onClick={()=>setAuthMode(authMode==='login'?'signup':'login')} className="w-full text-slate-400 mt-6">Switch to {authMode==='login'?'Sign Up':'Login'}</button>
                 </div>
              </div>
            )}
          </main>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);
  </script>
</body>
</html>
