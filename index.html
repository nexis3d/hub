  <!-- =====[ SILENT ERROR HANDLER ]===== -->
  <script>
    window.addEventListener('error', function(e){
      if (e.message === 'Script error.' || (e.error && e.error.message === 'Script error.')) {
        e.preventDefault(); e.stopImmediatePropagation();
      }
    }, true);
    var _oe = window.onerror;
    window.onerror = function(m,u,l,c,err){ if(m==='Script error.')return true; if(_oe)return _oe(m,u,l,c,err); return false; };
  </script>

  <!-- =====[ 3RD-PARTY SCRIPTS (async/defer for speed) ]===== -->

  <!-- =====[ TAILWIND CDN + CONFIG ]===== -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { obsidian: { 900: '#030008', 800: '#0a0a0f', 700: '#12121a', 950: '#010003' } },

          },

            'toast-slide':{ '0%':{opacity:'0',transform:'translateY(100%) scale(0.9)'}, '100%':{opacity:'1',transform:'translateY(0) scale(1)'} }
          }
        }
      }
    }
  </script>

  <script crossorigin="anonymous" src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<body class="bg-obsidian-900 text-slate-300 font-sans m-0 overflow-hidden selection:bg-violet-500/40">

  <!-- NATIVE HTML LOADING SCREEN (Indestructible Failsafe) -->
  <div id="nexis-global-loader" style="position:fixed;inset:0;background:#030008;z-index:9999999;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .4s ease,visibility .4s ease;overflow:hidden">
    <div style="position:absolute;inset:0;background:radial-gradient(circle at center,#1e1b4b 0%,#030008 60%);opacity:.9"></div>
    <div style="position:absolute;top:-10%;left:0;width:600px;height:600px;background:#a855f7;border-radius:50%;filter:blur(120px);opacity:.2;transform:translate(-30%,-30%);animation:float-logo 8s ease-in-out infinite alternate"></div>
    <div style="position:absolute;bottom:-10%;right:0;width:700px;height:700px;background:#c026d3;border-radius:50%;filter:blur(120px);opacity:.2;transform:translate(30%,30%);animation:float-logo 10s ease-in-out infinite alternate-reverse"></div>
    <div style="animation:float-logo 4s ease-in-out infinite;z-index:10;position:relative;filter:drop-shadow(0 15px 25px rgba(0,0,0,.8))">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
        <defs>
          <linearGradient id="loaderNexisGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#a855f7" />
            <stop offset="100%" stop-color="#c026d3" />
          </linearGradient>
        </defs>
        <rect width="100" height="100" rx="24" fill="url(#loaderNexisGrad)" />
        <rect width="100" height="100" rx="24" fill="#ffffff" opacity="0.15" />
        <rect width="98" height="98" x="1" y="1" rx="23" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.2" />
        <g transform="translate(25, 25) scale(2.0833)" fill="#ffffff">
          <path d="M2 2 L 18 2 L 2 18 Z" />
          <path d="M22 6 L 22 22 L 6 22 Z" />
        </g>
      </svg>
    </div>
    <div style="margin-top:2.5rem;font-family:'Fira Sans',sans-serif;font-weight:900;font-size:2.2rem;letter-spacing:.4em;z-index:10;background:linear-gradient(90deg,#94a3b8 0%,#ffffff 50%,#94a3b8 100%);background-size:200% auto;color:transparent;-webkit-background-clip:text;background-clip:text;animation:text-shimmer 3s linear infinite;filter:drop-shadow(0 4px 6px rgba(0,0,0,.5))">
      NEXIS<span style="color:#c084fc;-webkit-text-fill-color:#c084fc">GAMES</span>
    </div>
    <div style="margin-top:1.5rem;width:260px;height:3px;background:#0f172a;border-radius:4px;overflow:hidden;z-index:10;position:relative;box-shadow:0 0 10px rgba(0,0,0,.5),inset 0 1px 2px rgba(0,0,0,.8)">
      <div style="position:absolute;top:0;left:0;height:100%;width:50%;background:linear-gradient(90deg,transparent,#c084fc,#38bdf8,#c026d3,transparent);border-radius:4px;animation:loading-bar 1.2s infinite ease-in-out;box-shadow:0 0 10px #c084fc"></div>
    </div>
  </div>

  <!-- Failsafe: removes loader after 4s no matter what -->
  <script>
    window.addEventListener('load', function(){
      setTimeout(function(){
        var l = document.getElementById('nexis-global-loader');
        if (l) { l.style.opacity='0'; setTimeout(function(){ l && l.remove(); }, 400); }
      }, 4000);
    });
  </script>

  <div id="root"></div>

  <!-- =====[ OBFUSCATED REACT APP (pre-compiled JSX, external for caching) ]===== -->
  <script type="module" src="/js/app.js"></script>
</body>
