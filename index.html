  <script>
    window.addEventListener('error', function(e) {
      if (e.message === 'Script error.' || (e.error && e.error.message === 'Script error.')) {
        e.preventDefault(); e.stopImmediatePropagation();
      }
    }, true);
    const originalOnError = window.onerror;
    window.onerror = function(msg, url, line, col, error) {
      if (msg === 'Script error.') return true;
      if (originalOnError) return originalOnError(msg, url, line, col, error);
      return false;
    };
  </script>

    const getStreakDateString = (dateObj = new Date()) => { 
      const utc = dateObj.getTime() + (dateObj.getTimezoneOffset() * 60000); 
      const gmt7 = utc - (3600000 * 7); 
      const rolloverShift = new Date(gmt7 - (3600000 * 8)); 
      return rolloverShift.getFullYear() + '-' + String(rolloverShift.getMonth() + 1).padStart(2, '0') + '-' + String(rolloverShift.getDate()).padStart(2, '0'); 
    };

    const getDaysDifference = (d1, d2) => { 
      if (!d1 || !d2) return 999; 
      return Math.floor((new Date(d1 + 'T00:00:00Z') - new Date(d2 + 'T00:00:00Z')) / 86400000); 
    };

    const getEffectiveStreak = (p) => { 
      if (!p.lastPlayedDate || !p.currentStreak) return 0; 
      return getDaysDifference(getStreakDateString(), p.lastPlayedDate) <= 1 ? p.currentStreak : 0; 
    };

    const processImageFile = (file, maxWidth, maxHeight, callback, isBanner = false) => {
      if (file.size > 5000000) { alert("Image is too large (max 5MB)."); return; }
      const reader = new FileReader();
      reader.onloadend = () => {
         const img = new Image();
         img.onload = () => {
           const canvas = document.createElement('canvas'); 
           let width = img.width; 
           let height = img.height;
           if (width > height) { 
             if (width > maxWidth) { height *= maxWidth / width; width = maxWidth; } 
           } else { 
             if (height > maxHeight) { width *= maxHeight / height; height = maxHeight; } 
           }
           canvas.width = width; 
           canvas.height = height; 
           const ctx = canvas.getContext('2d');
           if (isBanner) { 
             ctx.drawImage(img, 0, 0, width, height); 
             const grd = ctx.createLinearGradient(0, height - 100, 0, height); 
             grd.addColorStop(0, "transparent"); 
             grd.addColorStop(1, "rgba(0,0,0,0.5)"); 
             ctx.fillStyle = grd; 
             ctx.fillRect(0, height - 100, width, 100); 
           } else { 
             ctx.drawImage(img, 0, 0, width, height); 
           }
           callback(canvas.toDataURL('image/jpeg', 0.85));
         }; 
         img.src = reader.result;
      }; 
      reader.readAsDataURL(file);
    };

        e.preventDefault();

        setAuthError(''); 
        setAuthLoading(true); 
        setAuthCooldown(true);

        try { 
          const userCredential = await signInWithEmailAndPassword(auth, email, password); 
          
          if (!userCredential.user.emailVerified) {

            await signOut(auth);
            throw new Error("Security Error: Email not verified! We just sent a NEW verification link to your inbox/spam folder. Please click it to continue.");
          }
          
          // Clear any failed attempts upon a successful login

          setShowAuthModal(false); 
          showToast("Logged in!"); 
          setAuthLoading(false);
          setAuthCooldown(false);

                        <div className="p-6 sm:p-8 border-b border-white/5 bg-obsidian-950/50 flex justify-between items-center">
                          <h3 className="text-2xl font-bold font-heading text-white">Player Database</h3>
                          <span className="bg-rose-500/20 text-rose-400 font-bold px-4 py-1.5 rounded-full border border-rose-500/40 font-ui text-sm uppercase tracking-widest">
                            {allUsers.length} Players
                          </span>
                        </div>
                        
                        <div className="overflow-y-auto p-4 flex-1 scrollbar-hide">
                           {allUsers.length === 0 ? (
                              <div className="p-20 text-center text-slate-500 flex flex-col items-center">
                                <div className="w-16 h-16 border-4 border-rose-600 border-t-transparent rounded-full animate-spin mb-6 shadow-[0_0_15px_rgba(225,29,72,0.5)]"></div>
                                <p className="text-xl font-bold font-ui">Loading player database...</p>
                              </div>
                           ) : (
                              <div className="space-y-3">
                                 {allUsers.map(u => (
                                    <div key={u.uid} className="flex flex-col sm:flex-row sm:items-center justify-between bg-obsidian-950/50 p-4 sm:p-5 rounded-2xl border border-white/5 hover:border-rose-500/50 transition-colors shadow-inner">
                                       <div className="flex items-center gap-4 sm:gap-5 mb-4 sm:mb-0">
                                          <div className={`w-14 h-14 rounded-xl bg-obsidian-800 overflow-hidden flex-shrink-0 flex items-center justify-center border ${AVATAR_FRAMES.find(f=>f.id===u.userFrame)?.style || 'border-white/10'} shadow-lg`}>
                                            {u.photoURL ? (
                                              <img src={u.photoURL} alt="PFP" className="w-full h-full object-cover"/> 
                                            ) : (
                                              <span className="font-bold text-xl text-white font-heading">{(u.username || 'U').charAt(0).toUpperCase()}</span>
                                            )}
                                          </div>
                                          <div>
                                            <div className="flex items-center gap-2">
                                              <span className="font-bold font-heading text-xl text-white">{u.username}</span>
                                              <span className="text-slate-500 text-sm font-ui opacity-70">#{u.userTag}</span>
                                            </div>
                                            <div className="flex items-center gap-2 mt-1.5 flex-wrap">
                                              {u.badges?.includes('Verified') && <span className="text-xs font-bold font-ui text-emerald-400 bg-emerald-500/20 px-2 py-0.5 rounded border border-emerald-500/30">Verified</span>}
                                              <span className="text-xs font-bold font-ui text-slate-300 bg-obsidian-800 px-2 py-0.5 rounded border border-white/10">Lvl {u.currentLevel || 1}</span>
                                              {u.status === 'banned' && <span className="text-xs font-bold font-ui text-rose-500 bg-rose-500/10 px-2 py-0.5 rounded border border-rose-500/20 uppercase tracking-wider">Banned</span>}
                                              {u.status === 'suspended' && <span className="text-xs font-bold font-ui text-amber-500 bg-amber-500/10 px-2 py-0.5 rounded border border-amber-500/20 uppercase tracking-wider">Suspended</span>}
                                            </div>
                                          </div>
                                       </div>
                                       <button 
                                         onClick={() => openAdminModal(u)} 
                                         className="w-full sm:w-auto px-6 py-3 bg-obsidian-800 hover:bg-obsidian-700 border border-white/10 text-white font-bold font-ui uppercase tracking-widest text-sm rounded-xl transition-all active:scale-95 whitespace-nowrap"
                                       >
                                         Manage
                                       </button>
                                    </div>
                                 ))}
                              </div>
                           )}
                        </div>
                      </div>
                    </div>
                  </div>
                )}
                {/* --- SETTINGS, ABOUT, ADMIN VIEWS --- */}
                {(activeView === 'about' || activeView === 'settings' || activeView === 'admin') && (
                   <div className="p-10 text-center animate-in fade-in flex flex-col items-center justify-center h-full pb-32">
                      <SettingsIcon size={64} className="text-slate-500 opacity-30 mb-6" />
                      <h2 className="text-3xl font-black text-white capitalize">{activeView} Area</h2>
                      <p className="text-slate-400 mt-4 text-lg">You are accessing the {activeView} module.</p>
                      {activeView === 'admin' && <p className="mt-4 text-rose-400 font-bold uppercase tracking-widest">Admin Privileges Confirmed.</p>}
                   </div>
                )}

              </div>
            </div>

            {/* --- SLIDING GLOBAL & PRIVATE CHAT PANEL --- */}
            {showChatPanel && (
              <div 
                className="fixed inset-0 bg-black/60 backdrop-blur-sm z-[105]" 
                style={{ animation: 'chatFadeIn 0.3s ease-out forwards' }} 
                onClick={() => setShowChatPanel(false)}
              ></div>
            )}
            <div className={`fixed top-0 right-0 h-screen w-80 sm:w-96 bg-obsidian-950/95 backdrop-blur-2xl border-l border-white/10 z-[110] transform transition-transform duration-300 ease-[cubic-bezier(0.4,0,0.2,1)] shadow-[-20px_0_50px_rgba(0,0,0,0.5)] flex flex-col ${showChatPanel ? 'translate-x-0' : 'translate-x-full'}`}>
               <div className={`p-5 border-b border-white/10 bg-gradient-to-r ${activeThemeColors.gradient} flex justify-between items-center`}>
                  {activeChatTab === 'global' && (
                      <>
                          <h3 className="font-black font-heading text-white text-xl flex items-center gap-2"><MessageIcon size={24}/> Global Chat</h3>
                          <div className="flex gap-3 items-center">
                              <button onClick={()=>setActiveChatTab('friends')} className="text-white/80 hover:text-white text-sm font-bold bg-black/20 px-3 py-1.5 rounded-lg transition-colors">Friends</button>
                              <button onClick={()=>setShowChatPanel(false)} className="text-white/70 hover:text-white transition-colors"><XIcon size={24}/></button>
                          </div>
                      </>
                  )}
                  {activeChatTab === 'friends' && (
                      <>
                          <h3 className="font-black font-heading text-white text-xl flex items-center gap-2"><UserIcon size={24}/> Friends List</h3>
                          <div className="flex gap-3 items-center">
                              <button onClick={()=>setActiveChatTab('global')} className="text-white/80 hover:text-white text-sm font-bold bg-black/20 px-3 py-1.5 rounded-lg transition-colors">Global</button>
                              <button onClick={()=>setShowChatPanel(false)} className="text-white/70 hover:text-white transition-colors"><XIcon size={24}/></button>
                          </div>
                      </>
                  )}
                  {activeChatTab !== 'global' && activeChatTab !== 'friends' && (
                      <>
                          <button onClick={()=>setActiveChatTab('friends')} className="text-white/80 hover:text-white flex items-center gap-1 font-bold text-sm bg-black/20 px-3 py-1.5 rounded-lg transition-colors"><ChevronLeftIcon size={18}/> Back</button>
                          <h3 className="font-black font-heading text-white text-lg truncate px-2">Private Chat</h3>
                          <button onClick={()=>setShowChatPanel(false)} className="text-white/70 hover:text-white transition-colors"><XIcon size={24}/></button>
                      </>
                  )}
               </div>
               
               <div className="flex-1 overflow-y-auto p-4 space-y-4">
                  {!isRegistered ? (
                     <div className="h-full flex flex-col items-center justify-center text-center px-4">
                        <MessageIcon size={48} className="text-slate-600 mb-4"/>
                        <p className="text-slate-400 font-ui mb-4">Sign in to join the conversation with other players!</p>
                        <button onClick={()=>{setShowChatPanel(false); setShowAuthModal(true)}} className={`px-6 py-2 bg-obsidian-800 border border-white/20 rounded-lg text-white font-bold`}>Sign In</button>
                     </div>
                  ) : (!badges.includes('Verified') && currentUserTag !== 'MOFU') ? (
                     <div className="h-full flex flex-col items-center justify-center text-center px-4">
                        <ShieldIcon size={48} className="text-rose-500 mb-4 opacity-50"/>
                        <p className="text-slate-300 font-bold font-ui mb-2">Restricted Access</p>
                        <p className="text-slate-500 font-ui text-sm">You need the <span className="text-white font-bold">Verified</span> badge to access global and private chat. Play games or contact an Admin to get verified!</p>
                     </div>
                  ) : activeChatTab === 'friends' ? (
                     <div className="space-y-2">
                        {friends.length === 0 ? (
                            <div className="text-center mt-10">
                               <UserIcon size={40} className="text-slate-600 mx-auto mb-4" />
                               <p className="text-slate-400 font-ui">No friends yet.</p>
                               <p className="text-slate-500 text-sm mt-2">Find players on the Leaderboard and click their profile to add them!</p>
                            </div>
                        ) : (
                            allUsers.filter(u => friends.includes(u.uid)).map(friend => (
                                <div key={friend.uid} onClick={() => setActiveChatTab(friend.uid)} className="flex items-center gap-3 p-3 bg-obsidian-800/50 rounded-xl hover:bg-obsidian-800 cursor-pointer border border-white/5 transition-colors" style={{ animation: 'slideInRight 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards' }}>
                                    <div className={`w-10 h-10 rounded-lg bg-obsidian-900 border ${AVATAR_FRAMES.find(f=>f.id===friend.userFrame)?.style || 'border-white/10'} overflow-hidden flex-shrink-0 flex items-center justify-center`}>
                                        {friend.photoURL ? <img src={friend.photoURL} className="w-full h-full object-cover"/> : <span className="font-bold text-white">{friend.username.charAt(0).toUpperCase()}</span>}
                                    </div>
                                    <div className="flex-1 overflow-hidden">
                                        <h4 className="font-bold text-white truncate text-sm">{friend.username}</h4>
                                        <p className="text-xs text-slate-500 truncate">#{friend.userTag}</p>
                                    </div>
                                    <div className={`p-2 bg-white/10 text-white rounded-lg`}><MessageIcon size={16}/></div>
                                </div>
                            ))
                        )}
                     </div>
                  ) : (
                     (activeChatTab === 'global' ? globalChat : privateChatMessages).map(msg => (
                        <div key={msg.id} className={`flex gap-3 ${msg.uid === user.uid ? 'flex-row-reverse' : ''}`} style={{ animation: 'slideInRight 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards' }}>
                           <div className={`w-8 h-8 rounded-lg bg-obsidian-800 flex-shrink-0 flex items-center justify-center border ${AVATAR_FRAMES.find(f=>f.id===msg.frame)?.style || 'border-white/10'} overflow-hidden`}>
                              {msg.photoURL ? <img src={msg.photoURL} className="w-full h-full object-cover"/> : <span className="text-xs font-bold text-white">{msg.username.charAt(0).toUpperCase()}</span>}
                           </div>
                           <div className={`flex flex-col ${msg.uid === user.uid ? 'items-end' : 'items-start'} max-w-[75%]`}>
                              <span className="text-[10px] text-slate-500 font-bold mb-1">{msg.username} <span className="opacity-50">#{msg.tag}</span></span>
                              <div className={`px-4 py-2 rounded-2xl text-sm font-ui break-words ${msg.uid === user.uid ? `bg-white/10 border border-white/20 text-white rounded-tr-sm` : 'bg-obsidian-800 text-slate-200 border border-white/5 rounded-tl-sm'}`}>
                                 {msg.text}
                              </div>
                           </div>
                        </div>
                     ))
                  )}
                  <div ref={chatEndRef}></div>
               </div>
               
               {isRegistered && (badges.includes('Verified') || currentUserTag === 'MOFU') && activeChatTab !== 'friends' && (
                  <form onSubmit={sendChat} className="p-4 border-t border-white/10 bg-obsidian-900">
                     <div className="relative">
                        <input type="text" maxLength={150} value={chatMessage} onChange={e=>setChatMessage(e.target.value)} placeholder="Say something..." className="w-full bg-obsidian-950 border border-white/10 rounded-full py-3 pl-4 pr-12 text-white text-sm focus:outline-none focus:border-white/30" />
                        <button type="submit" disabled={!chatMessage.trim()} className={`absolute right-2 top-2 p-1.5 rounded-full ${chatMessage.trim() ? `bg-white/20 text-white` : 'text-slate-600'} transition-colors`}><SendIcon size={18}/></button>
                     </div>
                  </form>
               )}
            </div>

            {/* --- ADMIN: EDIT PLAYER MODAL --- */}
            {adminEditingUser && (
              <div className="absolute inset-0 z-[250] flex items-center justify-center bg-obsidian-950/80 backdrop-blur-md p-4 animate-modal-pop">
                 <div className="bg-obsidian-900/90 backdrop-blur-xl border border-rose-500/20 rounded-[2.5rem] p-6 sm:p-10 w-full max-w-2xl shadow-[0_20px_50px_rgba(0,0,0,0.5)] relative max-h-[95vh] overflow-y-auto">
                    <button onClick={() => setAdminEditingUser(null)} className="absolute top-4 right-4 sm:top-6 sm:right-6 p-2 bg-obsidian-800/50 rounded-xl text-slate-400 hover:text-white transition-colors active:scale-95 shadow-inner">
                      <XIcon size={24} />
                    </button>
                    
                    <div className="flex items-center gap-4 mb-8">
                      <div className="p-3 bg-rose-500/20 text-rose-500 rounded-xl border border-rose-500/50">
                        <ShieldIcon size={28} />
                      </div>
                      <div>
                        <h2 className="text-2xl sm:text-3xl font-black font-heading text-white">Manage Player</h2>
                        <p className="text-slate-400 font-ui text-sm sm:text-base">
                          Editing profile for <span className="text-white font-bold">{adminEditingUser.username}</span>
                        </p>
                      </div>
                    </div>
                    
                    <form onSubmit={submitAdminAction} className="space-y-6">
                      <div className="grid grid-cols-1 sm:grid-cols-2 gap-6">
                        <div>
                          <label className="block text-xs sm:text-sm font-bold font-ui tracking-widest uppercase text-slate-400 mb-2 ml-1">Username</label>
                          <input type="text" required value={adminEditUsername} onChange={e => setAdminEditUsername(e.target.value)} className="w-full bg-obsidian-950/80 border border-white/10 rounded-2xl px-5 py-4 font-ui text-lg sm:text-xl font-bold text-white focus:outline-none focus:border-white/30 transition-all shadow-inner" />
                        </div>
                        <div>
                          <label className="block text-xs sm:text-sm font-bold font-ui tracking-widest uppercase text-slate-400 mb-2 ml-1">ID Tag</label>
                          <div className="relative">
                            <span className="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-500 font-heading text-xl">#</span>
                            <input type="text" maxLength={4} required value={adminEditTag} onChange={e => setAdminEditTag(e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, ''))} className="w-full bg-obsidian-950/80 border border-white/10 rounded-2xl px-4 pl-8 py-4 font-ui text-lg sm:text-xl font-bold text-white focus:outline-none focus:border-white/30 transition-all shadow-inner uppercase" />
                          </div>
                        </div>
                      </div>
                      
                      <div>
                        <label className="block text-xs sm:text-sm font-bold font-ui tracking-widest uppercase text-slate-400 mb-2 ml-1">Profile Image URL</label>
                        <input type="text" value={adminEditPhoto} onChange={e => setAdminEditPhoto(e.target.value)} className="w-full bg-obsidian-950/80 border border-white/10 rounded-2xl px-5 py-4 font-ui text-base sm:text-lg text-slate-300 focus:outline-none focus:border-white/30 transition-all shadow-inner" placeholder="https://..." />
                      </div>
                      
                      {/* ADMIN BADGE & TAG MANAGER */}
                      <div>
                        <label className="block text-xs sm:text-sm font-bold font-ui tracking-widest uppercase text-slate-400 mb-2 ml-1">Player Tags / Badges</label>
                        <div className="bg-obsidian-950/80 border border-white/10 rounded-2xl p-4 shadow-inner">
                          <div className="flex flex-wrap gap-2 mb-4">
                            {adminEditBadges.map(b => (
                              <span key={b} className="px-3 py-1.5 bg-rose-500/20 text-rose-200 text-sm font-bold rounded-lg border border-rose-500/30 flex items-center gap-2">
                                 {b} 
                                 <button type="button" onClick={() => setAdminEditBadges(adminEditBadges.filter(x => x !== b))} className="text-rose-400 hover:text-white ml-1 bg-rose-500/20 rounded-full w-5 h-5 flex items-center justify-center text-xs">✕</button>
                              </span>
                            ))}
                            {adminEditBadges.length === 0 && <span className="text-slate-500 text-sm italic py-1">No tags assigned</span>}
                          </div>
                          <div className="flex gap-3">
                             <input type="text" value={newAdminBadge} onChange={e => setNewAdminBadge(e.target.value)} placeholder="e.g. Verified, Mod, VIP" className="flex-1 bg-obsidian-900 border border-white/10 rounded-xl px-4 py-2.5 text-sm text-white focus:outline-none focus:border-white/30" />
                             <button type="button" onClick={() => { if(newAdminBadge.trim() && !adminEditBadges.includes(newAdminBadge.trim())) { setAdminEditBadges([...adminEditBadges, newAdminBadge.trim()]); setNewAdminBadge(''); } }} className="px-6 py-2.5 bg-obsidian-800 hover:bg-obsidian-700 border border-white/10 rounded-xl text-white text-sm font-bold transition-colors">Add Tag</button>
                          </div>
                        </div>
                      </div>

                      <div className="grid grid-cols-1 sm:grid-cols-2 gap-6">
                        <div>
                          <label className="block text-xs sm:text-sm font-bold font-ui tracking-widest uppercase text-slate-400 mb-2 ml-1">Daily Streak</label>
                          <input type="number" required min="0" value={adminEditStreak} onChange={e => setAdminEditStreak(e.target.value)} className="w-full bg-obsidian-950/80 border border-white/10 rounded-2xl px-5 py-4 font-ui text-lg sm:text-xl font-bold text-orange-400 focus:outline-none focus:border-white/30 transition-all shadow-inner" />
                        </div>
                        <div>
                          <label className="block text-xs sm:text-sm font-bold font-ui tracking-widest uppercase text-slate-400 mb-2 ml-1">Account Status</label>
                          <select value={adminEditStatus} onChange={(e) => setAdminEditStatus(e.target.value)} className="w-full bg-obsidian-950/80 border border-white/10 rounded-2xl px-5 py-4 font-ui text-lg sm:text-xl font-bold text-white focus:outline-none focus:border-white/30 transition-all shadow-inner appearance-none cursor-pointer">
                            <option value="active">🟢 Active</option>
                            <option value="suspended">🟡 Suspended</option>
                            <option value="banned">🔴 Banned</option>
                          </select>
                        </div>
                      </div>
                      
                      <div className="pt-4 mt-8 border-t border-white/10 flex justify-between items-center gap-4">
                        <button
                          type="button"
                          onClick={deleteAdminUser}
                          disabled={adminActionLoading}
                          className="w-full sm:w-auto px-6 py-4 bg-rose-600/10 hover:bg-rose-600/20 text-rose-500 font-bold font-heading text-base sm:text-lg tracking-wider uppercase rounded-2xl transition-all disabled:opacity-50 active:scale-95 border border-rose-500/30"
                        >
                          Delete
                        </button>
                        <button disabled={adminActionLoading} type="submit" className="w-full sm:w-auto px-10 py-4 bg-white/10 hover:bg-white/20 text-white font-bold font-heading text-lg sm:text-xl tracking-wider uppercase rounded-2xl transition-all disabled:opacity-50 flex justify-center active:scale-95 border border-white/20">
                          {adminActionLoading ? (
                            <div className="w-6 h-6 sm:w-7 sm:h-7 border-4 border-white border-t-transparent rounded-full animate-spin"></div>
                          ) : (
                            'Save Changes'
                          )}
                        </button>
                      </div>
                    </form>
                 </div>
              </div>
            )}

            {/* --- AUTH MODAL --- */}
            {showAuthModal && (
              <div className="absolute inset-0 bg-black/80 backdrop-blur-md z-[200] flex items-center justify-center p-4">
                 <div className="bg-obsidian-900 border border-white/10 rounded-[2.5rem] p-8 sm:p-10 w-full max-w-md shadow-2xl relative animate-modal-pop">
                    <button onClick={() => { setShowAuthModal(false); setAuthError(''); }} className="absolute top-6 right-6 p-2 bg-white/5 rounded-xl text-slate-400 hover:text-white transition-colors"><XIcon size={20} /></button>
                    <h2 className="text-3xl font-black font-heading text-white mb-8">{authMode === 'login' ? 'Welcome Back' : 'Create Account'}</h2>
                    {authError && <div className="mb-6 p-4 bg-rose-500/10 border border-rose-500/30 text-rose-400 font-ui font-semibold text-sm rounded-xl">{authError}</div>}
                    <form onSubmit={authMode === 'login' ? handleLogin : handleSignup} className="space-y-4">
                      {authMode === 'signup' && (
                        <div><label className="block text-xs font-bold uppercase text-slate-500 mb-2">Username</label><input type="text" required value={username} onChange={e => setUsername(e.target.value)} className="w-full bg-obsidian-950 border border-white/10 rounded-xl px-4 py-3.5 text-white focus:outline-none" /></div>
                      )}
                      <div><label className="block text-xs font-bold uppercase text-slate-500 mb-2">Email Address</label><input type="email" required value={email} onChange={e => setEmail(e.target.value)} className="w-full bg-obsidian-950 border border-white/10 rounded-xl px-4 py-3.5 text-white focus:outline-none" /></div>
                      <div><label className="block text-xs font-bold uppercase text-slate-500 mb-2">Password</label><input type="password" required minLength={6} value={password} onChange={e => setPassword(e.target.value)} className="w-full bg-obsidian-950 border border-white/10 rounded-xl px-4 py-3.5 text-white focus:outline-none" /></div>
                      {authMode === 'signup' && (
                        <div className="bg-obsidian-950 p-4 rounded-xl border border-white/5 mt-2"><label className="block text-xs font-bold uppercase text-slate-500 mb-2 flex items-center gap-2"><ShieldIcon size={14}/> Anti-Bot Check</label><div className="flex items-center gap-4"><span className="text-xl font-bold text-white">{botCheck.num1} + {botCheck.num2} = </span><input type="number" required value={botCheck.answer} onChange={e => setBotCheck({...botCheck, answer: e.target.value})} className="flex-1 bg-obsidian-900 border border-white/10 rounded-lg px-3 py-2 text-white focus:outline-none" /></div></div>
                      )}
                      <button disabled={authLoading || authCooldown} type="submit" className={`w-full py-4 bg-gradient-to-r ${activeThemeColors.gradient} text-white font-bold font-ui uppercase rounded-xl transition-all mt-8 disabled:opacity-50 active:scale-95`}>{authLoading ? 'Processing...' : authMode === 'login' ? 'Sign In' : 'Create Account'}</button>
                    </form>
                    <div className="mt-8 text-center border-t border-white/5 pt-6">
                       <button onClick={() => setAuthMode(authMode === 'login' ? 'signup' : 'login')} className="text-slate-400 hover:text-white font-ui font-bold text-sm transition-colors">{authMode === 'login' ? "Don't have an account? Sign up" : "Already have an account? Sign in"}</button>
                    </div>
                 </div>
              </div>
            )}
            
            {toast && <div className={`fixed bottom-6 right-6 px-6 py-4 rounded-2xl shadow-2xl z-[300] font-ui font-bold text-xl flex items-center gap-3 animate-toast-slide border ${toast.type === 'error' ? 'bg-rose-600 text-white border-rose-500/50' : 'bg-obsidian-800 text-white border-white/10'}`}>{toast.message}</div>}

          </main>
        </div>
      );
    }
    
    const root = ReactDOM.createRoot(document.getElementById('root')); 
    root.render(<App />);
  </script>
</body>
</html>
