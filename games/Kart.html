<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Kart Racer - Ultimate Edition</title>
    <style>
        :root {
            --glass-bg: rgba(15, 20, 35, 0.75);
            --glass-border: rgba(255, 255, 255, 0.2);
            --accent: #00ffcc;
            --accent-hover: #00e6b8;
            --danger: #ff3366;
        }

        body {
            margin: 0; overflow: hidden; background-color: #000;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            touch-action: none; user-select: none; -webkit-user-select: none;
        }
        #gameCanvas { width: 100vw; height: 100vh; display: block; }
        
        #speed-lines {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 2; opacity: 0; transition: opacity 0.3s ease;
            background: radial-gradient(circle, transparent 40%, rgba(0, 255, 204, 0.15) 80%, rgba(0, 255, 204, 0.4) 100%);
            mix-blend-mode: screen;
        }

        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }
        .player-hud {
            position: absolute; display: flex; flex-direction: column;
            justify-content: space-between; padding: 20px; box-sizing: border-box;
            border: 1px solid var(--glass-border);
        }
        
        .hud-text {
            color: #fff; font-size: 24px; font-weight: 900; letter-spacing: 2px;
            text-transform: uppercase; text-shadow: 0 2px 6px rgba(0,0,0,0.9);
        }
        
        .speed-container {
            align-self: flex-end; display: flex; flex-direction: column; align-items: flex-end;
            background: var(--glass-bg); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            padding: 10px 20px; border-radius: 16px; border: 1px solid var(--glass-border);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .speed-value { color: var(--accent); font-size: 32px; font-style: italic; font-weight: 900; text-shadow: 0 0 10px rgba(0,255,204,0.5); }
        .speed-bar-bg { width: 160px; height: 10px; background: rgba(255,255,255,0.1); border-radius: 5px; margin-top: 8px; overflow: hidden; box-shadow: inset 0 2px 5px rgba(0,0,0,0.5); }
        .speed-bar-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #00ffcc, #ff00ff); transition: width 0.1s; }

        .minimap {
            position: absolute; top: 20px; right: 20px; width: 150px; height: 150px;
            border: 2px solid var(--glass-border); border-radius: 50%; background-size: cover;
            background-color: var(--glass-bg); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
        }
        .item-slot {
            position: absolute; top: 20px; left: 20px; width: 80px; height: 80px;
            border: 3px solid var(--accent); border-radius: 20px; background: var(--glass-bg);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            display: flex; align-items: center; justify-content: center;
            font-size: 50px; box-shadow: 0 0 20px rgba(0, 255, 204, 0.4), inset 0 0 15px rgba(0,255,204,0.2);
        }
        .boost-message {
            position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%);
            color: #fff; font-size: 56px; opacity: 0; transition: opacity 0.2s, transform 0.2s;
            text-align: center; text-transform: uppercase; font-style: italic; font-weight: 900;
            text-shadow: 0 0 15px var(--accent), 0 0 30px var(--accent); z-index: 10;
        }
        
        /* Mobile Controls UI */
        #mobile-controls { display: none; position: absolute; bottom: 0; left: 0; width: 100%; height: 50%; pointer-events: none; z-index: 50; }
        #joystick-base {
            position: absolute; bottom: 50px; left: 50px; width: 160px; height: 160px;
            background: rgba(255, 255, 255, 0.08); border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%; pointer-events: auto; backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
        }
        #joystick-stick {
            position: absolute; top: 50%; left: 50%; width: 75px; height: 75px;
            background: linear-gradient(135deg, rgba(255,255,255,0.9), rgba(255,255,255,0.5));
            border-radius: 50%; transform: translate(-50%, -50%); box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }
        .action-btn {
            position: absolute; background: var(--glass-bg); border: 3px solid var(--glass-border);
            border-radius: 50%; pointer-events: auto; color: white; font-weight: 900; font-size: 22px;
            display: flex; justify-content: center; align-items: center; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }
        .action-btn:active { background: rgba(255, 255, 255, 0.3); transform: scale(0.9); }
        #btn-drift { bottom: 50px; right: 50px; width: 110px; height: 110px; border-color: var(--danger); color: var(--danger); box-shadow: inset 0 0 20px rgba(255, 51, 102, 0.3); }
        #btn-item { bottom: 180px; right: 110px; width: 85px; height: 85px; border-color: var(--accent); color: var(--accent); box-shadow: inset 0 0 20px rgba(0, 255, 204, 0.3); }

        /* Menu System */
        #menu-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1b1b2f 0%, #080812 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100;
        }
        .glass-panel {
            background: var(--glass-bg); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border); border-radius: 28px; padding: 50px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.7); display: flex; flex-direction: column; align-items: center;
            animation: popIn 0.4s cubic-bezier(0.1, 0.8, 0.3, 1);
        }
        @keyframes popIn { 0% { transform: scale(0.9); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        #player-select, #loadout-select, #map-select { display: flex; flex-direction: column; align-items: center; }
        #loadout-select, #map-select { display: none; width: 100%; }
        
        .btn-group { display: flex; gap: 20px; margin-top: 30px; }
        button {
            padding: 18px 45px; font-size: 24px; background: rgba(255,255,255,0.05); color: #fff;
            border: 2px solid var(--glass-border); border-radius: 16px; cursor: pointer;
            font-family: inherit; font-weight: 900; transition: all 0.2s ease; backdrop-filter: blur(8px);
            text-transform: uppercase; letter-spacing: 1px;
        }
        button:hover { background: var(--accent); color: #000; box-shadow: 0 0 25px rgba(0, 255, 204, 0.5); transform: translateY(-3px); border-color: var(--accent); }
        button:active { transform: translateY(1px); }
        
        h1 { font-size: 80px; margin: 0 0 5px 0; color: #fff; text-align: center; font-style: italic; text-shadow: 0 0 25px rgba(0,255,204,0.6); font-weight: 900; letter-spacing: 3px; line-height: 1; }
        h2 { color: #ccc; font-size: 28px; font-weight: 600; margin: 0; letter-spacing: 2px; }

        /* Customization */
        .color-picker-container { margin: 30px 0; display: flex; align-items: center; gap: 15px; }
        input[type="color"] { -webkit-appearance: none; border: none; width: 60px; height: 60px; border-radius: 50%; cursor: pointer; background: none; padding: 0;}
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: 3px solid #fff; border-radius: 50%; }

        /* Roulette Wheel */
        .roulette-wrapper {
            width: 600px; height: 160px; background: rgba(0,0,0,0.6); border: 2px solid var(--glass-border);
            border-radius: 20px; position: relative; overflow: hidden; margin-top: 40px;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.9);
        }
        .roulette-pointer {
            position: absolute; top: 0px; left: 50%; transform: translateX(-50%);
            width: 6px; height: 100%; background: var(--accent); z-index: 20; box-shadow: 0 0 15px var(--accent);
        }
        .roulette-strip { display: flex; height: 100%; width: max-content; transform: translateX(0); }
        .map-card {
            width: 240px; height: 100%; display: flex; flex-direction: column; align-items: center;
            justify-content: center; color: white; font-weight: 900; font-size: 24px;
            border-right: 2px solid rgba(255,255,255,0.1); box-sizing: border-box; 
            text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 2px 6px rgba(0,0,0,0.9);
        }

        #countdown-overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 200px; font-weight: 900; color: #fff; font-style: italic;
            text-shadow: 0 0 30px var(--accent), 0 0 60px var(--accent); display: none; z-index: 8; text-align: center;
        }
        .shrink-anim { animation: shrink 1s cubic-bezier(0.1, 0.8, 0.3, 1) forwards; }
        @keyframes shrink { 0% { transform: translate(-50%, -50%) scale(2.5); opacity: 0; filter: blur(15px); } 20% { transform: translate(-50%, -50%) scale(1); opacity: 1; filter: blur(0); } 80% { transform: translate(-50%, -50%) scale(1); opacity: 1; } 100% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; } }

        /* Leaderboard Modal */
        #leaderboard-modal {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 200; flex-direction: column; align-items: center; justify-content: center;
            backdrop-filter: blur(10px);
        }
        .leaderboard-table { width: 100%; border-collapse: collapse; margin: 20px 0; color: white; font-size: 20px; font-weight: 600;}
        .leaderboard-table th, .leaderboard-table td { padding: 12px; border-bottom: 1px solid var(--glass-border); text-align: center; }
        .leaderboard-table tr:nth-child(1) { color: #FFD700; font-size: 24px; font-weight: 900;}
        .leaderboard-table tr:nth-child(2) { color: #C0C0C0; }
        .leaderboard-table tr:nth-child(3) { color: #CD7F32; }
        .human-row { background: rgba(0, 255, 204, 0.2); }
    </style>
</head>
<body>
    <div id="speed-lines"></div>
    <canvas id="gameCanvas"></canvas>
    <div id="ui"></div>
    <div id="countdown-overlay"></div>

    <!-- Mobile UI Elements -->
    <div id="mobile-controls">
        <div id="joystick-base"><div id="joystick-stick"></div></div>
        <div class="action-btn" id="btn-item">ITEM</div>
        <div class="action-btn" id="btn-drift">DRIFT</div>
    </div>

    <!-- Menu UI -->
    <div id="menu-container">
        <div class="glass-panel" id="player-select">
            <h1>SUPER KART</h1>
            <h2>ULTIMATE EDITION</h2>
            <div class="btn-group">
                <button onclick="goToLoadout(1)">Single Player</button>
                <button onclick="goToLoadout(2)">Split Screen</button>
            </div>
            <p id="bot-info-text" style="color: #aaa; margin-top: 20px; font-size: 16px; font-weight: 600;">10-Racer Grid (AI Enabled)</p>
            <p id="mobile-detected-text" style="color: var(--accent); font-weight: bold; display: none; margin-top: 10px;">Touch Controls Auto-Enabled</p>
        </div>

        <div class="glass-panel" id="loadout-select">
            <h2>GARAGE: CUSTOMIZE KART</h2>
            <div class="color-picker-container">
                <label style="color: white; font-size: 22px; font-weight: 800;">P1 Paint Color:</label>
                <input type="color" id="p1-color" value="#00ffcc">
            </div>
            <button onclick="goToMapSelect()" style="width: 100%;">CONFIRM LOADOUT</button>
        </div>

        <div class="glass-panel" id="map-select">
            <h2>SELECT TRACK</h2>
            <div class="roulette-wrapper">
                <div class="roulette-pointer"></div>
                <div class="roulette-strip" id="roulette-strip"></div>
            </div>
            <button id="spin-btn" style="margin-top:30px; width: 100%;" onclick="spinRoulette()">SPIN & RACE</button>
        </div>
    </div>

    <!-- Leaderboard -->
    <div id="leaderboard-modal">
        <div class="glass-panel" style="width: 600px; max-height: 90vh; overflow-y: auto;">
            <h1 style="font-size: 50px; margin-bottom: 10px;">RACE RESULTS</h1>
            <table class="leaderboard-table" id="leaderboard-table">
                <thead><tr><th>Pos</th><th>Racer</th><th>Time</th></tr></thead>
                <tbody id="leaderboard-body"></tbody>
            </table>
            <button onclick="location.reload()" style="width: 100%; margin-top: 20px;">PLAY AGAIN</button>
        </div>
    </div>

    <!-- Include Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // --- AUDIO SYSTEM ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        const Sounds = {
            play: function(freq, type, duration, vol=0.1, slideFreq=null) {
                if(audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                if (slideFreq) osc.frequency.exponentialRampToValueAtTime(slideFreq, audioCtx.currentTime + duration);
                gain.gain.setValueAtTime(vol, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
                osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + duration);
            },
            jump: () => Sounds.play(300, 'sine', 0.3, 0.2, 600),
            boostReady: () => Sounds.play(800, 'square', 0.1, 0.05),
            boostGo: () => Sounds.play(400, 'sawtooth', 0.6, 0.3, 1200),
            itemGet: () => { Sounds.play(600, 'square', 0.1, 0.1, 800); setTimeout(() => Sounds.play(800, 'square', 0.2, 0.1, 1200), 100); },
            rouletteClick: () => Sounds.play(800, 'sine', 0.05, 0.05),
            countBeep: () => Sounds.play(600, 'square', 0.2, 0.2),
            countGo: () => Sounds.play(1200, 'square', 0.6, 0.3),
            throwItem: () => Sounds.play(900, 'sine', 0.2, 0.2, 300),
            crash: () => {
                if(audioCtx.state === 'suspended') audioCtx.resume();
                const bufferSize = audioCtx.sampleRate * 0.5; const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const data = buffer.getChannelData(0); for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
                const noise = audioCtx.createBufferSource(); noise.buffer = buffer;
                const filter = audioCtx.createBiquadFilter(); filter.type = 'lowpass'; filter.frequency.value = 1000;
                const gain = audioCtx.createGain(); gain.gain.setValueAtTime(0.3, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                noise.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination); noise.start();
            }
        };

        // --- MAP DATA (WITH BOOST PADS & NEW MAPS) ---
        const MAP_DEFS = [
            { 
                id: 'mushroom', name: 'Mushroom Circuit', bg: '#2b6b2b', road: '#444444', border: '#ffffff', treeColor: '#1e661e', treeTrunk: '#4a3018', rumbleA: '#ff0000', rumbleB: '#ffffff',
                waypoints: [{x:-50, z:-283}, {x:-150, z:-283}, {x:-250, z:-270}, {x:-350, z:-220}, {x:-450, z:-100}, {x:-473, z:0}, {x:-450, z:100}, {x:-350, z:220}, {x:-250, z:270}, {x:-150, z:283}, {x:0, z:283}, {x:150, z:283}, {x:250, z:270}, {x:350, z:220}, {x:450, z:100}, {x:473, z:0}, {x:450, z:-100}, {x:350, z:-220}, {x:250, z:-270}, {x:150, z:-283}, {x:50, z:-283}],
                boostPads: [{x: 0, z: 283, a: Math.PI/2}] // Bottom straight
            },
            { 
                id: 'desert', name: 'Desert Raceway', bg: '#d4aa55', road: '#7a5a3a', border: '#ff3333', treeColor: '#c2994c', treeTrunk: '#6a3513', rumbleA: '#ff0000', rumbleB: '#ffff00',
                waypoints: [{x:-50, z:-283}, {x:-190, z:-283}, {x:-290, z:-250}, {x:-396, z:-131}, {x:-396, z:0}, {x:-396, z:161}, {x:-290, z:290}, {x:-190, z:337}, {x:0, z:337}, {x:190, z:337}, {x:290, z:290}, {x:396, z:161}, {x:396, z:0}, {x:396, z:-131}, {x:290, z:-250}, {x:190, z:-283}, {x:50, z:-283}],
                boostPads: [{x: -396, z: 0, a: 0}] // Left straight
            },
            { 
                id: 'snow', name: 'Snowy Peak', bg: '#b2ebf2', road: '#80c5d1', border: '#0055ff', treeColor: '#ffffff', treeTrunk: '#4c3023', rumbleA: '#0000ff', rumbleB: '#ffffff',
                waypoints: [{x:0, z:-283}, {x:100, z:-260}, {x:200, z:-220}, {x:300, z:-150}, {x:330, z:-50}, {x:280, z:50}, {x:180, z:150}, {x:80, z:220}, {x:-50, z:260}, {x:-150, z:280}, {x:-250, z:240}, {x:-320, z:150}, {x:-360, z:50}, {x:-360, z:-50}, {x:-320, z:-150}, {x:-250, z:-220}, {x:-150, z:-260}, {x:-50, z:-283}],
                boostPads: [{x: -360, z: 0, a: 0}]
            },
            {
                id: 'volcano', name: 'Lava Keep', bg: '#330000', road: '#222222', border: '#ff6600', treeColor: '#551111', treeTrunk: '#111111', rumbleA: '#ff6600', rumbleB: '#ffff00',
                // Features a split path visually, AI follows main loop
                waypoints: [{x:-50, z:-283}, {x:-250, z:-283}, {x:-400, z:-150}, {x:-400, z:150}, {x:-250, z:283}, {x:250, z:283}, {x:400, z:150}, {x:400, z:-150}, {x:250, z:-283}, {x:50, z:-283}],
                boostPads: [{x: 0, z: 283, a: Math.PI/2}, {x: -400, z: 0, a: 0}, {x: 400, z: 0, a: Math.PI}]
            },
            {
                id: 'cyber', name: 'Neon Grid', bg: '#000022', road: '#111133', border: '#00ffff', treeColor: '#ff00ff', treeTrunk: '#00ffff', rumbleA: '#ff00ff', rumbleB: '#00ffff',
                waypoints: [{x:0, z:-300}, {x:-300, z:-300}, {x:-300, z:0}, {x:-100, z:0}, {x:-100, z:300}, {x:300, z:300}, {x:300, z:0}, {x:100, z:0}, {x:100, z:-300}],
                boostPads: [{x: -300, z: -150, a: 0}, {x: 300, z: 150, a: Math.PI}]
            }
        ];

        // --- GAME CONSTANTS ---
        const WORLD_SIZE = 1200;
        const CANVAS_SIZE = 1024;
        
        let globalTotalLaps = 3;
        let finishedRacers = 0;
        let raceStartTime = 0;
        let raceResults = [];
        
        let scene, renderer;
        let particles = [], itemBoxes = [], trees = [];
        let activeProjectiles = []; let activeTraps = []; 
        let players = []; let numHumanPlayers = 1; let currentMap = null;
        
        let gameState = 'MENU'; 
        let collisionData = null; let trackPlane = null; let trackDataURL = null;

        const ITEMS = ['MUSHROOM', 'SHELL', 'BANANA'];
        const ITEM_EMOJIS = { 'MUSHROOM': '🍄', 'SHELL': '🐢', 'BANANA': '🍌' };

        const PLAYER_CONFIG = [
            { main: '#00ffcc', over: '#0022cc', name: 'Player 1' }, { main: '#ff3366', over: '#222222', name: 'Player 2' }, 
            { main: '#ffcc00', over: '#5500aa', name: 'Bot Yellow' }, { main: '#0055ff', over: '#e60000', name: 'Bot Blue' },  
            { main: '#ff66cc', over: '#ffffff', name: 'Bot Pink' }, { main: '#8b4513', over: '#222222', name: 'Bot Brown' }, 
            { main: '#ffffff', over: '#333333', name: 'Bot Silver' }, { main: '#222222', over: '#ffff00', name: 'Bot Black' }, 
            { main: '#ff8800', over: '#005500', name: 'Bot Orange' }, { main: '#00ffff', over: '#000088', name: 'Bot Cyan' }   
        ];

        function getOrdinalSuffix(i) {
            let j = i % 10, k = i % 100;
            if (j == 1 && k != 11) return "st"; if (j == 2 && k != 12) return "nd"; if (j == 3 && k != 13) return "rd"; return "th";
        }
        function formatTime(ms) {
            let totalSec = Math.floor(ms / 1000); let m = Math.floor(totalSec / 60);
            let s = totalSec % 60; let millis = Math.floor((ms % 1000) / 10);
            return `${m}:${s.toString().padStart(2,'0')}.${millis.toString().padStart(2,'0')}`;
        }

        // --- INPUT HANDLING ---
        const keys = {};
        document.addEventListener('keydown', (e) => { keys[e.key] = true; keys[e.code] = true; });
        document.addEventListener('keyup', (e) => { keys[e.key] = false; keys[e.code] = false; });

        const isMobileDevice = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        let joyX = 0, joyY = 0; let touchDrift = false, touchItem = false;

        if (isMobileDevice) {
            document.getElementById('mobile-controls').style.display = 'block';
            document.getElementById('mobile-detected-text').style.display = 'block';
        }

        const joyBase = document.getElementById('joystick-base');
        const joyStick = document.getElementById('joystick-stick');
        let joyTouchId = null;

        joyBase.addEventListener('touchstart', (e) => {
            e.preventDefault(); const touch = e.changedTouches[0]; joyTouchId = touch.identifier; updateJoystick(touch);
        }, {passive: false});

        joyBase.addEventListener('touchmove', (e) => {
            e.preventDefault();
            for (let i = 0; i < e.changedTouches.length; i++) {
                if (e.changedTouches[i].identifier === joyTouchId) { updateJoystick(e.changedTouches[i]); break; }
            }
        }, {passive: false});

        function endJoystick(e) {
            e.preventDefault();
            for (let i = 0; i < e.changedTouches.length; i++) {
                if (e.changedTouches[i].identifier === joyTouchId) {
                    joyTouchId = null; joyX = 0; joyY = 0; joyStick.style.transform = `translate(-50%, -50%)`; break;
                }
            }
        }
        joyBase.addEventListener('touchend', endJoystick); joyBase.addEventListener('touchcancel', endJoystick);

        function updateJoystick(touch) {
            const rect = joyBase.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2; const centerY = rect.top + rect.height / 2;
            const radius = rect.width / 2;
            let dx = touch.clientX - centerX; let dy = touch.clientY - centerY;
            const distance = Math.sqrt(dx * dx + dy * dy);
            if (distance > radius) { dx = (dx / distance) * radius; dy = (dy / distance) * radius; }
            joyStick.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
            joyX = dx / radius; joyY = dy / radius;
        }

        document.getElementById('btn-drift').addEventListener('touchstart', (e) => { e.preventDefault(); touchDrift = true; });
        document.getElementById('btn-drift').addEventListener('touchend', (e) => { e.preventDefault(); touchDrift = false; });
        document.getElementById('btn-item').addEventListener('touchstart', (e) => { e.preventDefault(); touchItem = true; });
        document.getElementById('btn-item').addEventListener('touchend', (e) => { e.preventDefault(); touchItem = false; });

        // --- GLOWING SPARK MATERIAL (SHADERS/SPRITES) ---
        const sparkCanvas = document.createElement('canvas'); sparkCanvas.width = 32; sparkCanvas.height = 32;

        sCtx.fillStyle = sGrad; sCtx.fillRect(0,0,32,32);
        const sparkTex = new THREE.CanvasTexture(sparkCanvas);

        const sparkMaterialMap = {
            blue: new THREE.SpriteMaterial({ map: sparkTex, color: 0x00ffff, blending: THREE.AdditiveBlending }),
            orange: new THREE.SpriteMaterial({ map: sparkTex, color: 0xffa500, blending: THREE.AdditiveBlending }),

        };

        function spawnSpark(pos, power) {
            let mat = sparkMaterialMap.dust;
            if (power >= 2.5) mat = sparkMaterialMap.pink; else if (power >= 1.5) mat = sparkMaterialMap.orange; else if (power >= 0) mat = sparkMaterialMap.blue;
            const p = new THREE.Sprite(mat);
            p.position.copy(pos); p.position.x += (Math.random() - 0.5) * 4; p.position.z += (Math.random() - 0.5) * 4; p.scale.setScalar(4);
            scene.add(p); particles.push({ mesh: p, life: 1.0, vel: new THREE.Vector3((Math.random()-0.5)*0.8, Math.random()*0.8 + 0.3, (Math.random()-0.5)*0.8) });
        }
        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i]; p.mesh.position.add(p.vel); p.life -= 0.05; p.mesh.scale.setScalar(p.life * 4);
                if (p.life <= 0) { scene.remove(p.mesh); particles.splice(i, 1); }
            }
        }


        // --- PLAYER / AI CLASS ---
        class Player {
            constructor(index, isHuman) {
                this.index = index; this.isHuman = isHuman; this.config = PLAYER_CONFIG[index];
                
                this.speed = 0; this.maxBoostSpeed = 2.4; this.friction = 0.005; this.offroadFriction = 0.05; this.turnSpeed = 0.05; // Slightly increased turn speed for smoothness
                this.autopilot = !isHuman; 

                if (this.isHuman) {
                    this.baseMaxSpeed = 1.45; this.maxSpeed = 1.45; this.baseAccel = 0.016; this.acceleration = 0.016;
                } else {
                    this.baseMaxSpeed = 1.30 + Math.random() * 0.05; 
                    this.maxSpeed = this.baseMaxSpeed;
                    this.baseAccel = 0.012 + Math.random() * 0.002; 
                    this.acceleration = this.baseAccel;
                }
                
                this.heading = Math.PI / 2; this.visualAngleOffset = 0;
                this.isDrifting = false; this.driftDir = 0; this.driftPower = 0;
                this.boostTimer = 0; this.hopVelocity = 0; this.kartHeight = 0;
                this.isOffroad = false; this.lap = 1; this.totalLaps = globalTotalLaps;
                this.checkpointPassed = false; this.finished = false; this.placement = 0;

                this.currentSteer = 0; this.steerSmoothness = 0.25;

                this.currentItem = null; this.spinTimer = 0; this.itemCooldown = 0;
                this.flipAngle = 0; 
                
                this.currentWaypoint = 1; 
                this.aiErrorX = (Math.random() - 0.5) * 16; this.aiErrorZ = (Math.random() - 0.5) * 16;
                this.stuckFrames = 0; this.isReversing = false; this.reverseFrames = 0; this.progressScore = 0;

                this.frontWheels = []; this.kartGroup = new THREE.Group(); this.kartModel = buildF1Kart(this.config, this.frontWheels); this.kartGroup.add(this.kartModel);
                
                // PERFECT ALIGNMENT: Spawn mathematically behind the first waypoint
                let wps = currentMap.waypoints; 
                let dirX = wps[1].x - wps[0].x; let dirZ = wps[1].z - wps[0].z;
                let len = Math.sqrt(dirX*dirX + dirZ*dirZ); dirX /= len; dirZ /= len;
                
                let backX = -dirX; let backZ = -dirZ;
                let sideX = -dirZ; let sideZ = dirX;
                let row = Math.floor(index / 2); let col = index % 2 === 0 ? -1 : 1;
                
                let startX = wps[0].x + backX * (30 + row * 25) + sideX * (col * 15);
                let startZ = wps[0].z + backZ * (30 + row * 25) + sideZ * (col * 15);
                
                this.kartGroup.position.set(startX, 0, startZ); scene.add(this.kartGroup);
                this.heading = Math.atan2(-dirX, -dirZ);

                if (this.isHuman) {
                    this.camera = new THREE.PerspectiveCamera(65, 1, 0.1, 2000);
                    this.uiContainer = document.createElement('div'); this.uiContainer.className = 'player-hud';
                    this.itemSlotEl = document.createElement('div'); this.itemSlotEl.className = 'item-slot';
                    this.lapEl = document.createElement('div'); this.lapEl.className = 'hud-text'; this.lapEl.innerText = `P${index+1} Lap 1/${this.totalLaps}`;
                    
                    this.speedContainer = document.createElement('div'); this.speedContainer.className = 'speed-container';
                    this.speedValEl = document.createElement('div'); this.speedValEl.className = 'speed-value'; this.speedValEl.innerText = '0 KM/H';
                    this.speedBarBg = document.createElement('div'); this.speedBarBg.className = 'speed-bar-bg';
                    this.speedBarFill = document.createElement('div'); this.speedBarFill.className = 'speed-bar-fill';
                    this.speedBarBg.appendChild(this.speedBarFill);
                    this.speedContainer.append(this.speedValEl, this.speedBarBg);

                    this.boostMsgEl = document.createElement('div'); this.boostMsgEl.className = 'boost-message';
                    this.uiContainer.append(this.itemSlotEl, this.lapEl, this.speedContainer, this.boostMsgEl);

                    this.minimapCanvas = document.createElement('canvas'); this.minimapCanvas.width = 150; this.minimapCanvas.height = 150; this.minimapCanvas.className = 'minimap';
                    if (trackDataURL) this.minimapCanvas.style.backgroundImage = `url(${trackDataURL})`;
                    this.ctxMap = this.minimapCanvas.getContext('2d'); this.uiContainer.appendChild(this.minimapCanvas);
                    document.getElementById('ui').appendChild(this.uiContainer);

                    this.engineOsc = audioCtx.createOscillator(); this.engineGain = audioCtx.createGain(); this.engineOsc.type = 'triangle'; 
                    this.engineOsc.frequency.value = 60; this.engineGain.gain.value = 0; this.engineOsc.connect(this.engineGain); this.engineGain.connect(audioCtx.destination); this.engineOsc.start();
                    this.updateCamera();
                }
            }

            destroy() {
                if (this.isHuman) { try { this.engineOsc.stop(); this.engineOsc.disconnect(); this.engineGain.disconnect(); } catch(e) {} this.uiContainer.remove(); }
                scene.remove(this.kartGroup);
            }

            spinOut() {
                if (this.spinTimer > 0) return;
                this.spinTimer = 50; this.isDrifting = false; this.speed *= 0.2; this.hopVelocity = 0.6; Sounds.crash();
                if (this.isHuman && !this.finished) { this.showBoostMessage("CRASH!", '#ff3366'); document.getElementById('speed-lines').style.opacity = 0;}
            }

            useItem() {
                if (!this.currentItem || this.itemCooldown > 0) return;
                if (this.currentItem === 'MUSHROOM') { this.boostTimer = 80; if (this.isHuman && !this.finished) { this.showBoostMessage("BOOST!", '#00ffcc'); Sounds.boostGo(); } } 
                else if (this.currentItem === 'SHELL') { spawnProjectile('SHELL', this.kartGroup.position, this.heading, this); if (this.isHuman && !this.finished) Sounds.throwItem(); }
                else if (this.currentItem === 'BANANA') { spawnProjectile('BANANA', this.kartGroup.position, this.heading, this); if (this.isHuman && !this.finished) Sounds.throwItem(); }

                this.currentItem = null; this.itemCooldown = 30; if (this.isHuman) this.itemSlotEl.innerText = '';
            }

            getInput() {
                if (gameState !== 'RACING') return { up: false, down: false, steer: 0, drift: false, item: false };

                if (this.isHuman && !this.autopilot) {
                    const keysMapP1 = { up: 'w', down: 's', left: 'a', right: 'd', drift: ' ', item: 'e' };
                    const keysMapP2 = { up: 'ArrowUp', down: 'ArrowDown', left: 'ArrowLeft', right: 'ArrowRight', drift: 'Shift', item: 'Enter' };
                    const map = this.index === 0 ? keysMapP1 : keysMapP2;
                    
                    let input = { up: false, down: false, steer: 0, drift: false, item: false };
                    if (map) {
                        if (keys[map.up] || keys[map.up.toUpperCase()]) input.up = true;
                        if (keys[map.down] || keys[map.down.toUpperCase()]) input.down = true;
                        if (keys[map.left] || keys[map.left.toUpperCase()]) input.steer = 1;
                        if (keys[map.right] || keys[map.right.toUpperCase()]) input.steer = -1;
                        if (keys[map.drift] || (map.drift==='Shift' && (keys['ShiftLeft']||keys['ShiftRight']))) input.drift = true;
                        if (keys[map.item] || keys[map.item.toUpperCase()]) input.item = true;
                    }
                    if (this.index === 0 && isMobileDevice) {
                        if (joyY < -0.2) input.up = true; if (joyY > 0.2) input.down = true;
                        if (Math.abs(joyX) > 0.1) input.steer = -joyX;
                        if (touchDrift) input.drift = true; if (touchItem) input.item = true;
                    }
                    const gamepads = navigator.getGamepads ? navigator.getGamepads() : [];
                    const gp = gamepads[this.index];
                    if (gp && gp.connected) {
                        if (gp.buttons[7].pressed || gp.axes[1] < -0.5 || gp.buttons[12].pressed) input.up = true; 
                        if (gp.buttons[6].pressed || gp.axes[1] > 0.5 || gp.buttons[13].pressed) input.down = true; 
                        if (Math.abs(gp.axes[0]) > 0.2) input.steer = -gp.axes[0]; 
                        else if (gp.buttons[14].pressed) input.steer = 1;
                        else if (gp.buttons[15].pressed) input.steer = -1;
                        if (gp.buttons[0].pressed || gp.buttons[1].pressed || gp.buttons[5].pressed) input.drift = true; 
                        if (gp.buttons[2].pressed || gp.buttons[4].pressed) input.item = true; 
                    }
                    return input;
                } else {
                    // --- SMART AI WITH CORRECT PATHING AND ANALOG STEERING ---
                    let input = { up: true, down: false, steer: 0, drift: false, item: false };
                    
                    if (this.speed < 0.2 && !this.isDrifting && !this.isOffroad && this.kartHeight <= 0.1) this.stuckFrames++; else this.stuckFrames = 0;
                    if (this.stuckFrames > 40) { this.isReversing = true; this.stuckFrames = 0; }

                    if (this.isReversing) {
                        this.reverseFrames++; input.up = false; input.down = true;
                        if (this.reverseFrames % 20 < 10) input.steer = 1; else input.steer = -1;
                        if (this.reverseFrames > 40) { this.isReversing = false; this.reverseFrames = 0; }
                        return input; 
                    }

                    let wps = currentMap.waypoints; let currWP = wps[this.currentWaypoint];
                    let targetX = currWP.x + (this.isOffroad ? 0 : this.aiErrorX); 
                    let targetZ = currWP.z + (this.isOffroad ? 0 : this.aiErrorZ);

                    let dx = targetX - this.kartGroup.position.x; let dz = targetZ - this.kartGroup.position.z;
                    let desiredHeading = Math.atan2(-dx, -dz);
                    let currentHeading = this.heading % (Math.PI * 2);
                    if (currentHeading < -Math.PI) currentHeading += Math.PI * 2; if (currentHeading > Math.PI) currentHeading -= Math.PI * 2;
                    
                    let angleDiff = desiredHeading - currentHeading;
                    if (angleDiff > Math.PI) angleDiff -= Math.PI * 2; if (angleDiff < -Math.PI) angleDiff += Math.PI * 2;

                    if (angleDiff > 0.05) input.steer = Math.min(1, angleDiff * 5); 
                    else if (angleDiff < -0.05) input.steer = Math.max(-1, angleDiff * 5);
                    
                    if (Math.abs(angleDiff) > Math.PI / 2.5) { input.up = false; if (this.speed > this.maxSpeed * 0.7 && Math.random() > 0.1) input.drift = true; }
                    if (this.isOffroad) { input.drift = false; input.up = true; }

                    if (this.currentItem) {
                        if (this.currentItem === 'MUSHROOM' && Math.abs(angleDiff) < 0.2 && !this.isOffroad && Math.random() < 0.05) input.item = true;
                        else if (this.currentItem === 'SHELL' && Math.random() < 0.01) input.item = true; 
                        else if (this.currentItem === 'BANANA' && Math.random() < 0.01) input.item = true;
                    }
                    return input;
                }
            }

            update() {
                if (this.itemCooldown > 0) this.itemCooldown--;

                // Universal Waypoint Tracking
                let wps = currentMap.waypoints;
                let currWP = wps[this.currentWaypoint];
                
                let distCurr = Math.sqrt(Math.pow(currWP.x - this.kartGroup.position.x, 2) + Math.pow(currWP.z - this.kartGroup.position.z, 2));
                if (distCurr < 150) { this.currentWaypoint = (this.currentWaypoint + 1) % wps.length; }
                this.progressScore = (this.lap * 100) + this.currentWaypoint;

                const input = this.getInput();
                if (input.item) this.useItem();

                if (this.spinTimer > 0) {
                    this.spinTimer--; this.speed *= 0.95; this.heading += 0.4; 
                    input.up = false; input.down = false; input.steer = 0; input.drift = false;
                }

                // Smooth Steering Interpolation
                this.currentSteer += (input.steer - this.currentSteer) * this.steerSmoothness;
                let turnInput = this.currentSteer;

                // Physics & Terrain
                let surface = getSurfaceColor(this.kartGroup.position.x, this.kartGroup.position.z);
                const bgRGB = hexToRgb(currentMap.bg);
                this.isOffroad = Math.abs(surface.r - bgRGB.r) < 10 && Math.abs(surface.g - bgRGB.g) < 10;

                // Check Boost Pad (Pure Orange: #ff6600 -> rgb(255, 102, 0))
                if (surface.r > 240 && surface.g > 80 && surface.g < 120 && surface.b < 20) {
                    this.boostTimer = 60;
                    if (this.kartHeight <= 0.1 && this.hopVelocity <= 0) {
                        this.hopVelocity = 1.4; // Huge jump
                        this.flipAngle = Math.PI * 2; // Trigger backflip!
                        if(this.isHuman) Sounds.jump();
                    }
                }

                let currentMaxSpeed = this.maxSpeed;
                if (this.isOffroad && this.boostTimer <= 0) currentMaxSpeed = this.maxSpeed * 0.35;
                if (this.boostTimer > 0) currentMaxSpeed = this.maxBoostSpeed;

                if (input.up) this.speed += this.acceleration; else if (input.down) this.speed -= this.acceleration;

                let curFriction = (this.isOffroad && this.boostTimer <= 0) ? this.offroadFriction : this.friction;
                if (!input.up && !input.down) {
                    if (this.speed > 0) { this.speed -= curFriction; if(this.speed < 0) this.speed = 0; }
                    if (this.speed < 0) { this.speed += curFriction; if(this.speed > 0) this.speed = 0; }
                }

                this.speed = Math.max(-this.maxSpeed * 0.4, Math.min(this.speed, currentMaxSpeed));

                let steeringForce = this.turnSpeed; if (this.speed < 0) turnInput *= -1;

                if (Math.abs(this.speed) > 0.1 && this.spinTimer <= 0) {
                    // Start drift only on deliberate turn
                    if (input.drift && !this.isDrifting && Math.abs(turnInput) > 0.3 && this.speed > this.maxSpeed * 0.5 && !this.isOffroad && this.kartHeight <= 0.1) {
                        this.isDrifting = true; this.driftDir = turnInput > 0 ? 1 : -1; this.driftPower = 0; this.hopVelocity = 0.8; if(this.isHuman && !this.finished) Sounds.jump();
                    }

                    if (this.isDrifting) {
                        this.heading += steeringForce * (this.driftDir * 1.0 + turnInput * 0.5);
                        this.visualAngleOffset = THREE.MathUtils.lerp(this.visualAngleOffset, this.driftDir * -0.6, 0.15);
                        let oldPow = this.driftPower; this.driftPower += 0.015;
                        
                        if (this.isHuman && !this.finished) { if (oldPow < 0.5 && this.driftPower >= 0.5) Sounds.boostReady(); if (oldPow < 1.5 && this.driftPower >= 1.5) Sounds.boostReady(); if (oldPow < 2.5 && this.driftPower >= 2.5) Sounds.boostReady(); }
                        if (Math.random() > 0.15) spawnSpark(this.kartGroup.position.clone().add(new THREE.Vector3(0,0.5,0)), this.driftPower);
                        if (this.speed < this.maxSpeed * 0.4 || this.isOffroad) this.isDrifting = false;
                    } else {
                        this.heading += steeringForce * turnInput * (Math.abs(this.speed) / this.maxSpeed);
                        this.visualAngleOffset = THREE.MathUtils.lerp(this.visualAngleOffset, 0, 0.2);
                    }
                }

                if (!input.drift && this.isDrifting) {
                    this.isDrifting = false; let boostMsgStr = ""; let boostColor = "";
                    if (this.driftPower >= 2.5) { this.boostTimer = 100; boostMsgStr = "ULTRA BOOST!"; boostColor = '#ff00ff'; }
                    else if (this.driftPower >= 1.5) { this.boostTimer = 60; boostMsgStr = "SUPER BOOST!"; boostColor = '#ff9800'; }
                    else if (this.driftPower >= 0.5) { this.boostTimer = 30; boostMsgStr = "MINI BOOST!"; boostColor = '#00ffcc'; }
                    if (boostMsgStr && this.isHuman && !this.finished) { this.showBoostMessage(boostMsgStr, boostColor); Sounds.boostGo(); }
                    this.driftPower = 0;
                }

                // Boost Exhaust Visuals
                if (this.boostTimer > 0) {
                    this.kartModel.exhaustFlame.scale.set(1.5, 3, 1.5);
                    this.kartModel.exhaustFlame.visible = true;
                    if (this.isHuman && !this.finished) document.getElementById('speed-lines').style.opacity = 1;
                } else {
                    this.kartModel.exhaustFlame.visible = false;
                    if (this.isHuman) document.getElementById('speed-lines').style.opacity = 0;
                }

                if (this.isOffroad && Math.abs(this.speed) > 0.2 && Math.random() > 0.4) spawnSpark(this.kartGroup.position.clone(), -1); // Dust

                // Apply Forward Movement
                this.kartGroup.position.x -= Math.sin(this.heading) * this.speed;
                this.kartGroup.position.z -= Math.cos(this.heading) * this.speed;

                // Kart-to-Kart Collisions
                players.forEach(p2 => {
                    if (this !== p2 && !this.finished && !p2.finished) {
                        let dx = this.kartGroup.position.x - p2.kartGroup.position.x;
                        let dz = this.kartGroup.position.z - p2.kartGroup.position.z;
                        let dist = Math.sqrt(dx*dx + dz*dz);
                        if (dist < 6.0 && dist > 0) {
                            let overlap = 6.0 - dist;
                            let nx = dx / dist; let nz = dz / dist;
                            this.kartGroup.position.x += nx * overlap * 0.5;
                            this.kartGroup.position.z += nz * overlap * 0.5;
                            this.speed *= 0.98; 
                        }
                    }
                });

                this.kartGroup.position.x = Math.max(-WORLD_SIZE/2 + 20, Math.min(WORLD_SIZE/2 - 20, this.kartGroup.position.x));
                this.kartGroup.position.z = Math.max(-WORLD_SIZE/2 + 20, Math.min(WORLD_SIZE/2 - 20, this.kartGroup.position.z));

                // Visual Jump, Bounce, & Backflip
                if (this.kartHeight > 0 || this.hopVelocity > 0) {
                    this.kartHeight += this.hopVelocity; 
                    this.hopVelocity -= 0.08;
                    if (this.kartHeight <= 0) { 
                        this.kartHeight = 0; this.hopVelocity = 0; this.flipAngle = 0; 
                    }
                }
                this.kartModel.position.y = this.kartHeight;
                
                if (this.flipAngle > 0) {
                    this.kartModel.rotation.x = this.flipAngle;
                    this.flipAngle -= 0.18; // rotate smoothly
                    if(this.flipAngle < 0) this.flipAngle = 0;
                } else {
                    this.kartModel.rotation.x = 0;
                }
                
                // Detailed Steering Animations
                if (this.spinTimer <= 0) {
                    this.kartGroup.rotation.y = this.heading + this.visualAngleOffset;
                    this.kartModel.rotation.z = THREE.MathUtils.lerp(this.kartModel.rotation.z, (this.isDrifting ? this.driftDir : turnInput) * 0.15, 0.1);
                    this.frontWheels.forEach(w => w.rotation.y = this.isDrifting ? this.driftDir * 0.5 : turnInput * 0.5);

                    this.kartModel.sWheel.rotation.z = (this.isDrifting ? this.driftDir : turnInput) * -0.5;
                    this.kartModel.driver.rotation.z = (this.isDrifting ? this.driftDir : turnInput) * -0.2;
                    this.kartModel.headGroup.rotation.y = (this.isDrifting ? this.driftDir : turnInput) * -0.4;
                }
                
                // Hands Up on Jump, or Cheering when Finished
                if (this.hopVelocity > 0 || (this.finished && Math.sin(Date.now()*0.01) > 0)) {
                    this.kartModel.driver.position.y = 3.5; this.kartModel.leftHand.position.y = 2.5; this.kartModel.rightHand.position.y = 2.5;
                } else {
                    this.kartModel.driver.position.y = 2.8; this.kartModel.leftHand.position.y = 1.2; this.kartModel.rightHand.position.y = 1.2;
                }

                this.kartModel.traverse((child) => { if (child.isWheel) child.rotation.x -= this.speed * 0.6; });

                // Items Hitbox
                itemBoxes.forEach(box => {

                        box.active = false; box.visible = false; box.respawnTimer = 300;
                        if (!this.currentItem) {
                            this.currentItem = ITEMS[Math.floor(Math.random() * ITEMS.length)];
                            if (this.isHuman && !this.finished) { this.itemSlotEl.innerText = ITEM_EMOJIS[this.currentItem]; Sounds.itemGet(); }
                        }
                    }
                });

                // Checkpoint & Finish Line
                if (this.kartGroup.position.z > 100) this.checkpointPassed = true;
                if (this.checkpointPassed && this.kartGroup.position.x < 150 && this.kartGroup.position.x > -150 && this.kartGroup.position.z < -200 && this.kartGroup.position.z > -350) {
                    this.lap++; this.checkpointPassed = false;
                    if (this.lap > this.totalLaps && !this.finished) {
                        this.finished = true; this.autopilot = true; finishedRacers++; this.placement = finishedRacers;
                        
                        // Log result
                        raceResults.push({
                            name: this.config.name, time: formatTime(Date.now() - raceStartTime),
                            isHuman: this.isHuman, color: this.config.main
                        });

                        if(this.isHuman) { 
                            this.lapEl.innerText = `FINISHED ${this.placement}${getOrdinalSuffix(this.placement)}!`; 
                            this.lapEl.style.color = '#00ffcc'; this.itemSlotEl.innerText = '';

                        checkGameOver();
                    } else if (this.isHuman && !this.finished) { 
                        this.lapEl.innerText = `P${this.index+1} Lap ${this.lap}/${this.totalLaps}`; 
                    }
                }

                if (this.isHuman) {
                    let kph = Math.floor(Math.abs(this.speed) * 120);
                    this.speedValEl.innerText = kph + ' KM/H';
                    this.speedBarFill.style.width = Math.min(100, (kph / 250) * 100) + '%';

                    if (gameState === 'RACING') {
                        this.engineGain.gain.setTargetAtTime(0.08, audioCtx.currentTime, 0.1);
                        let targetFreq = 50 + Math.abs(this.speed) * 80;
                        if (this.isDrifting) targetFreq += 20; if (this.boostTimer > 0) targetFreq += 40;
                        this.engineOsc.frequency.setTargetAtTime(targetFreq, audioCtx.currentTime, 0.1);
                    } else { this.engineGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1); }

                    this.updateCamera();

                    if (this.ctxMap) {

                            this.ctxMap.strokeStyle = p === this ? '#fff' : (p.isHuman ? '#fff' : '#000'); this.ctxMap.lineWidth = p === this ? 2 : 1; this.ctxMap.stroke();
                        });

            }

            updateCamera() {
                let camHeading = this.spinTimer > 0 ? this.heading - (this.kartGroup.rotation.y - this.heading) : this.heading;
                const offset = new THREE.Vector3(Math.sin(camHeading) * 16, 9, Math.cos(camHeading) * 16);
                this.camera.position.lerp(this.kartGroup.position.clone().add(offset), 0.1); // Reduced from 0.15 for smoother trailing
                const lookAtPos = this.kartGroup.position.clone();

                this.camera.lookAt(lookAtPos);

        function spawnProjectile(type, pos, heading, owner) {
            const group = new THREE.Group(); group.position.copy(pos); group.type = type; group.owner = owner; group.active = true;
            if (type === 'SHELL') {
                const shellGeo = new THREE.IcosahedronGeometry(2, 2); const shellMesh = new THREE.Mesh(shellGeo, new THREE.MeshStandardMaterial({color: 0x00ff00, roughness: 0.2, metalness: 0.5}));
                shellMesh.rotation.x = Math.PI/2; group.add(shellMesh); group.position.y = 1.2; group.heading = heading;
                group.position.x -= Math.sin(heading) * 6; group.position.z -= Math.cos(heading) * 6; activeProjectiles.push(group);
            } else if (type === 'BANANA') {
                const bananaGeo = new THREE.CylinderGeometry(1.0, 1.0, 3, 8); const bananaMesh = new THREE.Mesh(bananaGeo, new THREE.MeshStandardMaterial({color: 0xffff00, roughness: 0.8}));
                bananaMesh.rotation.x = Math.PI/2; bananaMesh.rotation.z = Math.random() * Math.PI; group.add(bananaMesh); group.position.y = 0.5;
                group.position.x += Math.sin(heading) * 6; group.position.z += Math.cos(heading) * 6; activeTraps.push(group);
            }
            scene.add(group);
        }

        function updateProjectilesAndTraps() {
            for (let i = activeProjectiles.length - 1; i >= 0; i--) {
                let p = activeProjectiles[i];
                p.position.x -= Math.sin(p.heading) * 3.5; p.position.z -= Math.cos(p.heading) * 3.5; p.children[0].rotation.z += 0.5;
                players.forEach(player => { if (p.active && player !== p.owner && player.spinTimer <= 0) { if (player.kartGroup.position.distanceTo(p.position) < 8.0) { player.spinOut(); p.active = false; } } });
                let surface = getSurfaceColor(p.position.x, p.position.z); const bgRGB = hexToRgb(currentMap.bg);
                if (Math.abs(surface.r - bgRGB.r) < 10 && Math.abs(surface.g - bgRGB.g) < 10) { spawnSpark(p.position, -1); p.active = false; }
                if (!p.active) { scene.remove(p); activeProjectiles.splice(i, 1); }
            }
            for (let i = activeTraps.length - 1; i >= 0; i--) {
                let t = activeTraps[i];
                players.forEach(player => { if (t.active && player.spinTimer <= 0) { if (player.kartGroup.position.distanceTo(t.position) < 8.0) { if (player !== t.owner || player.kartGroup.position.distanceTo(t.position) > 4) { player.spinOut(); t.active = false; } } } });
                if (!t.active) { scene.remove(t); activeTraps.splice(i, 1); }
            }
        }

        // --- PROCEDURAL TEXTURES & ENVIRONMENT ---
        function buildEnvironment(mapDef) {
            const canvas = document.createElement('canvas'); canvas.width = CANVAS_SIZE; canvas.height = CANVAS_SIZE; const ctx = canvas.getContext('2d');
            ctx.fillStyle = mapDef.bg; ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE); ctx.lineCap = 'round'; ctx.lineJoin = 'round';

            function drawPath(thickness, color, isRumble=false) {
                ctx.lineWidth = thickness; ctx.strokeStyle = color; ctx.beginPath();
                if (mapDef.id === 'mushroom') { ctx.arc(350, 512, 242, Math.PI/2, -Math.PI/2, false); ctx.lineTo(674, 270); ctx.arc(674, 512, 242, -Math.PI/2, Math.PI/2, false); ctx.lineTo(350, 754); } 
                else if (mapDef.id === 'desert') { ctx.moveTo(350, 270); ctx.lineTo(674, 270); ctx.arcTo(850, 270, 850, 400, 150); ctx.lineTo(850, 650); ctx.arcTo(850, 800, 700, 800, 150); ctx.lineTo(350, 800); ctx.arcTo(174, 800, 174, 650, 150); ctx.lineTo(174, 400); ctx.arcTo(174, 270, 350, 270, 150); } 
                else if (mapDef.id === 'snow') { ctx.moveTo(512, 270); ctx.bezierCurveTo(900, 270, 900, 600, 700, 650); ctx.bezierCurveTo(500, 700, 500, 850, 300, 800); ctx.bezierCurveTo(100, 750, 100, 400, 200, 350); ctx.bezierCurveTo(300, 300, 400, 270, 512, 270); }
                else if (mapDef.id === 'volcano') { 
                    ctx.moveTo(350, 250); ctx.lineTo(674, 250); ctx.arcTo(850, 250, 850, 512, 262); ctx.arcTo(850, 774, 674, 774, 262); ctx.lineTo(350, 774); ctx.arcTo(174, 774, 174, 512, 262); ctx.arcTo(174, 250, 350, 250, 262); 
                    ctx.stroke(); ctx.beginPath(); ctx.arc(512, 512, 100, 0, Math.PI*2);
                }
                else if (mapDef.id === 'cyber') {
                    ctx.moveTo(512, 250); ctx.lineTo(768, 250); ctx.lineTo(768, 512); ctx.lineTo(600, 512); ctx.lineTo(600, 768); ctx.lineTo(256, 768); ctx.lineTo(256, 512); ctx.lineTo(400, 512); ctx.lineTo(400, 250); ctx.lineTo(512, 250);
                }
                if(isRumble) ctx.setLineDash([20, 20]); else ctx.setLineDash([]); ctx.stroke();
            }

            drawPath(180, mapDef.border, true); drawPath(150, mapDef.road); 
            ctx.fillStyle = '#ffffff'; ctx.setLineDash([]);
            for(let i=0; i<8; i++) { ctx.fillRect(490 + (i%2)*12, 200 + i*20, 12, 20); ctx.fillRect(502 - (i%2)*12, 200 + i*20, 12, 20); }

            // Draw Boost Pads
            ctx.fillStyle = '#ff6600'; 
            if (mapDef.boostPads) {
                mapDef.boostPads.forEach(pad => {
                    let px = ((pad.x + WORLD_SIZE/2) / WORLD_SIZE) * CANVAS_SIZE;
                    let pz = ((pad.z + WORLD_SIZE/2) / WORLD_SIZE) * CANVAS_SIZE;
                    ctx.save(); ctx.translate(px, pz); ctx.rotate(pad.a);
                    ctx.beginPath(); ctx.moveTo(-20, -15); ctx.lineTo(0, 15); ctx.lineTo(20, -15); ctx.lineTo(0, -5); ctx.fill();
                    ctx.translate(0, 25); ctx.beginPath(); ctx.moveTo(-20, -15); ctx.lineTo(0, 15); ctx.lineTo(20, -15); ctx.lineTo(0, -5); ctx.fill();
                    ctx.restore();
                });
            }

            collisionData = ctx.getImageData(0, 0, CANVAS_SIZE, CANVAS_SIZE).data;
            
            // Procedural Noise and Bump Mapping overlay
            const bumpCanvas = document.createElement('canvas'); bumpCanvas.width = CANVAS_SIZE; bumpCanvas.height = CANVAS_SIZE;
            const bCtx = bumpCanvas.getContext('2d'); bCtx.fillStyle = '#888'; bCtx.fillRect(0,0,CANVAS_SIZE,CANVAS_SIZE);

            for(let i=0; i<100000; i++) {
                let rx = Math.random() * CANVAS_SIZE, ry = Math.random() * CANVAS_SIZE; 
                let idx = (Math.floor(ry)*CANVAS_SIZE + Math.floor(rx))*4;
                
                ctx.fillStyle = Math.random() > 0.5 ? `rgba(0,0,0,0.08)` : `rgba(255,255,255,0.06)`;
                ctx.fillRect(rx, ry, 2, 2);

                let c = Math.floor(Math.random() * 255);
                bCtx.fillStyle = `rgb(${c},${c},${c})`;
                bCtx.fillRect(rx, ry, 2, 2);
            }

            const texture = new THREE.CanvasTexture(canvas); texture.wrapS = THREE.RepeatWrapping; texture.wrapT = THREE.RepeatWrapping; texture.anisotropy = renderer.capabilities.getMaxAnisotropy();
            const bumpTex = new THREE.CanvasTexture(bumpCanvas); bumpTex.wrapS = THREE.RepeatWrapping; bumpTex.wrapT = THREE.RepeatWrapping;

            const mat = new THREE.MeshStandardMaterial({ map: texture, bumpMap: bumpTex, bumpScale: 1.5, roughness: 0.9, metalness: 0.1 }); 
            trackPlane = new THREE.Mesh(new THREE.PlaneGeometry(WORLD_SIZE, WORLD_SIZE), mat); trackPlane.rotation.x = -Math.PI / 2; trackPlane.receiveShadow = true; scene.add(trackPlane);
            trackDataURL = canvas.toDataURL('image/jpeg', 0.2);

            spawnDecorations(mapDef); spawnItemBoxes(mapDef);
        }

            let boxPositions = []; 
            if(mapDef.id === 'mushroom') boxPositions = [[-100, -243], [-100, -263], [-100, -283], [-100, -303], [-100, -323], [100, 243], [100, 263], [100, 283], [100, 303], [100, 323]];
            else if(mapDef.id === 'desert') boxPositions = [[-100, -243], [-100, -263], [-100, -283], [-100, -303], [-100, -323], [356, 0], [376, 0], [396, 0], [416, 0], [436, 0]];
            else if(mapDef.id === 'snow') boxPositions = [[-100, -243], [-100, -263], [-100, -283], [-100, -303], [-100, -323], [-40, 250], [-20, 250], [0, 250], [20, 250], [40, 250]];
            else if(mapDef.id === 'volcano') boxPositions = [[-100, -243], [-100, -263], [-100, -283], [-100, -303], [-100, -323]];
            else if(mapDef.id === 'cyber') boxPositions = [[-100, -243], [-100, -263], [-100, -283], [-100, -303], [-100, -323]];

            boxPositions.forEach(pos => {
                const group = new THREE.Group(); group.add(new THREE.Mesh(outerGeo, outerMat));
                const qmark = new THREE.Mesh(qGeo, qMat); group.add(qmark);
                group.position.set(pos[0], 3, pos[1]); group.active = true; group.respawnTimer = 0; scene.add(group); itemBoxes.push(group);
            });
        }

        function getSurfaceColor(worldX, worldZ) {
            if(!collisionData) return {r:0,g:0,b:0};
            let px = Math.floor(((worldX + WORLD_SIZE/2) / WORLD_SIZE) * CANVAS_SIZE); let py = Math.floor(((worldZ + WORLD_SIZE/2) / WORLD_SIZE) * CANVAS_SIZE);
            px = Math.max(0, Math.min(CANVAS_SIZE - 1, px)); py = Math.max(0, Math.min(CANVAS_SIZE - 1, py));
            let idx = (py * CANVAS_SIZE + px) * 4; return { r: collisionData[idx], g: collisionData[idx+1], b: collisionData[idx+2] };
        }

        function getViewportRect(index, total, w, h) {
            if (total === 1) return { x: 0, y: 0, w: w, h: h };
            if (total === 2) { if (index === 0) return { x: 0, y: h/2, w: w, h: h/2 }; if (index === 1) return { x: 0, y: 0, w: w, h: h/2 }; }
            return { x: 0, y: 0, w: w, h: h };
        }

        function positionUI() {
            const w = window.innerWidth, h = window.innerHeight;
            players.filter(p => p.isHuman).forEach((p, i) => {
                let rect = getViewportRect(i, numHumanPlayers, w, h);
                p.uiContainer.style.left = rect.x + 'px'; p.uiContainer.style.top = (h - rect.y - rect.h) + 'px'; 
                p.uiContainer.style.width = rect.w + 'px'; p.uiContainer.style.height = rect.h + 'px';
            });
        }

        window.addEventListener('resize', () => { 
            if(renderer) renderer.setSize(window.innerWidth, window.innerHeight); 
            if(players.length > 0) positionUI(); 
        });

        // --- CORE SYSTEM & SHADERS ---
        function initScene() {
            scene = new THREE.Scene(); 
            scene.fog = new THREE.FogExp2(0x000000, 0.0015);
            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('gameCanvas'), antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight); renderer.shadowMap.enabled = true; renderer.shadowMap.type = THREE.PCFSoftShadowMap; renderer.setScissorTest(true); 
            
            const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.6);
            hemiLight.position.set(0, 200, 0); scene.add(hemiLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8); dirLight.position.set(200, 400, 100); dirLight.castShadow = true;
            dirLight.shadow.camera.left = -400; dirLight.shadow.camera.right = 400; dirLight.shadow.camera.top = 400; dirLight.shadow.camera.bottom = -400; dirLight.shadow.mapSize.width = 2048; dirLight.shadow.mapSize.height = 2048; scene.add(dirLight);

            const vertexShader = `varying vec3 vWorldPosition; void main() { vec4 worldPosition = modelMatrix * vec4( position, 1.0 ); vWorldPosition = worldPosition.xyz; gl_Position = projectionMatrix * modelViewMatrix * vec4( position, 1.0 ); }`;
            const fragmentShader = `uniform vec3 topColor; uniform vec3 bottomColor; uniform float offset; uniform float exponent; varying vec3 vWorldPosition; void main() { float h = normalize( vWorldPosition + offset ).y; gl_FragColor = vec4( mix( bottomColor, topColor, max( pow( max( h , 0.0), exponent ), 0.0 ) ), 1.0 ); }`;
            const uniforms = { topColor: { value: new THREE.Color(0x0055ff) }, bottomColor: { value: new THREE.Color(0x87CEEB) }, offset: { value: 33 }, exponent: { value: 0.6 } };
            const skyGeo = new THREE.SphereGeometry(1500, 32, 15); const skyMat = new THREE.ShaderMaterial({ vertexShader: vertexShader, fragmentShader: fragmentShader, uniforms: uniforms, side: THREE.BackSide });
            const sky = new THREE.Mesh(skyGeo, skyMat); scene.add(sky);
        }

        function animate() {
            requestAnimationFrame(animate);

            if (gameState === 'RACING' || gameState === 'COUNTDOWN') {
                let maxProgress = 0; players.forEach(p => { if (p.progressScore > maxProgress) maxProgress = p.progressScore; });
                players.forEach(p => {
                    if (!p.isHuman && !p.finished) {
                        if (p.progressScore < maxProgress - 3) { p.maxSpeed = p.baseMaxSpeed + 0.1; p.acceleration = p.baseAccel + 0.002; } 
                        else { p.maxSpeed = p.baseMaxSpeed; p.acceleration = p.baseAccel; }
                    }
                    if (p.finished) p.maxSpeed = p.baseMaxSpeed * 0.7; 
                });

                players.forEach(p => p.update()); updateProjectilesAndTraps();
                itemBoxes.forEach(box => { 
                    if (!box.active) { box.respawnTimer--; if (box.respawnTimer <= 0) { box.active = true; box.visible = true; } } 
                    else { 
                        box.rotation.x += 0.03; box.rotation.y += 0.05; 
                        box.children[1].rotation.x += 0.05; box.children[1].rotation.y += 0.05; 
                    } 
                });
            }
            
            updateParticles();

            const w = window.innerWidth, h = window.innerHeight;
            renderer.setViewport(0, 0, w, h); renderer.setScissor(0, 0, w, h); renderer.setClearColor(0x000000); renderer.clear();

            if (gameState === 'RACING' || gameState === 'COUNTDOWN') {
                players.filter(p => p.isHuman).forEach((player, i) => {
                    let rect = getViewportRect(i, numHumanPlayers, w, h);
                    renderer.setViewport(rect.x, rect.y, rect.w, rect.h); renderer.setScissor(rect.x, rect.y, rect.w, rect.h);
                    player.camera.aspect = rect.w / rect.h; player.camera.updateProjectionMatrix(); renderer.render(scene, player.camera);
                });
            } else {
                renderer.render(scene, new THREE.PerspectiveCamera(60, w/h, 0.1, 1500));
            }
        }

        function checkGameOver() { 
            if (players.filter(p => p.isHuman).every(p => p.finished)) { 
                if (gameState === 'FINISHED') return;
                gameState = 'FINISHED'; 
                
                // Sort full race results, filling in remaining bots
                players.forEach(p => {
                    if (!p.finished) raceResults.push({ name: p.config.name, time: "DNF", color: p.config.main, isHuman: p.isHuman });
                });

                setTimeout(() => { 
                    const tbody = document.getElementById('leaderboard-body');
                    tbody.innerHTML = '';
                    raceResults.forEach((res, i) => {
                        const tr = document.createElement('tr');
                        if(res.isHuman) tr.className = 'human-row';
                        tr.innerHTML = `<td>${i+1}</td><td><span style="display:inline-block; width:15px; height:15px; background:${res.color}; border-radius:50%; margin-right:10px;"></span>${res.name}</td><td>${res.time}</td>`;
                        tbody.appendChild(tr);
                    });
                    document.getElementById('leaderboard-modal').style.display = 'flex';
                }, 2000); 
            } 
        }

        initScene(); animate();
    </script>
</body>
</html>
