                                <h2 className="text-[color:var(--pico-yellow)] text-[10px] md:text-[14px] text-center font-bold tracking-widest">
                                    BATTLE DECK ({loadout.deck.length} CARDS)
                                </h2>
                                <p className="text-[6px] md:text-[8px] text-[color:var(--pico-lightGrey)] text-center font-medium tracking-wide">Click to equip/unequip cards (Minimum 5 required)</p>
                            </div>
                            <div className="flex flex-wrap gap-4 justify-center overflow-y-auto pb-4 pt-4 custom-scrollbar">
                                {Object.keys(ALL_CARDS).filter(id => unlockedCards.includes(id)).map(cardId => {
                                    const card = ALL_CARDS[cardId];
                                    const isEquipped = loadout.deck.includes(cardId);
                                    return (
                                        <div key={cardId} className="relative transform transition-transform duration-200">
                                            {isEquipped && <div className="absolute -top-3 -right-3 z-30 text-[12px] md:text-[16px] text-[color:var(--pico-green)] bg-black pixel-border p-1 shadow-[2px_2px_0_#000] font-black pb-1">✓</div>}
                                            <Card card={card} onClick={() => toggleCardInDeck(cardId)} disabled={!isEquipped && loadout.deck.length >= 15} />
                                        </div>
                                    )
                                })}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const PrizeMachineView = ({ tokens, setTokens, unlockedChars, setUnlockedChars, unlockedCards, setUnlockedCards, setView }) => {
            const [crafting, setCrafting] = useState(false);
            const [reward, setReward] = useState(null);
            
            const CARD_COST = 25;
            const CHAR_COST = 100;

            const getAvailableCards = () => Object.keys(ALL_CARDS).filter(c => !unlockedCards.includes(c));
            const getAvailableChars = () => Object.keys(ALL_CHARS).filter(c => !unlockedChars.includes(c));

            const handleCraft = (type) => {
                const cost = type === 'card' ? CARD_COST : CHAR_COST;
                if (tokens < cost || crafting) return;

                const available = type === 'card' ? getAvailableCards() : getAvailableChars();
                if (available.length === 0) return;
                playSound('click');

                setTokens(t => t - cost);
                setCrafting(true);
                setReward(null);

                const itemToUnlock = available[0];

                setTimeout(() => {
                    playSound('heal');
                    if (type === 'card') {
                        setUnlockedCards(p => [...p, itemToUnlock]);
                        setReward({ type: 'card', item: ALL_CARDS[itemToUnlock] });
                    } else {
                        setUnlockedChars(p => [...p, itemToUnlock]);
                        setReward({ type: 'char', item: ALL_CHARS[itemToUnlock] });
                    }
                    setCrafting(false);
                }, 1500);
            };

            return (
                <div className="h-full w-full flex flex-col items-center relative overflow-hidden bg-[#050814]">
                    <Header title="SUMMONING PORTAL" tokens={tokens} onBack={() => setView('menu')} />
                    
                    <div className={`mt-8 md:mt-16 w-[220px] h-[220px] sm:w-[300px] sm:h-[300px] md:w-[400px] md:h-[400px] flex items-center justify-center relative bg-black pixel-border ${crafting ? 'shake' : ''}`}>
                         
                         {crafting && <div className="absolute inset-0 border-[8px] border-dashed border-[color:var(--pico-blue)] opacity-60 rounded-full anim-portal m-4 md:m-8"></div>}
                         
                         <div className="z-10 scale-[0.8] md:scale-110">
                             <PixelArt art={SPRITES.summon_portal} scale={8} className="drop-shadow-[4px_4px_0_var(--pico-purple)]" />
                         </div>
                    </div>

                    {reward && (
                        <div className="absolute inset-0 bg-black/90 z-50 flex flex-col items-center justify-center p-6 backdrop-blur-sm">
                            <div className="bg-black pixel-border p-8 md:p-12 flex flex-col items-center text-center shadow-[12px_12px_0_#000] animate-[floatUp_0.4s_ease-out_reverse]">
                                <h3 className="text-[color:var(--pico-yellow)] mb-8 text-[12px] md:text-[18px] font-black drop-shadow-[2px_2px_0_#000]">SUMMONING COMPLETE!</h3>
                                {reward.type === 'char' ? (
                                    <div className="flex flex-col items-center gap-6 bg-[#111] p-8 pixel-border shadow-inner">
                                        <div className="bg-black p-4 pixel-border-sm shadow-lg">
                                            <PixelArt art={SPRITES[reward.item.spriteId]} scale={8} className="drop-shadow-[4px_4px_0_#000]" />
                                        </div>
                                        <span className="text-[color:var(--pico-green)] text-[12px] md:text-[16px] font-black tracking-widest">{reward.item.name}</span>
                                        <span className="text-[8px] text-white font-bold uppercase tracking-widest bg-black px-4 py-2 pixel-border-sm">New Hero Unlocked!</span>
                                    </div>
                                ) : (
                                    <div className="flex flex-col items-center gap-6">
                                        <div className="scale-110 md:scale-125 mb-4 drop-shadow-[8px_8px_0_#000]">
                                            <Card card={reward.item} />
                                        </div>
                                        <span className="text-[8px] text-white font-bold uppercase tracking-widest bg-black px-4 py-2 pixel-border-sm shadow-inner">New Card Forged!</span>
                                    </div>
                                )}
                                <button onClick={() => { playSound('click'); setReward(null); }} className="mt-10 px-10 py-4 pixel-button bg-[color:var(--pico-green)] text-[10px] md:text-[14px] tracking-widest font-black w-full max-w-xs text-white hover:bg-white hover:text-black pixel-border">CLAIM</button>
                            </div>
                        </div>
                    )}

                    <div className="mt-auto mb-10 w-full flex flex-col md:flex-row gap-4 md:gap-8 justify-center px-6">
                        <button 
                            onClick={() => handleCraft('card')} 
                            disabled={tokens < CARD_COST || crafting || getAvailableCards().length === 0}
                            className={`px-6 py-6 md:py-8 pixel-button flex flex-col items-center gap-3 w-full md:w-64 pixel-border ${tokens >= CARD_COST && !crafting && getAvailableCards().length > 0 ? 'bg-[color:var(--pico-blue)] hover:bg-white hover:text-black text-white' : 'bg-[color:var(--pico-darkGrey)] text-white opacity-50 cursor-not-allowed'}`}
                        >
                            <span className="font-bold tracking-widest text-[10px] md:text-[14px]">SUMMON CARD</span>
                            <span className="text-[8px] md:text-[10px] bg-black text-[color:var(--pico-yellow)] px-4 py-2 font-bold pixel-border-sm">COST: {CARD_COST} GOLD</span>
                        </button>
                        
                        <button 
                            onClick={() => handleCraft('char')} 
                            disabled={tokens < CHAR_COST || crafting || getAvailableChars().length === 0}
                            className={`px-6 py-6 md:py-8 pixel-button flex flex-col items-center gap-3 w-full md:w-64 pixel-border ${tokens >= CHAR_COST && !crafting && getAvailableChars().length > 0 ? 'bg-[color:var(--pico-purple)] hover:bg-white hover:text-black text-white' : 'bg-[color:var(--pico-darkGrey)] text-white opacity-50 cursor-not-allowed'}`}
                        >
                            <span className="font-bold tracking-widest text-[10px] md:text-[14px]">SUMMON HERO</span>
                            <span className="text-[8px] md:text-[10px] bg-black text-[color:var(--pico-yellow)] px-4 py-2 font-bold pixel-border-sm">COST: {CHAR_COST} GOLD</span>
                        </button>
                    </div>
                </div>
            );
        };

        const SaveView = ({ tokens, unlockedChars, unlockedCards, loadout, setTokens, setUnlockedChars, setUnlockedCards, setLoadout, setView, user, db, appId, setHasSeenTutorial }) => {
            const [importCode, setImportCode] = useState('');
            const [statusMsg, setStatusMsg] = useState('');
            const [showWipeConfirm, setShowWipeConfirm] = useState(false);

            const generateCode = () => {
                playSound('click');
                const data = { tokens, unlockedChars, unlockedCards, loadout };
                const json = JSON.stringify(data);
                const b64 = window.btoa(unescape(encodeURIComponent(json)));
                
                const textArea = document.createElement("textarea");
                textArea.value = b64;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    setStatusMsg('Save code copied to clipboard!');
                } catch (err) {
                    setStatusMsg('Failed to copy. Check console.');
                    console.log("SAVE CODE:", b64);
                }
                document.body.removeChild(textArea);
            };

            const loadCode = () => {
                playSound('click');
                try {
                    const cleanCode = importCode.trim().replace(/\s/g, '');
                    const json = decodeURIComponent(escape(window.atob(cleanCode)));
                    const data = JSON.parse(json);
                    
                    if (data.tokens !== undefined && data.unlockedChars && data.unlockedCards && data.loadout) {
                        if (!data.loadout.chars && data.loadout.char) {
                            data.loadout.chars = [data.loadout.char];
                        }
                        
                        setTokens(data.tokens);
                        setUnlockedChars(data.unlockedChars);
                        setUnlockedCards(data.unlockedCards);
                        setLoadout(data.loadout);
                        setStatusMsg('Save loaded successfully!');
                    } else {
                        setStatusMsg('Invalid code format.');
                    }
                } catch (e) {
                    setStatusMsg('Failed to load. Invalid code.');
                }
            };

            const wipeSave = async () => {
                playSound('error');
                const defaults = {
                    tokens: 0,
                    unlockedChars: ['KNIGHT'],
                    unlockedCards: ['STRIKE', 'BLOCK', 'GREED', 'BASH', 'REPAIR'],
                    loadout: { chars: ['KNIGHT'], deck: ['STRIKE', 'STRIKE', 'BLOCK', 'BLOCK', 'BASH', 'REPAIR'] },
                    hasSeenTutorial: false
                };

                setTokens(defaults.tokens);
                setUnlockedChars(defaults.unlockedChars);
                setUnlockedCards(defaults.unlockedCards);
                setLoadout(defaults.loadout);
                setHasSeenTutorial(false);

                if (user && db) {
                    try {
                        const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'saveData', 'main');
                        await setDoc(docRef, defaults);
                    } catch(e) { console.error(e); }
                }

                setShowWipeConfirm(false);
                setStatusMsg('Save data wiped clean!');
            };

            return (
                <div className="h-full w-full flex flex-col relative bg-[#050814]">
                    <Header title="SYSTEM DATA" tokens={tokens} onBack={() => setView('menu')} />
                    
                    {showWipeConfirm && (
                        <div className="absolute inset-0 bg-black/90 z-50 flex items-center justify-center p-6 backdrop-blur-sm">
                            <div className="bg-black p-8 md:p-10 text-center max-w-sm shadow-[12px_12px_0_#000] pixel-border flex flex-col items-center">
                                <h3 className="text-[color:var(--pico-red)] mb-6 text-[14px] md:text-[18px] font-black drop-shadow-md">CRITICAL WARNING</h3>
                                <p className="text-white text-[8px] md:text-[10px] mb-8 leading-loose font-bold">Are you certain you wish to purge all operational data? This sequence is irreversible.</p>
                                <div className="flex gap-4 w-full">
                                    <button onClick={() => { playSound('click'); setShowWipeConfirm(false); }} className="pixel-button bg-[color:var(--pico-darkGrey)] text-white pixel-border w-1/2 py-3 text-[8px] md:text-[10px] font-bold tracking-widest hover:bg-white hover:text-black">CANCEL</button>
                                    <button onClick={wipeSave} className="pixel-button bg-[color:var(--pico-red)] text-white pixel-border w-1/2 py-3 text-[8px] md:text-[10px] font-bold tracking-widest hover:bg-white hover:text-black">PURGE</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="flex-grow flex flex-col items-center p-4 md:p-8 overflow-y-auto custom-scrollbar">
                        <div className="bg-[#111] p-6 md:p-10 max-w-2xl w-full flex flex-col gap-8 md:gap-10 shadow-[8px_8px_0_#000] pixel-border">
                            
                            <div className="flex flex-col gap-3 border-b-[4px] border-[color:var(--pico-darkGrey)] pb-8">
                                <h2 className="text-[color:var(--pico-blue)] text-[12px] md:text-[16px] font-bold tracking-widest">CLOUD UPLINK</h2>
                                <p className="text-[8px] md:text-[10px] text-white leading-loose font-medium">
                                    Network Status: <span className={user ? "text-[color:var(--pico-green)] font-bold" : "text-[color:var(--pico-red)] font-bold"}>{user ? "Secured & Auto-Saving" : "Offline / Unauthenticated"}</span><br/>
                                    Your progress automatically syncs to Firebase while the uplink is active.
                                </p>
                            </div>

                            <div className="flex flex-col gap-4 border-b-[4px] border-[color:var(--pico-darkGrey)] pb-8">
                                <div className="flex flex-col gap-1">
                                    <h2 className="text-[color:var(--pico-yellow)] text-[12px] md:text-[16px] font-bold tracking-widest">DATA EXPORT</h2>
                                    <p className="text-[8px] md:text-[10px] text-white font-medium leading-loose">Generate a raw data string to manually back up or transfer your state.</p>
                                </div>
                                <button onClick={generateCode} className="pixel-button bg-[color:var(--pico-blue)] text-white pixel-border py-4 text-[8px] md:text-[10px] font-bold tracking-widest w-full md:w-auto self-start px-8 shadow-lg hover:bg-white hover:text-black">
                                    COPY EXPORT CODE TO CLIPBOARD
                                </button>
                            </div>

                            <div className="flex flex-col gap-4 border-b-[4px] border-[color:var(--pico-darkGrey)] pb-8">
                                <div className="flex flex-col gap-1">
                                    <h2 className="text-[color:var(--pico-green)] text-[12px] md:text-[16px] font-bold tracking-widest">DATA IMPORT</h2>
                                    <p className="text-[8px] md:text-[10px] text-white font-medium leading-loose">Paste a previously generated data string to restore your state.</p>
                                </div>
                                <div className="flex flex-col md:flex-row gap-4">
                                    <input 
                                        type="text" 
                                        value={importCode}
                                        onChange={(e) => setImportCode(e.target.value)}
                                        placeholder="Paste encrypted string here..."
                                        className="w-full p-4 bg-black text-white pixel-border-sm text-[8px] md:text-[10px] outline-none transition-all font-mono"
                                    />
                                    <button onClick={loadCode} className="pixel-button bg-[color:var(--pico-green)] text-white pixel-border py-4 px-8 text-[8px] md:text-[10px] font-bold tracking-widest shadow-lg shrink-0 hover:bg-white hover:text-black">
                                        INITIATE RESTORE
                                    </button>
                                </div>
                            </div>

                            <div className="flex flex-col md:flex-row gap-4 pt-2">
                                <button onClick={() => { playSound('click'); setHasSeenTutorial(false); setStatusMsg('Tutorial Module Reset!'); }} className="pixel-button bg-[color:var(--pico-orange)] text-white pixel-border py-4 w-full text-[8px] md:text-[10px] font-bold tracking-widest shadow-lg hover:bg-white hover:text-black">
                                    REBOOT TUTORIAL
                                </button>
                                <button onClick={() => { playSound('click'); setShowWipeConfirm(true); }} className="pixel-button bg-[color:var(--pico-red)] text-white pixel-border py-4 w-full text-[8px] md:text-[10px] font-bold tracking-widest shadow-lg hover:bg-white hover:text-black">
                                    PURGE ALL DATA
                                </button>
                            </div>

                            {statusMsg && (
                                <div className="text-center text-[8px] md:text-[10px] text-[color:var(--pico-green)] font-bold bg-[#111] py-3 pixel-border-sm animate-[floatUp_3s_ease-out_forwards]">
                                    {statusMsg}
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const MainApp = () => {
            const [view, setView] = useState('menu'); 
            
            // Meta-Progression State
            const [tokens, setTokens] = useState(0);
            
            const [unlockedChars, setUnlockedChars] = useState(['KNIGHT']);
            const [unlockedCards, setUnlockedCards] = useState(['STRIKE', 'BLOCK', 'GREED', 'BASH', 'REPAIR']);
            const [loadout, setLoadout] = useState({
                chars: ['KNIGHT'],
                deck: ['STRIKE', 'STRIKE', 'BLOCK', 'BLOCK', 'BASH', 'REPAIR']
            });
            
            const [hasSeenTutorial, setHasSeenTutorial] = useState(false);

            // Firebase State
            const [user, setUser] = useState(null);
            const [db, setDb] = useState(null);
            const [appId, setAppId] = useState('dungeon-clawler');
            const [dataLoaded, setDataLoaded] = useState(false);

            useEffect(() => {
                let currentApp, currentAuth, currentDb;
                try {
                    if (typeof __firebase_config !== 'undefined') {
                        const firebaseConfig = JSON.parse(__firebase_config);
                        currentApp = initializeApp(firebaseConfig);
                        currentAuth = getAuth(currentApp);
                        currentDb = getFirestore(currentApp);
                        setDb(currentDb);
                    }
                    if (typeof __app_id !== 'undefined') {
                        setAppId(__app_id);
                    }
                } catch(e) { console.warn("Firebase not initialized", e); }

                if (!currentAuth) {
                    setDataLoaded(true);
                    return;
                }

                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(currentAuth, __initial_auth_token);
                        } else {
                            await signInAnonymously(currentAuth);
                        }
                    } catch (error) {
                        console.error("Auth error", error);
                        setDataLoaded(true);
                    }
                };
                initAuth();

                const unsubscribe = onAuthStateChanged(currentAuth, (currentUser) => {
                    setUser(currentUser);
                    if (!currentUser) setDataLoaded(true);
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user || !db) return;
                const loadCloudSave = async () => {
                    try {
                        const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'saveData', 'main');
                        const docSnap = await getDoc(docRef);
                        if (docSnap.exists()) {
                            const data = docSnap.data();
                            if (data.tokens !== undefined) setTokens(data.tokens);
                            if (data.unlockedChars) setUnlockedChars(data.unlockedChars);
                            if (data.unlockedCards) setUnlockedCards(data.unlockedCards);
                            if (data.loadout) setLoadout(data.loadout);
                            if (data.hasSeenTutorial !== undefined) setHasSeenTutorial(data.hasSeenTutorial);
                        }
                    } catch(e) { console.error("Load save error:", e); }
                    setDataLoaded(true);
                };
                loadCloudSave();
            }, [user, db, appId]);

            useEffect(() => {
                if (!user || !db || !dataLoaded) return;
                const timer = setTimeout(() => {
                    try {
                        const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'saveData', 'main');
                        setDoc(docRef, { tokens, unlockedChars, unlockedCards, loadout, hasSeenTutorial }, { merge: true });
                    } catch(e) { console.error("Auto-save error:", e); }
                }, 1500);
                return () => clearTimeout(timer);
            }, [tokens, unlockedChars, unlockedCards, loadout, hasSeenTutorial, user, db, appId, dataLoaded]);

            const handleEndRun = (earned) => {
                setTokens(t => t + earned);
                setView('menu');
            };

            const completeTutorial = () => {
                setHasSeenTutorial(true);
            };

            if (!dataLoaded) {
                return <div className="h-[100dvh] w-screen bg-[#141013] flex flex-col gap-6 items-center justify-center text-[color:var(--pico-yellow)] text-[12px] md:text-[16px] font-black tracking-widest">INITIALIZING SECURE CONNECTION...</div>;
            }

            const menuCards = [
                { artId: 'sword', color: PICO8_PALETTE['8'], floatClass: 'anim-float', top: '10%', left: '5%' },
                { artId: 'shield', color: PICO8_PALETTE['C'], floatClass: 'anim-float-delayed', top: '50%', right: '5%' },
                { artId: 'potion', color: PICO8_PALETTE['B'], floatClass: 'anim-float', bottom: '10%', left: '15%' }
            ];

            return (
                <div className="min-h-[100dvh] w-screen bg-[#000] flex items-center justify-center">
                    <div id="game-window">
                        {view === 'menu' && (
                            <div className="h-full w-full flex flex-col items-center justify-center p-4 md:p-8 relative overflow-hidden bg-[#1B1E34]" onClick={() => playSound('click')}>
                                <div className="absolute opacity-20 pointer-events-none anim-portal z-0" style={{ transform: 'scale(15)' }}>
                                    <PixelArt art={SPRITES.summon_portal} scale={4} />
                                </div>
                                
                                {/* Decorative floating menu cards */}
                                {menuCards.map((mc, i) => (
                                    <div key={i} className={`absolute ${mc.floatClass} opacity-50 pointer-events-none scale-75 md:scale-110 z-0 drop-shadow-[8px_8px_0_#000]`} style={{ top: mc.top, left: mc.left, right: mc.right, bottom: mc.bottom }}>
                                        <div className="pixel-border bg-[#111]" style={{ borderColor: mc.color, width: '96px', height: '144px' }}>
                                            <div className="h-[60%] w-full border-b-[4px] border-black flex items-center justify-center relative holo-bg" style={{ backgroundColor: mc.color }}>
                                                <PixelArt art={SPRITES[mc.artId]} scale={3} className="drop-shadow-[4px_4px_0_#000]" />
                                            </div>
                                        </div>
                                    </div>
                                ))}

                                <div className="bg-[#141013] p-8 md:p-14 pixel-border flex flex-col items-center gap-10 md:gap-14 z-10 max-w-lg w-full shadow-[16px_16px_0_#000]">
                                    <div className="text-center relative w-full flex justify-center">
                                        <h1 className="text-[20px] sm:text-[28px] md:text-[36px] text-[color:var(--pico-yellow)] leading-[1.4] font-black drop-shadow-[4px_4px_0_var(--pico-red)] text-center">DUNGEON<br/>CLAWLER</h1>
                                        <div className="absolute -bottom-8 right-2 md:-right-6 bg-[color:var(--pico-red)] text-white text-[6px] sm:text-[8px] md:text-[10px] px-4 py-2 pixel-border-sm transform rotate-[-6deg] shadow-[4px_4px_0_#000] font-bold tracking-widest uppercase">FANTASY EDITION</div>
                                    </div>

                                    <div className="flex flex-col gap-4 md:gap-5 w-full mt-4">
                                        <button onClick={() => { playSound('click'); setView('run'); }} className="w-full py-5 md:py-6 pixel-button bg-[color:var(--pico-blue)] text-white text-[12px] md:text-[16px] font-black tracking-widest shadow-[4px_4px_0_#000] pixel-border hover:bg-white hover:text-black">
                                            ENTER DUNGEON
                                        </button>
                                        <div className="flex gap-4 md:gap-5 w-full">
                                            <button onClick={() => { playSound('click'); setView('inventory'); }} className="w-1/2 py-4 md:py-5 pixel-button bg-[color:var(--pico-darkGrey)] text-white text-[8px] md:text-[12px] font-bold tracking-widest shadow-[4px_4px_0_#000] pixel-border hover:bg-white hover:text-black">
                                                LOADOUT
                                            </button>
                                            <button onClick={() => { playSound('click'); setView('forge'); }} className="w-1/2 py-4 md:py-5 pixel-button bg-[color:var(--pico-purple)] text-white text-[8px] md:text-[12px] font-bold tracking-widest shadow-[4px_4px_0_#000] pixel-border flex flex-col justify-center items-center gap-2 hover:bg-white hover:text-black">
                                                <span>SUMMON</span>
                                                <span className="text-[6px] md:text-[8px] bg-black px-3 py-1 text-[color:var(--pico-yellow)] font-bold pixel-border-sm">{tokens} GOLD</span>
                                            </button>
                                        </div>
                                        <button onClick={() => { playSound('click'); setView('save'); }} className="w-full py-4 bg-transparent border-[2px] border-[color:var(--pico-darkGrey)] hover:border-white text-[color:var(--pico-lightGrey)] hover:text-white transition-all text-[8px] md:text-[12px] font-bold tracking-widest pixel-button">
                                            SYSTEM SETTINGS
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}
                        
                        {view === 'run' && <RunView loadout={loadout} onEndRun={handleEndRun} hasSeenTutorial={hasSeenTutorial} completeTutorial={completeTutorial} />}
                        {view === 'inventory' && <InventoryView unlockedChars={unlockedChars} unlockedCards={unlockedCards} loadout={loadout} setLoadout={setLoadout} tokens={tokens} setView={setView} />}
                        {view === 'forge' && <PrizeMachineView tokens={tokens} setTokens={setTokens} unlockedChars={unlockedChars} setUnlockedChars={setUnlockedChars} unlockedCards={unlockedCards} setUnlockedCards={setUnlockedCards} setView={setView} />}
                        {view === 'save' && <SaveView tokens={tokens} unlockedChars={unlockedChars} unlockedCards={unlockedCards} loadout={loadout} setTokens={setTokens} setUnlockedChars={setUnlockedChars} setUnlockedCards={setUnlockedCards} setLoadout={setLoadout} setView={setView} user={user} db={db} appId={appId} setHasSeenTutorial={setHasSeenTutorial} />}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MainApp />);
    </script>
</body>
</html>
