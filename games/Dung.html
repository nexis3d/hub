<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fantasy Deckbuilder</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Press Start 2P', monospace !important;
            image-rendering: pixelated;
            box-sizing: border-box;
        }

        body {
            background-color: #0b0f19;
            color: #F2E8D5;
            overflow: hidden;
            user-select: none;
            touch-action: manipulation;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100dvh;
            margin: 0;
            padding: 0;
        }

        /* Centered Game Window for Responsive View */
        #game-window {
            width: 100%;
            height: 100%;
            max-width: 1024px;
            background-color: #1e293b;
            background-image: radial-gradient(#0b0f19 2px, transparent 2px);
            background-size: 24px 24px;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            --speed-mult: 1;
        }

        @media (min-width: 1024px) {
            #game-window {
                height: 95dvh;
                border: 4px solid #000;
                border-radius: 8px;
                box-shadow: 0 0 40px rgba(0,0,0,0.9);
            }
        }

        .iso-container { perspective: 1200px; transform-style: preserve-3d; }
        .iso-world { transform: rotateX(60deg) rotateZ(-45deg); transform-style: preserve-3d; box-shadow: 20px 20px 0px rgba(0,0,0,0.8); }
        
        .iso-sprite { 
            transform: translateZ(48px) rotateZ(45deg) rotateX(-60deg); 
            transform-style: preserve-3d; 
            transition: transform calc(0.3s / var(--speed-mult)); 
            filter: drop-shadow(-8px 12px 2px rgba(0,0,0,0.8)); 
        }
        
        .claw-high { transform: translateZ(150px) rotateZ(45deg) rotateX(-60deg); filter: drop-shadow(-20px 30px 5px rgba(0,0,0,0.4)); }

        /* Classic Retro UI Components */
        .pixel-border { border: 4px solid #000000; box-shadow: 4px 4px 0px #000000; }
        .pixel-border-sm { border: 2px solid #000000; box-shadow: 2px 2px 0px #000000; }
        
        .pixel-button { transition: transform 0.1s, box-shadow 0.1s, filter 0.1s; cursor: pointer; }
        .pixel-button:active:not(:disabled) { transform: translate(4px, 4px); box-shadow: 0px 0px 0px #000000; filter: brightness(0.8); }
        .pixel-button:disabled { opacity: 0.5; cursor: not-allowed; transform: translate(4px, 4px); box-shadow: 0px 0px 0px #000000; }

        .custom-scrollbar::-webkit-scrollbar { height: 6px; width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #111; border: 1px solid #000; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #51555C; border: 1px solid #000; }

        /* Dynamic JRPG Floating Animations */
        @keyframes hover {
            0%, 100% { 
                transform: translateZ(48px) rotateZ(45deg) rotateX(-60deg) translateY(0px) rotate(0deg); 
                filter: drop-shadow(-8px 12px 2px rgba(0,0,0,0.8));
            }
            50% { 
                transform: translateZ(48px) rotateZ(45deg) rotateX(-60deg) translateY(-14px) rotate(-3deg); 
                filter: drop-shadow(-14px 22px 5px rgba(0,0,0,0.4));
            }
        }
        .anim-hover { animation: hover calc(3s / var(--speed-mult, 1)) ease-in-out infinite; }
        .delay-0 { animation-delay: 0s; }
        .delay-1 { animation-delay: -1s; }
        .delay-2 { animation-delay: -2s; }

        @keyframes floatAnim {
            0%, 100% { transform: translateY(0) rotate(-4deg); }
            50% { transform: translateY(-15px) rotate(-2deg); }
        }
        .anim-float { animation: floatAnim 6s ease-in-out infinite steps(4); }
        
        @keyframes floatAnim2 {
            0%, 100% { transform: translateY(0) rotate(4deg); }
            50% { transform: translateY(-15px) rotate(6deg); }
        }
        .anim-float-delayed { animation: floatAnim2 6s ease-in-out infinite steps(4) 3s; }

        @keyframes enemyLunge {
            0%, 100% { transform: translateZ(48px) rotateZ(45deg) rotateX(-60deg) translate(0, 0); }
            50% { transform: translateZ(48px) rotateZ(45deg) rotateX(-60deg) translate(-40px, 40px); }
        }
        .anim-lunge { animation: enemyLunge calc(0.3s / var(--speed-mult, 1)) cubic-bezier(.36,.07,.19,.97); }

        @keyframes clawDrop {
            0% { transform: translateZ(150px) rotateZ(45deg) rotateX(-60deg); filter: drop-shadow(-20px 30px 5px rgba(0,0,0,0.4)); }
            50% { transform: translateZ(48px) rotateZ(45deg) rotateX(-60deg); filter: drop-shadow(-8px 12px 2px rgba(0,0,0,0.8)); }
            100% { transform: translateZ(150px) rotateZ(45deg) rotateX(-60deg); filter: drop-shadow(-20px 30px 5px rgba(0,0,0,0.4)); }
        }
        .anim-claw-drop { animation: clawDrop calc(1s / var(--speed-mult, 1)) ease-in-out forwards; }

        @keyframes shake {
            0% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(6px, -6px) rotate(2deg); }
            50% { transform: translate(-6px, 6px) rotate(-2deg); }
            75% { transform: translate(6px, 6px) rotate(1deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }
        .shake { animation: shake calc(0.2s / var(--speed-mult, 1)) cubic-bezier(.36,.07,.19,.97) both; }

        @keyframes floatUp {
            0% { transform: translate(-50%, 0) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -50px) scale(1.2); opacity: 0; }
        }

        @keyframes pulse-btn {
            0%, 100% { transform: scale(1); box-shadow: 4px 4px 0px #000; filter: brightness(1); }
            50% { transform: scale(1.02); box-shadow: 6px 6px 0px #000; filter: brightness(1.2); }
        }
        .btn-pulse { animation: pulse-btn 1.5s infinite steps(2); }

        @keyframes particleBurst {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--dx), var(--dy)) scale(0.1); opacity: 0; }
        }
        .particle {
            position: absolute;
            top: 50%; left: 50%;
            animation: particleBurst calc(0.6s / var(--speed-mult, 1)) cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
            pointer-events: none;
            z-index: 100;
            box-shadow: 2px 2px 0 currentColor;
        }

        .holo-bg {
            background-image: repeating-linear-gradient(
                45deg,
                rgba(255, 255, 255, 0.1) 0,
                rgba(255, 255, 255, 0.1) 4px,
                transparent 4px,
                transparent 12px
            );
        }

        @keyframes portalSpin { 100% { transform: rotate(360deg); } }
        .anim-portal { animation: portalSpin 10s linear infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const { useState, useEffect, useRef } = React;

        // --- AUDIO ENGINE ---
        let audioCtx = null;
        function playSound(type) {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                const now = audioCtx.currentTime;
                if (type === 'hit') {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(150, now);
                    osc.frequency.exponentialRampToValueAtTime(40, now + 0.3);
                    gain.gain.setValueAtTime(0.4, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                    osc.start(now); osc.stop(now + 0.3);
                } else if (type === 'heal' || type === 'block') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(300, now);
                    osc.frequency.linearRampToValueAtTime(600, now + 0.4);
                    gain.gain.setValueAtTime(0.3, now);
                    gain.gain.linearRampToValueAtTime(0.01, now + 0.4);
                    osc.start(now); osc.stop(now + 0.4);
                } else if (type === 'draw' || type === 'click') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(800, now);
                    osc.frequency.exponentialRampToValueAtTime(1200, now + 0.05);
                    gain.gain.setValueAtTime(0.1, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
                    osc.start(now); osc.stop(now + 0.05);
                } else if (type === 'enemyHit') {
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(80, now);
                    osc.frequency.exponentialRampToValueAtTime(20, now + 0.5);
                    gain.gain.setValueAtTime(0.5, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                    osc.start(now); osc.stop(now + 0.5);
                } else if (type === 'endTurn') {
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(200, now);
                    osc.frequency.linearRampToValueAtTime(100, now + 0.4);
                    gain.gain.setValueAtTime(0.2, now);
                    gain.gain.linearRampToValueAtTime(0.01, now + 0.4);
                    osc.start(now); osc.stop(now + 0.4);
                } else if (type === 'error') {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(100, now);
                    osc.frequency.linearRampToValueAtTime(80, now + 0.2);
                    gain.gain.setValueAtTime(0.2, now);
                    gain.gain.linearRampToValueAtTime(0.01, now + 0.2);
                    osc.start(now); osc.stop(now + 0.2);
                }
            } catch(e) {}
        }

        const PixelArt = ({ art, scale = 4, className = "" }) => {
            if (!art) return <svg className={className} width={16*scale} height={16*scale}></svg>; 
            const rows = art.trim().split('\n').map(r => r.trim()).filter(r => r.length > 0);
            if (!rows.length) return null;
            const h = rows.length;
            const w = rows[0].length;
            return (
                <svg className={className} width={w * scale} height={h * scale} viewBox={`0 0 ${w} ${h}`} shapeRendering="crispEdges">
                    {rows.map((row, y) => row.split('').map((char, x) => {
                        if (char === '.') return null;
                        const fill = PICO8_PALETTE[char] || '#000000';
                        return <rect key={`${x}-${y}`} x={x} y={y} width="1.05" height="1.05" fill={fill} />
                    }))}
                </svg>
            )
        };

        function stableShuffle(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        // --- Master Game Data ---
        // ALL heroes grant 1 Energy per turn!
        const ALL_CHARS = {
            KNIGHT: { id: 'KNIGHT', name: 'KNIGHT', hp: 45, maxHp: 45, energy: 1, spriteId: 'knight' },
            MAGE: { id: 'MAGE', name: 'MAGE', hp: 25, maxHp: 25, energy: 1, spriteId: 'mage' },
            JUGGERNAUT: { id: 'JUGGERNAUT', name: 'TANK', hp: 70, maxHp: 70, energy: 1, spriteId: 'juggernaut' },
            ROGUE: { id: 'ROGUE', name: 'ROGUE', hp: 30, maxHp: 30, energy: 1, spriteId: 'rogue' },
            PALADIN: { id: 'PALADIN', name: 'PALADIN', hp: 55, maxHp: 55, energy: 1, spriteId: 'paladin' },
            RANGER: { id: 'RANGER', name: 'RANGER', hp: 35, maxHp: 35, energy: 1, spriteId: 'ranger' },
            CLERIC: { id: 'CLERIC', name: 'CLERIC', hp: 40, maxHp: 40, energy: 1, spriteId: 'cleric' }
        };

        // All cards cost 1 Energy except Execution (2) and Focus (0)
        const ALL_CARDS = {
            STRIKE: { id: 'STRIKE', name: 'SLASH', type: 'attack', val: 5, cost: 1, color: PICO8_PALETTE['8'], artId: 'sword', desc: 'Deal 5 DMG' },
            HEAVY_STRIKE: { id: 'HEAVY_STRIKE', name: 'CLEAVE', type: 'attack', val: 10, cost: 1, color: PICO8_PALETTE['8'], artId: 'axe', desc: 'Deal 10 DMG' },
            ASSASSINATE: { id: 'ASSASSINATE', name: 'ASSASSINATE', type: 'attack', val: 15, cost: 1, color: PICO8_PALETTE['2'], artId: 'dagger', desc: 'Deal 15 DMG' },
            SNIPE: { id: 'SNIPE', name: 'SNIPE', type: 'attack', val: 8, cost: 1, color: PICO8_PALETTE['3'], artId: 'dagger', desc: '8 DMG. Draw 1.' },
            BLESSED_STRIKE: { id: 'BLESSED_STRIKE', name: 'BLESSED STRIKE', type: 'attack', val: 6, cost: 1, color: PICO8_PALETTE['A'], artId: 'sword', desc: '6 DMG. Heal 3.' },
            VAMPIRISM: { id: 'VAMPIRISM', name: 'VAMPIRISM', type: 'attack', val: 5, cost: 1, color: PICO8_PALETTE['2'], artId: 'blood', desc: '5 DMG. Heal 5.' },
            EXECUTE: { id: 'EXECUTE', name: 'EXECUTE', type: 'attack', val: 20, cost: 2, color: PICO8_PALETTE['0'], artId: 'axe', desc: 'Deal 20 DMG' },
            BLOCK: { id: 'BLOCK', name: 'SHIELD', type: 'skill', val: 5, cost: 1, color: PICO8_PALETTE['C'], artId: 'shield', desc: 'Gain 5 BLK' },
            DEFLECT: { id: 'DEFLECT', name: 'BARRICADE', type: 'skill', val: 8, cost: 1, color: PICO8_PALETTE['C'], artId: 'armor', desc: 'Gain 8 BLK' },
            FORTIFY: { id: 'FORTIFY', name: 'FORTIFY', type: 'skill', val: 12, cost: 1, color: PICO8_PALETTE['1'], artId: 'armor', desc: 'Gain 12 BLK' },
            GREED: { id: 'GREED', name: 'LOOT', type: 'power', val: 0, cost: 1, color: PICO8_PALETTE['A'], artId: 'coin', desc: 'Gain 5 Gold' },
            WARCRY: { id: 'WARCRY', name: 'WARCRY', type: 'skill', val: 2, cost: 1, color: PICO8_PALETTE['9'], artId: 'scroll', desc: 'Gain 2 NRG' },
            FOCUS: { id: 'FOCUS', name: 'FOCUS', type: 'skill', val: 0, cost: 0, color: PICO8_PALETTE['D'], artId: 'aura', desc: 'Draw 2 Cards' },
            FIREBALL: { id: 'FIREBALL', name: 'FIREBALL', type: 'attack', val: 8, cost: 1, color: PICO8_PALETTE['9'], artId: 'staff', desc: 'Spell: 8 DMG' },
            POISON: { id: 'POISON', name: 'ENVENOM', type: 'attack', val: 4, cost: 1, color: PICO8_PALETTE['3'], artId: 'potion', desc: '4 DMG, Draw 1' },
            REPAIR: { id: 'REPAIR', name: 'HEAL', type: 'skill', val: 6, cost: 1, color: PICO8_PALETTE['B'], artId: 'potion', desc: 'Spell: 6 HP' },
            REGENERATE: { id: 'REGENERATE', name: 'REGENERATE', type: 'skill', val: 12, cost: 1, color: PICO8_PALETTE['B'], artId: 'heart', desc: 'Spell: 12 HP' },
            AURA: { id: 'AURA', name: 'DIVINE AURA', type: 'skill', val: 12, cost: 1, color: PICO8_PALETTE['A'], artId: 'aura', desc: 'Spell: 12 HP' },
            BASH: { id: 'BASH', name: 'SMITE', type: 'attack', val: 7, cost: 1, color: PICO8_PALETTE['8'], artId: 'hammer', desc: 'Deal 7 DMG' },
            FAMILIAR: { id: 'FAMILIAR', name: 'FAMILIAR', type: 'attack', val: 6, cost: 1, color: PICO8_PALETTE['3'], artId: 'slime', desc: 'Pet: 6 DMG' },
            GUARD: { id: 'GUARD', name: 'GUARD', type: 'skill', val: 7, cost: 1, color: PICO8_PALETTE['3'], artId: 'golem', desc: 'Pet: 7 BLK' },
            MERCENARY: { id: 'MERCENARY', name: 'MERCENARY', type: 'attack', val: 10, cost: 1, color: PICO8_PALETTE['5'], artId: 'orc', desc: 'Summon: 10 DMG' }
        };

        const ENEMIES = [
            { name: "Slime", hp: 40, maxHp: 40, intent: {type: 'attack', val: 6}, spriteId: 'slime', reward: 15 },
            { name: "Goblin", hp: 60, maxHp: 60, intent: {type: 'attack', val: 9}, spriteId: 'goblin', reward: 20 },
            { name: "Orc Brute", hp: 100, maxHp: 100, intent: {type: 'attack', val: 15}, spriteId: 'orc', reward: 35 },
            { name: "Golem", hp: 140, maxHp: 140, intent: {type: 'attack', val: 20}, spriteId: 'golem', reward: 50 }
        ];

        function getEnemyForFloor(floor) {
            const base = ENEMIES[(floor - 1) % ENEMIES.length];
            const multiplier = 1 + Math.floor((floor - 1) / ENEMIES.length) * 0.4;
            return {
                ...base,
                hp: Math.floor(base.hp * multiplier),
                maxHp: Math.floor(base.maxHp * multiplier),
                intent: { ...base.intent, val: Math.floor(base.intent.val * multiplier) },
                reward: Math.floor(base.reward * multiplier)
            };
        }

        // --- SUB-COMPONENTS ---
        const Card = ({ card, onClick, disabled }) => {
            const typeColor = card.type === 'attack' ? PICO8_PALETTE['8'] : card.type === 'skill' ? PICO8_PALETTE['C'] : PICO8_PALETTE['A'];
            
            return (
            <div 
                onClick={disabled ? null : onClick}
                className={`pixel-border rounded-none flex flex-col p-1 select-none relative
                    ${disabled ? 'opacity-50 grayscale cursor-not-allowed border-slate-700' : 'cursor-pointer pixel-button z-20'}
                    w-28 h-40 md:w-36 md:h-52 bg-[#111]`}
                style={{ borderColor: disabled ? undefined : typeColor }}
            >
                <div className="bg-[#000] px-1 md:px-2 py-1 md:py-2 border-b-[2px] border-white flex justify-between items-center shrink-0">
                    <span className="text-[6px] md:text-[8px] text-white font-bold truncate mr-1" style={{textShadow: `1px 1px 0 ${typeColor}`}}>{card.name}</span>
                    <div className="bg-white text-black pixel-border-sm w-4 h-4 md:w-6 md:h-6 flex items-center justify-center text-[8px] md:text-[10px] font-bold shrink-0">
                        {card.cost}
                    </div>
                </div>
                <div className={`h-16 md:h-24 w-full border-b-[2px] border-white flex items-center justify-center relative overflow-hidden shrink-0 holo-bg`} style={{ backgroundColor: typeColor }}>
                    <PixelArt art={SPRITES[card.artId]} scale={3} className="z-10 drop-shadow-[2px_2px_0_rgba(0,0,0,1)]" />
                </div>
                <div className="flex-grow flex flex-col items-center justify-center p-2 bg-[#222]">
                    <span className="text-[6px] md:text-[8px] leading-relaxed text-center font-bold text-white uppercase">{card.desc}</span>
                </div>
            </div>
        )};

        const DrawPile = ({ count }) => (
            <div className="relative w-16 h-24 md:w-24 md:h-32 bg-[#111] pixel-border flex flex-col items-center justify-center overflow-hidden">
               <div className="absolute inset-1 border-2 border-white border-dashed opacity-50"></div>
               {count > 0 && <PixelArt art={SPRITES.card_back} scale={1.5} className="mb-2 opacity-80" />}
               <span className="bg-black text-white text-[8px] md:text-[10px] px-2 py-1 pixel-border-sm z-10 font-bold w-[90%] text-center">DRAW<br/>{count}</span>
            </div>
        );
        
        const DiscardPile = ({ count, isDiscarding, onClick }) => (
            <div onClick={onClick} className={`relative w-16 h-24 md:w-24 md:h-32 bg-[#111] pixel-border flex flex-col items-center justify-center transition-all cursor-pointer overflow-hidden ${isDiscarding ? 'scale-105 border-[color:var(--pico-red)]' : ''}`}>
               <div className="absolute inset-1 border-2 border-white opacity-50 bg-black/20"></div>
               <span className={`text-[20px] md:text-[32px] opacity-30 text-white font-sans mb-2 ${isDiscarding ? 'text-[color:var(--pico-red)] opacity-100' : ''}`}>✖</span>
               <span className="bg-black text-[color:var(--pico-red)] text-[8px] md:text-[10px] px-2 py-1 pixel-border-sm z-10 font-bold w-[90%] text-center">DISCARD<br/>{count}</span>
            </div>
        );

        const FloatingTextContainer = ({ texts }) => (
            <div className="absolute top-0 left-1/2 -translate-x-1/2 -translate-y-1/2 pointer-events-none z-50">
                {texts.map(t => (
                    <div key={t.id} className="absolute text-[10px] md:text-[12px] font-black"
                            style={{ 
                                left: `${t.offsetX}px`,
                                color: t.color,
                                textShadow: '2px 2px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000',
                                animation: 'floatUp 1s ease-out forwards'
                            }}>
                        {t.text}
                    </div>
                ))}
            </div>
        );

        const Header = ({ title, tokens, onBack }) => (
            <div className="flex justify-between items-center px-4 md:px-8 py-3 md:py-4 bg-black border-b-[4px] border-[color:var(--pico-darkGrey)] shrink-0 z-10 w-full pixel-border">
                <button onClick={() => { playSound('click'); onBack(); }} className="text-white hover:text-white bg-[color:var(--pico-darkGrey)] pixel-button pixel-border-sm px-4 py-2 text-[8px] md:text-[10px] flex items-center gap-2">
                    <span>❮</span> <span className="hidden sm:inline">RETURN</span>
                </button>
                <span className="text-white text-[12px] md:text-[16px] font-bold tracking-widest drop-shadow-[2px_2px_0_var(--pico-red)]">{title}</span>
                <span className="text-[color:var(--pico-yellow)] bg-[#111] pixel-border-sm px-4 py-2 flex items-center gap-2 text-[8px] md:text-[12px] font-bold">
                    <PixelArt art={SPRITES.coin} scale={1} />
                    {tokens}
                </span>
            </div>
        );

        // --- VIEWS ---

        const RunView = ({ loadout, onEndRun, hasSeenTutorial, completeTutorial }) => {
            const [gameState, setGameState] = useState('combat'); 
            const [floor, setFloor] = useState(1);
            const [turnPhase, setTurnPhase] = useState('player'); // player -> discard -> enemy -> player
            const [turnNumber, setTurnNumber] = useState(1);
            
            const [tutorialStep, setTutorialStep] = useState(hasSeenTutorial ? -1 : 0);
            
            const [isProcessing, setIsProcessing] = useState(false);
            const isTurnEnding = useRef(false);
            
            const [autoPlay, setAutoPlay] = useState(false);
            const [gameSpeed, setGameSpeed] = useState(1);
            const speedRef = useRef(1);
            useEffect(() => { speedRef.current = gameSpeed; }, [gameSpeed]);
            const delay = (ms) => new Promise(resolve => setTimeout(resolve, ms / speedRef.current));

            const [party, setParty] = useState(() => 
                loadout.chars.map((charId) => ({
                    ...ALL_CHARS[charId],
                    currentHp: ALL_CHARS[charId].maxHp,
                    isDead: false
                }))
            );
            const [partyBlock, setPartyBlock] = useState(0);
            const [partyEnergy, setPartyEnergy] = useState(0);
            const [runScrap, setRunScrap] = useState(0);

            const [deckState, setDeckState] = useState({ fullDeck: [], draw: [], hand: [], discard: [] });
            const [discardMode, setDiscardMode] = useState(false);
            
            const [enemy, setEnemy] = useState({...ENEMIES[0]});
            const [enemyAnim, setEnemyAnim] = useState('');
            const [screenShake, setScreenShake] = useState(false);
            const [particles, setParticles] = useState([]);

            const [clawGrid, setClawGrid] = useState([]);
            const [clawPos, setClawPos] = useState({x: 2, y: 2}); 
            const [isClawing, setIsClawing] = useState(false);
            const CLAW_COST = 10;

            const [partyFloating, setPartyFloating] = useState([]);
            const [enemyFloating, setEnemyFloating] = useState([]);
            const [systemFloating, setSystemFloating] = useState([]);
            const [floorTitle, setFloorTitle] = useState('');

            // On initial load, safely build the deck and start combat
            useEffect(() => {
                const safeDeck = (loadout && loadout.deck && loadout.deck.length > 0) ? loadout.deck : ['STRIKE', 'BLOCK', 'STRIKE', 'BLOCK'];
                const initialFullDeck = [];
                for (let i = 0; i < 40; i++) {
                    const cardId = safeDeck[i % safeDeck.length];
                    if (ALL_CARDS[cardId]) {
                        initialFullDeck.push({ ...ALL_CARDS[cardId], _uid: `init_${i}_${Date.now()}` });
                    }
                }
                
                // Immediately start the first floor
                setEnemy({...getEnemyForFloor(1)});
                setPartyBlock(0);
                setPartyEnergy(calculateMaxEnergy(party));
                
                const shuffledDeck = stableShuffle(initialFullDeck);
                const { draw, hand, discard } = drawCardsFromDeck(3, { fullDeck: initialFullDeck, draw: shuffledDeck, hand: [], discard: [] });
                
                setDeckState({ fullDeck: initialFullDeck, draw, hand, discard });
                setGameState('combat');
                setTurnPhase('player');
                setTurnNumber(1);
                
                setFloorTitle(`FLOOR 1`);
                setTimeout(() => setFloorTitle(''), 2000 / speedRef.current);
                // eslint-disable-next-line react-hooks/exhaustive-deps
            }, []);

            // AUTO PLAY LOGIC
            useEffect(() => {
                if (autoPlay && turnPhase === 'player' && !isProcessing && !isTurnEnding.current && tutorialStep === -1) {
                    const timer = setTimeout(() => {
                        const playableCards = deckState.hand.map((c, i) => ({card: c, idx: i})).filter(c => c.card.cost <= partyEnergy);
                        if (playableCards.length > 0) {
                            // Smart AI logic: Priority blocking if enemy attacks, else attack
                            playableCards.sort((a, b) => {
                                if (a.card.type === 'skill' && enemy.intent.val > partyBlock) return -1;
                                if (b.card.type === 'skill' && enemy.intent.val > partyBlock) return 1;
                                if (a.card.val > b.card.val) return -1;
                                return 1;
                            });
                            handleCardClick(playableCards[0].card, playableCards[0].idx);
                        } else if (partyEnergy >= 1 && deckState.hand.length < 6 && (deckState.draw.length > 0 || deckState.discard.length > 0)) {
                            manualDraw();
                        } else {
                            endTurn();
                        }
                    }, 400 / speedRef.current);
                    return () => clearTimeout(timer);
                }
            }, [autoPlay, turnPhase, partyEnergy, deckState.hand.length, deckState.draw.length, deckState.discard.length, tutorialStep, partyBlock, enemy.intent.val, isProcessing]);

            // AUTO END TURN (If 0 Energy)
            useEffect(() => {
                if (turnPhase === 'player' && partyEnergy === 0 && !isTurnEnding.current && !isProcessing && tutorialStep === -1 && !autoPlay) {
                    const t = setTimeout(() => {
                        endTurn();
                    }, 1000 / speedRef.current);
                    return () => clearTimeout(t);
                }
            }, [turnPhase, partyEnergy, tutorialStep, autoPlay, isProcessing]);

            // OVER MAXIMUM HAND SIZE LISTENER (LIMIT is 6!)
            useEffect(() => {
                if (turnPhase === 'player' && deckState.hand.length > 6) {
                    setTurnPhase('discard');
                } else if (turnPhase === 'discard' && deckState.hand.length <= 6) {
                    setTurnPhase('player');
                    // Check if energy is 0 after returning to player phase
                    if (partyEnergy === 0) {
                        endTurn();
                    }
                }
            }, [deckState.hand.length, turnPhase, partyEnergy]);

            // AUTOPLAY DISCARD (Discards cheapest cards to get below limit)
            useEffect(() => {
                if (autoPlay && turnPhase === 'discard' && !isProcessing) {
                    const timer = setTimeout(() => {
                        if (deckState.hand.length > 6) {
                            handleCardClick(deckState.hand[0], 0);
                        }
                    }, 300 / speedRef.current);
                    return () => clearTimeout(timer);
                }
            }, [autoPlay, turnPhase, deckState.hand.length, isProcessing]);

            const triggerShake = () => {
                setScreenShake(true);
                setTimeout(() => setScreenShake(false), 200 / speedRef.current);
            };

            const spawnParticles = (target, color, count) => {
                const newParticles = Array.from({ length: count }).map(() => ({
                    id: Math.random(),
                    target,
                    color,
                    dx: (Math.random() - 0.5) * 100 + 'px',
                    dy: (Math.random() - 0.5) * 100 - 50 + 'px',
                    size: Math.random() * 6 + 4 + 'px'
                }));
                setParticles(prev => [...prev, ...newParticles]);
                setTimeout(() => {
                    setParticles(prev => prev.filter(p => !newParticles.find(n => n.id === p.id)));
                }, 600 / speedRef.current);
            };

            const addFloatingText = (setter, text, color) => {
                const id = Date.now() + Math.random();
                const offsetX = (Math.random() - 0.5) * 40;
                setter(prev => [...prev, { id, text, color, offsetX }]);
                setTimeout(() => setter(prev => prev.filter(t => t.id !== id)), 1000 / speedRef.current);
            };

            function calculateMaxEnergy(currentParty) {
                return currentParty.filter(c => !c.isDead).reduce((sum, c) => sum + c.energy, 0);
            }

            function drawCardsFromDeck(amount, currentState) {
                let draw = [...currentState.draw];
                let hand = [...currentState.hand];
                let discard = [...currentState.discard];

                for (let i = 0; i < amount; i++) {
                    if (hand.length >= 6) break; // Limit of 6
                    
                    if (draw.length === 0) {
                        if (discard.length === 0) break; 
                        draw = stableShuffle(discard);
                        discard = [];
                    }
                    const card = draw.pop();
                    if (card) hand.push(card);
                }
                return { ...currentState, draw, hand, discard };
            }

            const manualDraw = () => {
                playSound('click');
                if (turnPhase !== 'player' || partyEnergy < 1 || isProcessing) return;
                if (deckState.draw.length === 0 && deckState.discard.length === 0) { playSound('error'); return; }
                
                setIsProcessing(true);
                playSound('draw');
                setPartyEnergy(e => e - 1);
                setDeckState(prev => drawCardsFromDeck(1, prev));
                setTimeout(() => { setIsProcessing(false); }, 100 / speedRef.current);
            };

            const handleCardClick = (cardToPlay, index) => {
                if (discardMode || turnPhase === 'discard') {
                    playSound('draw'); 
                    setIsProcessing(true);
                    setDeckState(prev => {
                        const newHand = [...prev.hand];
                        newHand.splice(index, 1);
                        return { ...prev, hand: newHand, discard: [...prev.discard, cardToPlay] };
                    });
                    setTimeout(() => { setIsProcessing(false); }, 100 / speedRef.current);
                    return;
                }

                if (turnPhase !== 'player' || enemy.hp <= 0 || isProcessing) return;
                if (!cardToPlay || partyEnergy < cardToPlay.cost) { playSound('error'); return; }

                setIsProcessing(true);
                if (tutorialStep === 1) setTutorialStep(2);
                
                setPartyEnergy(e => e - cardToPlay.cost);
                
                setDeckState(prev => {
                    const newHand = [...prev.hand];
                    newHand.splice(index, 1);
                    return {
                        ...prev,
                        hand: newHand,
                        discard: [...prev.discard, cardToPlay]
                    };
                });

                if (cardToPlay.type === 'attack') {
                    playSound('hit');
                    setEnemyAnim('anim-damage');
                    triggerShake();
                    spawnParticles('enemy', PICO8_PALETTE['8'], 15);
                    setTimeout(() => setEnemyAnim(''), 300 / speedRef.current);
                    
                    addFloatingText(setEnemyFloating, `-${cardToPlay.val}`, PICO8_PALETTE['8']);
                    
                    if (cardToPlay.id === 'VAMPIRISM') {
                        playSound('heal');
                        spawnParticles('party', PICO8_PALETTE['B'], 10);
                        addFloatingText(setPartyFloating, `+5 HP`, PICO8_PALETTE['B']);
                        setParty(prevParty => {
                            const newParty = [...prevParty];
                            let lowest = null;
                            let lowestIdx = -1;
                            newParty.forEach((c, i) => {
                                if (!c.isDead && (lowest === null || c.currentHp < lowest.currentHp)) {
                                    lowest = c; lowestIdx = i;
                                }
                            });
                            if (lowestIdx !== -1) {
                                newParty[lowestIdx].currentHp = Math.min(newParty[lowestIdx].maxHp, newParty[lowestIdx].currentHp + 5);
                            }
                            return newParty;
                        });
                    }
                    
                    setEnemy(e => ({...e, hp: Math.max(0, e.hp - cardToPlay.val)}));
                } else if (cardToPlay.type === 'skill') {
                    if (cardToPlay.id === 'REPAIR' || cardToPlay.id === 'AURA' || cardToPlay.id === 'REGENERATE' || cardToPlay.id === 'BLESSED_STRIKE') {
                        playSound('heal');
                        spawnParticles('party', PICO8_PALETTE['B'], 15);
                        let healVal = cardToPlay.val;
                        if(cardToPlay.id === 'BLESSED_STRIKE') healVal = 3;
                        addFloatingText(setPartyFloating, `+${healVal} HP`, PICO8_PALETTE['B']);
                        setParty(prevParty => {
                            const newParty = [...prevParty];
                            let lowest = null;
                            let lowestIdx = -1;
                            newParty.forEach((c, i) => {
                                if (!c.isDead && (lowest === null || c.currentHp < lowest.currentHp)) {
                                    lowest = c; lowestIdx = i;
                                }
                            });
                            if (lowestIdx !== -1) {
                                newParty[lowestIdx].currentHp = Math.min(newParty[lowestIdx].maxHp, newParty[lowestIdx].currentHp + healVal);
                            }
                            return newParty;
                        });
                        
                        if(cardToPlay.id === 'BLESSED_STRIKE') {
                            setEnemyAnim('anim-damage');
                            triggerShake();
                            spawnParticles('enemy', PICO8_PALETTE['8'], 15);
                            addFloatingText(setEnemyFloating, `-${cardToPlay.val}`, PICO8_PALETTE['8']);
                            setEnemy(e => ({...e, hp: Math.max(0, e.hp - cardToPlay.val)}));
                        }
                        
                    } else if (cardToPlay.id === 'FOCUS') {
                        playSound('draw');
                        spawnParticles('party', PICO8_PALETTE['D'], 10);
                        setDeckState(prev => drawCardsFromDeck(2, prev));
                    } else {
                        playSound('block');
                        spawnParticles('party', PICO8_PALETTE['C'], 15);
                        addFloatingText(setPartyFloating, `+${cardToPlay.val} BLK`, PICO8_PALETTE['C']);
                        setPartyBlock(b => b + cardToPlay.val);
                    }
                } else if (cardToPlay.id === 'GREED') {
                    playSound('heal');
                    spawnParticles('party', PICO8_PALETTE['A'], 10);
                    addFloatingText(setPartyFloating, `+5 GOLD`, PICO8_PALETTE['A']);
                    setRunScrap(s => s + 5);
                } else if (cardToPlay.id === 'WARCRY') {
                    playSound('heal');
                    spawnParticles('party', PICO8_PALETTE['9'], 15);
                    addFloatingText(setPartyFloating, `+2 NRG`, PICO8_PALETTE['9']);
                    setPartyEnergy(e => e + cardToPlay.val);
                }

                if (cardToPlay.id === 'POISON' || cardToPlay.id === 'SNIPE') {
                    const drawCount = cardToPlay.id === 'POISON' ? 2 : 1;
                    setDeckState(prev => drawCardsFromDeck(drawCount, prev));
                }
                
                setTimeout(() => { setIsProcessing(false); }, 300 / speedRef.current);
            };

            useEffect(() => {
                if (gameState === 'combat' && enemy.hp <= 0) {
                    addFloatingText(setEnemyFloating, `+${enemy.reward} GOLD`, PICO8_PALETTE['A']);
                    setRunScrap(s => s + enemy.reward);
                    setTimeout(initClawMachine, 1000 / speedRef.current);
                }
            }, [enemy.hp, gameState]);

            const endTurn = async () => {
                if ((turnPhase !== 'player' && turnPhase !== 'discard') || enemy.hp <= 0 || isTurnEnding.current) return;
                playSound('endTurn');
                
                isTurnEnding.current = true;
                setTurnPhase('enemy');
                setDiscardMode(false);
                if (tutorialStep === 2) setTutorialStep(-1);

                await delay(600);

                let dmg = enemy.intent.val;
                
                setEnemyAnim('anim-lunge');
                playSound('enemyHit');
                await delay(150);

                triggerShake();
                spawnParticles('party', PICO8_PALETTE['8'], 20);
                
                let unblockedDmg = dmg;
                let currentBlock = partyBlock;

                if (currentBlock >= dmg) {
                    currentBlock -= dmg;
                    unblockedDmg = 0;
                    addFloatingText(setPartyFloating, `BLOCKED`, PICO8_PALETTE['C']);
                } else {
                    unblockedDmg = dmg - currentBlock;
                    if (currentBlock > 0) addFloatingText(setPartyFloating, `BLOCKED ${currentBlock}`, PICO8_PALETTE['C']);
                    setTimeout(() => addFloatingText(setPartyFloating, `-${unblockedDmg}`, PICO8_PALETTE['8']), 100 / speedRef.current);
                    currentBlock = 0;
                }
                setPartyBlock(currentBlock);

                let isGameOver = false;
                let nextParty = [...party];

                if (unblockedDmg > 0) {
                    nextParty = nextParty.map(c => ({...c}));
                    let remainingDmg = unblockedDmg;
                    for (let i = 0; i < nextParty.length; i++) {
                        if (remainingDmg <= 0) break;
                        if (!nextParty[i].isDead) {
                            if (nextParty[i].currentHp <= remainingDmg) {
                                remainingDmg -= nextParty[i].currentHp;
                                nextParty[i].currentHp = 0;
                                nextParty[i].isDead = true;
                            } else {
                                nextParty[i].currentHp -= remainingDmg;
                                remainingDmg = 0;
                            }
                        }
                    }
                    setParty(nextParty);
                    if (nextParty.every(c => c.isDead)) isGameOver = true;
                }

                await delay(300);
                setEnemyAnim(''); 

                if (isGameOver) {
                    setTimeout(() => setGameState('gameover'), 500 / speedRef.current);
                    isTurnEnding.current = false;
                    return;
                }

                await delay(600);

                if (gameState === 'combat') {
                    setEnemy(e => ({
                        ...e, 
                        intent: { type: 'attack', val: Math.max(1, e.intent.val + Math.floor(Math.random() * 5) - 2) }
                    }));
                    
                    setTurnNumber(prev => prev + 1);
                    setPartyBlock(0);
                    
                    setPartyEnergy(calculateMaxEnergy(nextParty));
                    
                    // Draw exactly 1 card at the start of the turn
                    setDeckState(prev => drawCardsFromDeck(1, prev));
                    
                    setTurnPhase('player');
                }
                
                isTurnEnding.current = false;
            };

            const startCombat = (enemyData) => {
                setEnemy({...enemyData});
                setPartyBlock(0);
                setPartyEnergy(calculateMaxEnergy(party));
                
                setDeckState(prev => {
                    const allCards = [...prev.draw, ...prev.hand, ...prev.discard];
                    const deckToShuffle = allCards.length > 0 ? allCards : [...prev.fullDeck];
                    const shuffledDeck = stableShuffle(deckToShuffle);
                    return drawCardsFromDeck(3, { ...prev, draw: shuffledDeck, hand: [], discard: [] });
                });
                
                setGameState('combat');
                setTurnPhase('player');
                setTurnNumber(1);
                
                setFloorTitle(`FLOOR ${floor}`);
                setTimeout(() => setFloorTitle(''), 2000 / speedRef.current);
            };

            const initClawMachine = () => {
                if (tutorialStep !== -1) {
                    setTutorialStep(3);
                    completeTutorial();
                }

                const grid = Array(25).fill(null);
                const lootOptions = [ALL_CARDS.HEAVY_STRIKE, ALL_CARDS.DEFLECT, ALL_CARDS.GREED, 'HP_POTION'];
                
                const numItems = 6 + Math.floor(Math.random() * 3);
                for(let i=0; i<numItems; i++) {
                    let idx;
                    do { idx = Math.floor(Math.random() * 25); } while(grid[idx] !== null);
                    grid[idx] = lootOptions[Math.floor(Math.random() * lootOptions.length)];
                }
                
                setClawGrid(grid);
                setClawPos({x: 2, y: 2});
                setGameState('claw');
            };

            const moveClaw = (dx, dy) => {
                if (isClawing) return;
                playSound('click');
                setClawPos(prev => ({
                    x: Math.max(0, Math.min(4, prev.x + dx)),
                    y: Math.max(0, Math.min(4, prev.y + dy))
                }));
            };

            const dropClaw = () => {
                if (isClawing || runScrap < CLAW_COST) return;
                playSound('click');
                setRunScrap(s => s - CLAW_COST);
                setIsClawing(true);
                if (tutorialStep === 3) setTutorialStep(-1);

                setTimeout(() => {
                    const idx = clawPos.y * 5 + clawPos.x;
                    const item = clawGrid[idx];
                    
                    if (item) {
                        playSound('heal');
                        if (item === 'HP_POTION') {
                            setParty(prevParty => {
                                const newParty = [...prevParty];
                                newParty.forEach(c => {
                                    if (!c.isDead) c.currentHp = Math.min(c.maxHp, c.currentHp + 15);
                                });
                                return newParty;
                            });
                            addFloatingText(setSystemFloating, `PARTY +15 HP`, PICO8_PALETTE['B']);
                        } else {
                            setDeckState(prev => ({
                                ...prev,
                                fullDeck: [...prev.fullDeck, { ...item, _uid: `loot_${Date.now()}` }],
                                discard: [...prev.discard, { ...item, _uid: `loot_${Date.now()}` }]
                            }));
                            addFloatingText(setSystemFloating, `GOT CARD`, PICO8_PALETTE['A']);
                        }
                        const newGrid = [...clawGrid];
                        newGrid[idx] = null;
                        setClawGrid(newGrid);
                    } else {
                        playSound('error');
                        addFloatingText(setSystemFloating, `MISS`, PICO8_PALETTE['6']);
                    }
                    setIsClawing(false);
                }, 500 / speedRef.current);
            };

            const leaveClaw = () => {
                playSound('click');
                const nextFloor = floor + 1;
                setFloor(nextFloor);
                startCombat(getEnemyForFloor(nextFloor));
            };

            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (gameState !== 'claw') return;
                    switch(e.key.toLowerCase()) {
                        case 'w': case 'arrowup': moveClaw(0, -1); break;
                        case 's': case 'arrowdown': moveClaw(0, 1); break;
                        case 'a': case 'arrowleft': moveClaw(-1, 0); break;
                        case 'd': case 'arrowright': moveClaw(1, 0); break;
                        case 'enter': case ' ': dropClaw(); break;
                    }
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [gameState, clawPos, isClawing, runScrap]);

            const TILE_SIZE = 64;
            const renderGrid = () => {
                const tiles = [];
                for (let y = 0; y < 5; y++) {
                    for (let x = 0; x < 5; x++) {
                        const isTarget = gameState === 'claw' && clawPos.x === x && clawPos.y === y;
                        const isLight = (x+y)%2 === 0;
                        tiles.push(
                            <div key={`${x}-${y}`} className="absolute flex items-center justify-center"
                                style={{
                                    width: TILE_SIZE, height: TILE_SIZE,
                                    left: x * TILE_SIZE, top: y * TILE_SIZE,
                                    backgroundColor: isLight ? PICO8_PALETTE['1'] : '#141013',
                                    border: `1px solid ${PICO8_PALETTE['0']}`,
                                    boxShadow: isTarget ? `inset 0 0 0 4px ${PICO8_PALETTE['A']}` : `inset 0 0 0 1px ${PICO8_PALETTE['5']}`,
                                    transition: `all ${0.1 / speedRef.current}s`
                                }}
                            >
                                <div className="w-[4px] h-[4px] bg-black opacity-30" />
                            </div>
                        );
                    }
                }
                return tiles;
            };

            const handleExit = () => {
                playSound('click');
                const earnedTokens = Math.floor(floor * 5 + runScrap);
                onEndRun(earnedTokens);
            };

            const partyPositions = [
                { left: 64, top: 192, z: 40 }, 
                { left: 0, top: 128, z: 30 },  
                { left: 128, top: 128, z: 30 } 
            ];

            const renderClawControls = () => (
                <div className="w-full flex flex-col md:flex-row justify-center items-center gap-6 h-full p-4">
                    <div className="bg-black p-4 flex flex-col items-center pixel-border shadow-[4px_4px_0_#000]">
                        <h2 className="text-[color:var(--pico-yellow)] mb-3 text-[10px] md:text-[12px] font-bold tracking-widest text-center">D-PAD PROTOCOL</h2>
                        <div className="grid grid-cols-3 gap-2 w-28 md:w-36 mx-auto">
                            <div></div>
                            <button onClick={() => moveClaw(0,-1)} className="pixel-button bg-[color:var(--pico-darkGrey)] w-full aspect-square flex items-center justify-center text-[10px] md:text-[14px] text-white pixel-border-sm">W</button>
                            <div></div>
                            <button onClick={() => moveClaw(-1,0)} className="pixel-button bg-[color:var(--pico-darkGrey)] w-full aspect-square flex items-center justify-center text-[10px] md:text-[14px] text-white pixel-border-sm">A</button>
                            <button onClick={() => moveClaw(0,1)} className="pixel-button bg-[color:var(--pico-darkGrey)] w-full aspect-square flex items-center justify-center text-[10px] md:text-[14px] text-white pixel-border-sm">S</button>
                            <button onClick={() => moveClaw(1,0)} className="pixel-button bg-[color:var(--pico-darkGrey)] w-full aspect-square flex items-center justify-center text-[10px] md:text-[14px] text-white pixel-border-sm">D</button>
                        </div>
                    </div>
                    
                    <div className="flex flex-col gap-3 md:gap-4 h-full justify-center w-full md:w-auto min-w-[220px]">
                        <button onClick={dropClaw} disabled={isClawing || runScrap < CLAW_COST} className={`w-full py-4 md:py-5 pixel-button pixel-border bg-[color:var(--pico-red)] text-[10px] md:text-[14px] flex flex-col items-center justify-center gap-1 ${isClawing || runScrap < CLAW_COST ? 'opacity-50' : 'hover:bg-[color:var(--pico-orange)]'} text-white shadow-[4px_4px_0_#000]`}>
                            <span className="font-bold tracking-widest">DROP CLAW</span>
                            <span className="text-[8px] md:text-[10px] bg-black px-2 py-1 pixel-border-sm text-[color:var(--pico-yellow)]">COST: {CLAW_COST} GOLD</span>
                        </button>
                        <button onClick={leaveClaw} className="pixel-button bg-black pixel-border py-3 md:py-4 text-[color:var(--pico-yellow)] font-bold text-[10px] md:text-[12px] tracking-wider hover:bg-[color:var(--pico-darkGrey)] hover:text-white shadow-[4px_4px_0_#000]">NEXT FLOOR ➔</button>
                    </div>
                </div>
            );

            return (
                <div className="h-full w-full flex flex-col relative bg-[color:var(--pico-darkBlue)]" style={{ '--speed-mult': gameSpeed }}>
                    
                    {/* TUTORIAL OVERLAYS */}
                    {tutorialStep === 0 && (
                        <div className="absolute inset-0 z-[100] bg-black/80 flex flex-col items-center justify-center p-6 md:p-8 text-center backdrop-blur-md">
                            <h2 className="text-[color:var(--pico-yellow)] text-[16px] md:text-[24px] mb-8 drop-shadow-[2px_2px_0_#000]">TUTORIAL: COMBAT</h2>
                            <p className="text-white text-[10px] md:text-[12px] leading-loose mb-12 max-w-xl bg-black p-6 pixel-border">
                                Welcome! Your heroes are on the left. Each living hero grants you <span className="text-[color:var(--pico-green)] font-bold">1 NRG (Energy)</span> to spend per turn.<br/><br/>
                                If your heroes take damage, they will fall one by one. Keep them alive!
                            </p>
                            <button onClick={() => { playSound('click'); setTutorialStep(1); }} className="pixel-button bg-[color:var(--pico-blue)] pixel-border px-8 py-4 text-[12px] md:text-[16px] font-bold text-white hover:bg-white hover:text-black">NEXT ➔</button>
                        </div>
                    )}
                    {tutorialStep === 1 && (
                        <div className="absolute inset-0 z-[100] bg-black/60 flex flex-col items-center justify-end pb-[250px] md:pb-[350px] p-6 md:p-8 text-center pointer-events-none backdrop-blur-sm">
                            <div className="bg-black pixel-border p-6 md:p-8 pointer-events-auto max-w-lg shadow-[8px_8px_0_#000]">
                                <h2 className="text-[color:var(--pico-yellow)] text-[12px] md:text-[16px] mb-4">PLAY CARDS</h2>
                                <p className="text-white text-[8px] md:text-[10px] leading-loose mb-6">
                                    Click a card in your hand to play it. All cards cost 1 NRG.<br/>Once you are out of NRG, the turn will automatically end. Your hand limit is 6.
                                </p>
                                <button onClick={() => { playSound('click'); setTutorialStep(-1); }} className="pixel-button bg-[color:var(--pico-green)] text-white pixel-border px-8 py-3 text-[10px] md:text-[12px] font-bold w-full hover:bg-white hover:text-black">GOT IT</button>
                            </div>
                        </div>
                    )}
                    {tutorialStep === 3 && gameState === 'claw' && (
                        <div className="absolute inset-0 z-[100] bg-black/60 flex flex-col items-center justify-center pb-[250px] p-6 md:p-8 text-center pointer-events-none backdrop-blur-sm">
                            <div className="bg-black p-6 md:p-8 pixel-border pointer-events-auto max-w-lg shadow-[8px_8px_0_#000]">
                                <h2 className="text-[color:var(--pico-yellow)] text-[16px] md:text-[24px] mb-4">CLAW MACHINE</h2>
                                <p className="text-white text-[10px] md:text-[12px] leading-loose mb-8">
                                    Spend Gold you earned to fish for new cards and healing potions!<br/>Use the D-PAD below to drop the claw.
                                </p>
                                <button onClick={() => { playSound('click'); setTutorialStep(-1); }} className="pixel-button bg-[color:var(--pico-green)] text-white pixel-border px-8 py-4 text-[12px] md:text-[16px] font-bold w-full hover:bg-white hover:text-black">START GRABBING</button>
                            </div>
                        </div>
                    )}

                    {/* TOP BAR */}
                    <div className="flex flex-col sm:flex-row justify-between items-center px-4 md:px-8 py-3 bg-black border-b-[4px] border-[color:var(--pico-darkGrey)] z-10 shrink-0">
                        <div className="flex gap-3 md:gap-4 items-center justify-center w-full sm:w-auto overflow-x-auto pb-2 sm:pb-0">
                            {party.map((char, idx) => (
                                <div key={idx} className={`flex items-center gap-2 bg-[#111] px-2 py-2 pixel-border-sm shrink-0 ${char.isDead ? 'opacity-30 grayscale' : ''}`}>
                                    <div className="w-8 h-8 md:w-10 md:h-10 flex items-center justify-center bg-[#222]">
                                        <PixelArt art={SPRITES[char.spriteId]} scale={1.5} />
                                    </div>
                                    <div className="flex flex-col w-16 md:w-20">
                                        <div className="w-full bg-black h-2 md:h-3 pixel-border-sm overflow-hidden p-[1px]">
                                            <div className="h-full bg-[color:var(--pico-red)] transition-all duration-300" style={{width: `${(char.currentHp/char.maxHp)*100}%`}}></div>
                                        </div>
                                        <span className="text-white font-bold text-[6px] md:text-[8px] mt-1 text-center">{char.currentHp} / {char.maxHp} HP</span>
                                    </div>
                                </div>
                            ))}
                        </div>
                        
                        <div className="flex gap-4 md:gap-8 items-center shrink-0 w-full sm:w-auto justify-center bg-[#111] px-4 py-2 pixel-border-sm">
                            {partyBlock > 0 && <span className="text-[color:var(--pico-blue)] flex items-center gap-2 font-bold text-[10px] md:text-[12px]">
                                <PixelArt art={SPRITES.shield} scale={1.2} /> 
                                {partyBlock}
                            </span>}
                            <span className="text-[color:var(--pico-yellow)] flex items-center gap-2 font-bold text-[10px] md:text-[12px]">
                                <PixelArt art={SPRITES.coin} scale={1.2} /> 
                                {runScrap}
                            </span>
                            {gameState === 'combat' && <span className="text-[color:var(--pico-green)] font-bold text-[10px] md:text-[12px]">
                                NRG {partyEnergy}/{calculateMaxEnergy(party)}
                            </span>}
                            {gameState === 'combat' && (
                                <span className={`font-bold text-[10px] md:text-[12px] tracking-wider ${turnPhase === 'player' || turnPhase === 'discard' ? 'text-white' : 'text-[color:var(--pico-red)]'}`}>
                                    TURN {turnNumber}
                                </span>
                            )}
                        </div>
                    </div>

                    <div className={`flex-grow flex items-center justify-center overflow-hidden relative ${screenShake ? 'shake' : ''}`}>
                        
                        {/* SPEED AND AUTO BUTTONS */}
                        {gameState === 'combat' && (
                            <div className="absolute top-6 right-6 z-50 flex flex-col gap-3">
                                <button onClick={() => { playSound('click'); setAutoPlay(!autoPlay); }} className={`pixel-button px-4 py-2 text-[8px] md:text-[10px] font-bold tracking-wider pixel-border-sm ${autoPlay ? 'bg-[color:var(--pico-green)] text-black' : 'bg-[#111] text-white hover:bg-[color:var(--pico-darkGrey)]'}`}>
                                    AUTO {autoPlay ? 'ON' : 'OFF'}
                                </button>
                                <button onClick={() => { playSound('click'); setGameSpeed(s => s === 1 ? 2 : 1); }} className="pixel-button px-4 py-2 text-[8px] md:text-[10px] font-bold tracking-wider bg-[#111] text-white hover:bg-[color:var(--pico-darkGrey)] pixel-border-sm">
                                    {gameSpeed === 1 ? '1X SPEED' : '2X SPEED'}
                                </button>
                            </div>
                        )}

                        {gameState === 'gameover' && (
                            <div className="absolute inset-0 z-50 bg-black/90 flex flex-col items-center justify-center backdrop-blur-sm">
                                <div className="bg-[#111] pixel-border p-8 md:p-12 text-center flex flex-col items-center shadow-[12px_12px_0_#000]">
                                    <h1 className="text-[20px] md:text-[32px] text-[color:var(--pico-red)] mb-6 font-black leading-loose">SYSTEM<br/>FAILURE</h1>
                                    <p className="text-[color:var(--pico-yellow)] text-[10px] md:text-[14px] mb-8 font-bold">Total Loot Secured: {Math.floor(floor * 5 + runScrap)} Gold</p>
                                    <button onClick={handleExit} className="pixel-button bg-[color:var(--pico-blue)] pixel-border px-8 py-4 text-[10px] md:text-[14px] font-bold w-full max-w-xs text-white hover:bg-white hover:text-black">RETURN TO CAMP</button>
                                </div>
                            </div>
                        )}

                        {floorTitle && (
                            <div className="absolute top-1/4 left-1/2 -translate-x-1/2 z-50 text-[16px] md:text-[24px] text-[color:var(--pico-yellow)] font-bold pointer-events-none drop-shadow-[4px_4px_0_#000]"
                                 style={{ animation: `floatUp ${2/gameSpeed}s ease-in forwards` }}>
                                {floorTitle}
                            </div>
                        )}

                        {gameState === 'combat' && turnPhase === 'enemy' && !floorTitle && (
                            <div className="absolute top-10 left-1/2 -translate-x-1/2 z-50 text-[12px] md:text-[16px] text-[color:var(--pico-red)] font-bold pointer-events-none bg-black px-6 py-3 pixel-border shadow-[4px_4px_0_#000]">
                                ENEMY TURN
                            </div>
                        )}
                        
                        {gameState === 'combat' && turnPhase === 'discard' && !floorTitle && (
                            <div className="absolute top-10 left-1/2 -translate-x-1/2 z-50 text-[10px] md:text-[14px] font-bold tracking-widest text-white pointer-events-none bg-[color:var(--pico-red)] px-6 py-3 pixel-border shadow-[4px_4px_0_#000] animate-pulse">
                                OVER LIMIT: DISCARD CARDS
                            </div>
                        )}

                        <div className="iso-container w-[320px] h-[320px] scale-[0.6] sm:scale-[0.8] md:scale-110">
                            <div className="iso-world w-full h-full relative">
                                {renderGrid()}
                                <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-50 iso-sprite pointer-events-none">
                                    <FloatingTextContainer texts={systemFloating} />
                                </div>

                                {gameState === 'combat' && (
                                    <div style={{ transformStyle: 'preserve-3d', position: 'absolute', inset: 0 }}>
                                        {/* Player Party */}
                                        <div className="absolute inset-0 pointer-events-none" style={{ transformStyle: 'preserve-3d' }}>
                                            {party.map((char, idx) => (
                                                !char.isDead && (
                                                    <div key={idx} className={`absolute w-16 h-16 flex items-center justify-center iso-sprite anim-hover delay-${idx}`} 
                                                         style={{ left: partyPositions[idx].left, top: partyPositions[idx].top, zIndex: partyPositions[idx].z }}>
                                                        <PixelArt art={SPRITES[char.spriteId]} scale={6} />
                                                    </div>
                                                )
                                            ))}
                                            <div className="absolute top-[130px] left-[70px] w-16 h-16 iso-sprite flex items-center justify-center z-50">
                                                <FloatingTextContainer texts={partyFloating} />
                                            </div>
                                            {/* Party Particles */}
                                            <div className="absolute inset-0 z-50 iso-sprite" style={{ transformStyle: 'preserve-3d' }}>
                                                {particles.filter(p => p.target === 'party').map(p => (
                                                    <div key={p.id} className="particle" style={{ color: p.color, width: p.size, height: p.size, '--dx': p.dx, '--dy': p.dy, left: '96px', top: '224px', backgroundColor: p.color }} />
                                                ))}
                                            </div>
                                        </div>

                                        {/* Enemy Sprite & UI Floating Above Head */}
                                        <div className={`absolute top-[64px] left-[192px] w-16 h-16 flex items-center justify-center iso-sprite ${turnPhase === 'player' || turnPhase === 'discard' ? 'anim-hover delay-1' : ''} ${enemyAnim} z-50`}>
                                            <PixelArt art={SPRITES[enemy.spriteId]} scale={6} />
                                            <FloatingTextContainer texts={enemyFloating} />
                                            {/* Enemy Particles */}
                                            {particles.filter(p => p.target === 'enemy').map(p => (
                                                <div key={p.id} className="particle" style={{ color: p.color, width: p.size, height: p.size, '--dx': p.dx, '--dy': p.dy, backgroundColor: p.color }} />
                                            ))}

                                            {/* Floating Enemy Status */}
                                            <div className="absolute -top-20 left-1/2 -translate-x-1/2 flex flex-col items-center gap-1.5 z-10 w-28 bg-black p-2 pixel-border shadow-[4px_4px_0_#000]">
                                                <div className="flex gap-2 items-center text-[8px] md:text-[10px] font-bold">
                                                    {enemy.intent.type === 'attack' ? 
                                                        <PixelArt art={SPRITES.sword} scale={1.5} /> : 
                                                        <PixelArt art={SPRITES.shield} scale={1.5} />}
                                                    <span className="text-[color:var(--pico-red)] drop-shadow-md">{enemy.intent.val} DMG</span>
                                                </div>
                                                <div className="w-full bg-[#111] p-[2px] relative h-3 flex items-center justify-center pixel-border-sm overflow-hidden">
                                                    <div className="absolute left-0 top-0 bottom-0 bg-[color:var(--pico-red)] transition-all duration-300" style={{width: `${(enemy.hp/enemy.maxHp)*100}%`}}></div>
                                                    <span className="relative z-10 text-[6px] md:text-[8px] text-white font-bold">{enemy.hp} / {enemy.maxHp} HP</span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {gameState === 'claw' && (
                                    <>
                                        {clawGrid.map((item, idx) => {
                                            if (!item) return null;
                                            const x = idx % 5;
                                            const y = Math.floor(idx / 5);
                                            const isPotion = item === 'HP_POTION';
                                            const artId = isPotion ? 'potion' : 'loot';
                                            return (
                                                <div key={`loot-${idx}`} className="absolute w-16 h-16 flex items-center justify-center iso-sprite drop-shadow-[-4px_4px_0_rgba(0,0,0,0.8)]" style={{ left: x * TILE_SIZE, top: y * TILE_SIZE, zIndex: x+y }}>
                                                    <PixelArt art={SPRITES[artId]} scale={4} className="anim-hover" />
                                                </div>
                                            );
                                        })}
                                        <div className="absolute bg-[color:var(--pico-blue)] pointer-events-none transition-all duration-200 opacity-30 border-[2px] border-white" style={{ width: TILE_SIZE, height: TILE_SIZE, left: clawPos.x * TILE_SIZE, top: clawPos.y * TILE_SIZE }}/>
                                        <div className={`absolute w-16 h-16 flex items-center justify-center pointer-events-none ${isClawing ? 'anim-claw-drop' : 'claw-high'}`} style={{ left: clawPos.x * TILE_SIZE, top: clawPos.y * TILE_SIZE, zIndex: 100 }}>
                                            <PixelArt art={SPRITES.claw} scale={6} className="drop-shadow-[-8px_8px_0_rgba(0,0,0,0.6)]" />
                                            <div className="absolute bottom-[90%] left-1/2 w-[4px] bg-[color:var(--pico-darkGrey)] border-l-[1px] border-white" style={{height: '500px', transform: 'translateX(-50%)'}}></div>
                                        </div>
                                    </>
                                )}
                            </div>
                        </div>
                    </div>

                    {/* BOTTOM CARD / CLAW BAR */}
                    <div className={`h-48 sm:h-56 md:h-72 bg-black border-t-[4px] border-[color:var(--pico-darkGrey)] flex relative p-3 md:p-6 shrink-0 justify-between items-center z-20 overflow-hidden w-full ${turnPhase === 'discard' || discardMode ? 'bg-[#220000] border-t-[color:var(--pico-red)]' : ''} transition-colors duration-500`}>
                        {gameState === 'combat' ? (
                            <>
                                {/* Left Actions */}
                                <div className="w-16 sm:w-20 md:w-32 flex-shrink-0 flex flex-col gap-3 md:gap-5 items-center justify-center z-10">
                                    <DrawPile count={deckState.draw.length} />
                                    <button 
                                        onClick={manualDraw}
                                        disabled={turnPhase !== 'player' || partyEnergy < 1 || deckState.hand.length >= 6 || (deckState.draw.length === 0 && deckState.discard.length === 0) || isProcessing || discardMode || autoPlay}
                                        className="pixel-button bg-[color:var(--pico-blue)] pixel-border w-full py-2 text-[6px] md:text-[8px] font-bold tracking-wider leading-tight text-white hover:bg-white hover:text-black"
                                    >
                                        DRAW<br/><span className="text-[6px]">(-1 NRG)</span>
                                    </button>
                                </div>

                                {/* Hand */}
                                <div className="flex-grow flex gap-3 md:gap-5 overflow-x-auto overflow-y-visible h-full items-center justify-start md:justify-center px-4 custom-scrollbar snap-x pt-8 pb-4" style={{ scrollBehavior: 'smooth' }}>
                                    {deckState.hand.map((card, i) => (
                                        <div className={`snap-center ${turnPhase === 'discard' || discardMode ? 'animate-pulse cursor-crosshair' : ''}`} key={`${card._uid}-${i}`}>
                                            <Card card={card} disabled={(partyEnergy < card.cost && turnPhase !== 'discard' && !discardMode) || (turnPhase !== 'player' && turnPhase !== 'discard') || isProcessing || autoPlay} onClick={() => handleCardClick(card, i)} />
                                        </div>
                                    ))}
                                    {deckState.hand.length === 0 && (turnPhase === 'player' || turnPhase === 'discard') && <div className="text-white font-bold text-[10px] md:text-[12px] tracking-widest bg-[#111] px-6 py-4 pixel-border whitespace-nowrap shadow-[4px_4px_0_#000]">HAND EMPTY</div>}
                                    {turnPhase === 'enemy' && <div className="text-[color:var(--pico-red)] font-bold text-[10px] md:text-[12px] tracking-widest bg-black px-6 py-4 pixel-border whitespace-nowrap shadow-[4px_4px_0_#000] flex items-center gap-3"><PixelArt art={SPRITES.sword} scale={2} /> ENEMY ATTACKING</div>}
                                </div>

                                {/* Right Actions */}
                                <div className="w-16 sm:w-20 md:w-32 flex-shrink-0 flex flex-col gap-3 md:gap-5 items-center justify-center z-10">
                                    <DiscardPile count={deckState.discard.length} isDiscarding={discardMode || turnPhase === 'discard'} onClick={() => { if (turnPhase === 'player' && !autoPlay) { playSound('click'); setDiscardMode(!discardMode); }}} />
                                    <button 
                                        onClick={endTurn} 
                                        disabled={turnPhase !== 'player' || isTurnEnding.current || discardMode || autoPlay} 
                                        className={`pixel-button pixel-border w-full py-2 text-[6px] md:text-[8px] font-bold tracking-wider leading-tight text-white hover:bg-white hover:text-black ${turnPhase === 'player' && !isTurnEnding.current && !discardMode && !autoPlay ? (partyEnergy === 0 ? 'bg-[color:var(--pico-red)] btn-pulse' : 'bg-[color:var(--pico-orange)]') : 'bg-[color:var(--pico-darkGrey)]'}`}
                                    >
                                        END TURN
                                    </button>
                                </div>
                            </>
                        ) : renderClawControls()}
                    </div>
                </div>
            );
        };

        const InventoryView = ({ unlockedChars, unlockedCards, loadout, setLoadout, tokens, setView }) => {
            const toggleCardInDeck = (cardId) => {
                playSound('click');
                setLoadout(prev => {
                    const deck = [...prev.deck];
                    const idx = deck.indexOf(cardId);
                    if (idx > -1) {
                        if (deck.length <= 5) return prev; 
                        deck.splice(idx, 1);
                    } else {
                        deck.push(cardId);
                    }
                    return { ...prev, deck };
                });
            };

            const toggleCharInLoadout = (charId) => {
                playSound('click');
                setLoadout(prev => {
                    const chars = [...prev.chars];
                    const idx = chars.indexOf(charId);
                    if (idx > -1) {
                        if (chars.length <= 1) return prev; 
                        chars.splice(idx, 1);
                    } else {
                        if (chars.length >= 3) return prev; 
                        chars.push(charId);
                    }
                    return { ...prev, chars };
                });
            };

            return (
                <div className="h-full w-full flex flex-col relative bg-[#050814]">
                    <Header title="BARRACKS & ARMORY" tokens={tokens} onBack={() => setView('menu')} />
                    <div className="flex flex-col md:flex-row gap-6 md:gap-8 flex-grow min-h-0 w-full p-4 md:p-8">
                        
                        {/* Char Select */}
                        <div className="w-full md:w-1/3 bg-black pixel-border p-5 md:p-8 flex flex-col gap-4 overflow-y-auto custom-scrollbar flex-1 md:flex-none md:h-auto shadow-[8px_8px_0_#000]">
                            <h2 className="text-[color:var(--pico-yellow)] text-[10px] md:text-[14px] text-center border-b-[4px] border-[color:var(--pico-darkGrey)] pb-3 shrink-0 font-bold tracking-widest">HEROES (MAX 3)</h2>
                            <div className="flex flex-col gap-3 pt-2">
                                {unlockedChars.map(charId => {
                                    const char = ALL_CHARS[charId];
                                    const isActive = loadout.chars.includes(charId);
                                    return (
                                        <div key={charId} onClick={() => toggleCharInLoadout(charId)}
                                                className={`relative p-3 md:p-4 pixel-border cursor-pointer flex items-center gap-5 transition-all duration-200 pixel-button ${isActive ? 'bg-[#111] border-[color:var(--pico-green)]' : 'bg-black hover:bg-[#111]'}`}>
                                            {isActive && <div className="absolute top-3 right-3 text-[10px] md:text-[14px] text-[color:var(--pico-green)] drop-shadow-md">✓</div>}
                                            <div className="bg-[#111] p-2 pixel-border-sm shrink-0">
                                                <PixelArt art={SPRITES[char.spriteId]} scale={3} />
                                            </div>
                                            <div className="flex flex-col gap-2 text-[8px] md:text-[10px] font-bold tracking-wide">
                                                <span className={isActive ? "text-[color:var(--pico-green)] font-black tracking-widest" : "text-white"}>{char.name}</span>
                                                <span className="text-[color:var(--pico-red)]">HP: {char.maxHp}</span>
                                                <span className="text-[color:var(--pico-blue)]">ENERGY: {char.energy}</span>
                                            </div>
                                        </div>
                                    )
                                })}
                            </div>
                        </div>

                        {/* Deck Builder */}
                        <div className="w-full md:w-2/3 bg-black pixel-border p-5 md:p-8 flex flex-col gap-4 overflow-y-auto custom-scrollbar flex-1 md:flex-none md:h-auto shadow-[8px_8px_0_#000]">
                            <div className="flex flex-col gap-1 border-b-[4px] border-[color:var(--pico-darkGrey)] pb-3 shrink-0">
