<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Burger Chef 3D - AAA Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #111; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; touch-action: none; user-select: none; -webkit-user-select: none; }
        #game-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        .pointer-events-auto { pointer-events: auto; }
        
        /* AAA UI Styling */
        .glass-panel {
            background: rgba(20, 20, 25, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            border-radius: 24px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #ff4b2b, #ff416c);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 800;
        }
        .btn-primary:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255, 75, 43, 0.6);
        }
        .btn-primary:active { transform: scale(0.95); }

        .btn-serve {
            background: linear-gradient(135deg, #11998e, #38ef7d);
        }
        .btn-serve:hover {
            box-shadow: 0 0 20px rgba(56, 239, 125, 0.6);
        }

        .btn-trash {
            background: linear-gradient(135deg, #cb2d3e, #ef473a);
        }

        #crosshair {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 6px; height: 6px; background: rgba(255,255,255,0.5); border-radius: 50%;
            transition: all 0.1s; pointer-events: none; z-index: 20;
            box-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        /* Order icons */
        .ing-icon { width: 100%; max-width: 24px; border-radius: 3px; margin: 1px auto; box-shadow: 0 1px 2px rgba(0,0,0,0.5); }
        .bg-bun { background-color: #e89f58; height: 12px; }
        .bg-patty { background-color: #5e3312; height: 9px; }
        .bg-cheese { background-color: #ffaa00; height: 3px; }
        .bg-lettuce { background-color: #66cc00; height: 4px; }
        .bg-tomato { background-color: #ff3311; height: 6px; }

        #start-screen {
            background: radial-gradient(circle at center, #2a2a35 0%, #101014 100%);
        }
        
        .title-glow {
            text-shadow: 0 0 20px rgba(255, 75, 43, 0.8), 0 0 40px rgba(255, 65, 108, 0.4);
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        .animate-pulse-fast { animation: pulse 1s infinite; }

        @keyframes floatUp {
            0% { opacity: 1; transform: translate(-50%, 0) scale(0.5); }
            20% { opacity: 1; transform: translate(-50%, -20px) scale(1.2); }
            100% { opacity: 0; transform: translate(-50%, -120px) scale(1); }
        }
        .floating-text {
            position: absolute; left: 50%; top: 40%;
            pointer-events: none; z-index: 100;
            animation: floatUp 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-shadow: 0px 4px 15px rgba(0,0,0,1);
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <!-- Start Screen -->
    <div id="start-screen" class="absolute inset-0 z-50 flex flex-col items-center justify-center text-white px-4 text-center">
        <h1 class="text-5xl sm:text-7xl font-black italic tracking-tighter mb-2 title-glow">BURGER CHEF</h1>
        <p class="text-sm sm:text-xl text-gray-400 mb-8 sm:mb-12 tracking-widest">A CULINARY SIMULATION</p>
        <button id="start-btn" class="btn-primary px-8 py-3 sm:px-12 sm:py-4 rounded-full text-xl sm:text-2xl pointer-events-auto">Start Service</button>
    </div>

    <!-- Game UI -->
    <div id="ui-layer" class="hidden flex flex-col justify-between p-2 sm:p-4 pb-4">
        <!-- Top HUD -->
        <div class="flex justify-between items-start gap-2">
            <!-- Stats -->
            <div class="glass-panel p-2 sm:p-3 min-w-[100px] sm:min-w-[150px]">
                <div class="flex justify-between items-end border-b border-gray-600 pb-1 mb-1">
                    <span class="text-gray-400 font-bold text-[10px] sm:text-xs">SCORE</span>
                    <span id="score-display" class="text-lg sm:text-2xl font-black text-white leading-none">0</span>
                </div>
                <div class="flex justify-between items-end mb-1 border-b border-gray-600 pb-1">
                    <span class="text-gray-400 font-bold text-[10px] sm:text-xs">TIME</span>
                    <span id="time-display" class="text-base sm:text-xl font-black text-red-400 leading-none">60</span>
                </div>
                <div class="flex justify-between items-end">
                    <span class="text-gray-400 font-bold text-[10px] sm:text-xs">RUSH</span>
                    <span id="level-display" class="text-sm sm:text-lg font-black text-orange-400 leading-none">1</span>
                </div>
                <div id="combo-display" class="hidden mt-1 text-center text-sm sm:text-base font-black text-yellow-400 italic animate-pulse-fast">
                    2x COMBO!
                </div>
            </div>

            <!-- Current Order -->
            <div class="glass-panel p-2 sm:p-3 w-28 sm:w-48 flex flex-col items-center" id="order-panel" style="opacity: 0; transform: scale(0.8); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);">
                <div class="flex justify-between w-full items-center mb-1">
                    <span class="text-white font-black tracking-wider text-[9px] sm:text-xs">ORDER</span>
                    <button id="toggle-order-btn" class="pointer-events-auto text-gray-400 hover:text-white transition-colors p-0.5">
                        <svg id="toggle-icon" class="w-3 h-3 sm:w-4 sm:h-4 transform transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                    </button>
                </div>
                <span id="order-name" class="text-yellow-400 text-[9px] sm:text-xs font-bold mb-1 sm:mb-2 text-center leading-tight">-</span>
                
                <!-- Visual Order Representation -->
                <div id="order-visual-container" class="w-full transition-all duration-300 overflow-hidden" style="height: 100px; opacity: 1;">
                    <div id="order-visual" class="flex flex-col-reverse items-center justify-end h-full w-full bg-black/40 rounded-md sm:rounded-lg p-1 mb-1 shadow-inner">
                        <!-- Injected via JS -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Bottom Controls -->
        <div class="flex justify-center items-end gap-2 sm:gap-4 mb-1 sm:mb-2 pointer-events-none">
            <button id="btn-trash" class="pointer-events-auto btn-primary btn-trash px-3 py-2 sm:px-6 sm:py-3 rounded-lg sm:rounded-xl text-xs sm:text-base flex items-center gap-1">
                <svg class="w-3 h-3 sm:w-5 sm:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                <span class="hidden sm:inline">TRASH</span>
            </button>
            <button id="btn-serve" class="pointer-events-auto btn-primary btn-serve px-5 py-2 sm:px-8 sm:py-3 rounded-lg sm:rounded-xl text-sm sm:text-xl animate-pulse-fast shadow-lg flex items-center gap-1 sm:gap-2">
                SERVE <span class="hidden sm:inline">ORDER</span>
                <svg class="w-4 h-4 sm:w-6 sm:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
            </button>
        </div>
    </div>

    <!-- Game Over Screen -->
    <div id="game-over-screen" class="hidden absolute inset-0 z-50 bg-black/90 flex flex-col items-center justify-center text-white backdrop-blur-md px-4 text-center">
        <h2 class="text-4xl sm:text-6xl font-black text-red-500 mb-4">SHIFT OVER</h2>
        <div class="text-xl sm:text-3xl mb-2 flex gap-2 sm:gap-4 items-center">
            <span class="text-gray-400">FINAL SCORE:</span>
            <span id="final-score" class="font-black text-white text-3xl sm:text-4xl">0</span>
        </div>
        <div class="text-sm sm:text-xl mb-8 flex gap-2 sm:gap-4 text-orange-400 font-bold items-center">
            <span>MAX RUSH LEVEL:</span>
            <span id="final-level" class="text-2xl sm:text-3xl">1</span>
        </div>
        <button id="restart-btn" class="btn-primary px-8 py-3 sm:px-10 sm:py-4 rounded-full text-lg sm:text-xl pointer-events-auto">Play Again</button>
    </div>

    <div id="crosshair"></div>
    <div id="game-container"></div>

    <script>
        // --- GAME LOGIC & CONFIG ---
        const INGREDIENTS = {
            BUN:        { id: 'bun', name: 'Bun', height: 0.4, type: 'bun', css: 'bg-bun' },
            PATTY:      { id: 'patty', name: 'Beef Patty', height: 0.45, type: 'patty', css: 'bg-patty' },
            CHEESE:     { id: 'cheese', name: 'Cheese', height: 0.05, type: 'cheese', css: 'bg-cheese' },
            LETTUCE:    { id: 'lettuce', name: 'Lettuce', height: 0.25, type: 'lettuce', css: 'bg-lettuce' },
            TOMATO:     { id: 'tomato', name: 'Tomato', height: 0.15, type: 'tomato', css: 'bg-tomato' }
        };

        const RECIPES = [
            { name: "THE CLASSIC", stack: [INGREDIENTS.BUN, INGREDIENTS.PATTY, INGREDIENTS.BUN] },
            { name: "CHEESEBURGER", stack: [INGREDIENTS.BUN, INGREDIENTS.PATTY, INGREDIENTS.CHEESE, INGREDIENTS.BUN] },
            { name: "HEALTHY ONE", stack: [INGREDIENTS.BUN, INGREDIENTS.LETTUCE, INGREDIENTS.TOMATO, INGREDIENTS.BUN] },
            { name: "THE WORKS", stack: [INGREDIENTS.BUN, INGREDIENTS.PATTY, INGREDIENTS.CHEESE, INGREDIENTS.LETTUCE, INGREDIENTS.TOMATO, INGREDIENTS.BUN] },
            { name: "DOUBLE TROUBLE", stack: [INGREDIENTS.BUN, INGREDIENTS.PATTY, INGREDIENTS.CHEESE, INGREDIENTS.PATTY, INGREDIENTS.CHEESE, INGREDIENTS.BUN] },
            { name: "VEGGIE DELIGHT", stack: [INGREDIENTS.BUN, INGREDIENTS.LETTUCE, INGREDIENTS.TOMATO, INGREDIENTS.CHEESE, INGREDIENTS.BUN] },
            { name: "MEAT LOVER", stack: [INGREDIENTS.BUN, INGREDIENTS.PATTY, INGREDIENTS.PATTY, INGREDIENTS.PATTY, INGREDIENTS.BUN] },
            { name: "SALAD BURGER", stack: [INGREDIENTS.BUN, INGREDIENTS.PATTY, INGREDIENTS.LETTUCE, INGREDIENTS.TOMATO, INGREDIENTS.BUN] },
            { name: "TRIPLE CHEESE", stack: [INGREDIENTS.BUN, INGREDIENTS.PATTY, INGREDIENTS.CHEESE, INGREDIENTS.CHEESE, INGREDIENTS.CHEESE, INGREDIENTS.BUN] },
            { name: "THE TOWER", stack: [INGREDIENTS.BUN, INGREDIENTS.PATTY, INGREDIENTS.CHEESE, INGREDIENTS.PATTY, INGREDIENTS.CHEESE, INGREDIENTS.LETTUCE, INGREDIENTS.TOMATO, INGREDIENTS.BUN] },
            { name: "DOUBLE MEAT", stack: [INGREDIENTS.BUN, INGREDIENTS.PATTY, INGREDIENTS.PATTY, INGREDIENTS.BUN] },
            { name: "GREEN GIANT", stack: [INGREDIENTS.BUN, INGREDIENTS.LETTUCE, INGREDIENTS.LETTUCE, INGREDIENTS.LETTUCE, INGREDIENTS.TOMATO, INGREDIENTS.BUN] },
            { name: "CHEESE MOUNTAIN", stack: [INGREDIENTS.BUN, INGREDIENTS.CHEESE, INGREDIENTS.CHEESE, INGREDIENTS.CHEESE, INGREDIENTS.CHEESE, INGREDIENTS.BUN] },
            { name: "MONSTER MASH", stack: [INGREDIENTS.BUN, INGREDIENTS.PATTY, INGREDIENTS.CHEESE, INGREDIENTS.PATTY, INGREDIENTS.CHEESE, INGREDIENTS.PATTY, INGREDIENTS.CHEESE, INGREDIENTS.PATTY, INGREDIENTS.BUN] },
            { name: "GARDEN FRESH", stack: [INGREDIENTS.BUN, INGREDIENTS.LETTUCE, INGREDIENTS.TOMATO, INGREDIENTS.LETTUCE, INGREDIENTS.TOMATO, INGREDIENTS.BUN] },
            { name: "THE BIG MAC", stack: [INGREDIENTS.BUN, INGREDIENTS.PATTY, INGREDIENTS.LETTUCE, INGREDIENTS.CHEESE, INGREDIENTS.BUN, INGREDIENTS.PATTY, INGREDIENTS.LETTUCE, INGREDIENTS.BUN] },
            { name: "LETTUCE WRAP", stack: [INGREDIENTS.LETTUCE, INGREDIENTS.PATTY, INGREDIENTS.TOMATO, INGREDIENTS.LETTUCE] },
            { name: "LOW CARB KETO", stack: [INGREDIENTS.LETTUCE, INGREDIENTS.PATTY, INGREDIENTS.CHEESE, INGREDIENTS.PATTY, INGREDIENTS.CHEESE, INGREDIENTS.LETTUCE] }
        ];

        let gameState = {
            isRunning: false,
            isTransitioning: false,
            score: 0,
            timeLeft: 60,
            ordersServed: 0,
            currentOrder: null,
            plateStack: [], 
            currentHeight: 0, 
            timerTimeout: null, 
            customerDelay: 500, 
            combo: 1,
            lastOrderTime: 0
        };

        // --- THREE.JS SETUP ---
        let scene, camera, renderer;
        let raycaster, mouse;
        let spawners = []; 
        let plateBase;
        let tweens = [];
        let particles = [];
        let ambientDust = [];
        let currentCustomer = null;
        
        // AAA Camera Controls
        let shakeTime = 0;
        let shakeIntensity = 0;
        const isMobile = window.innerWidth < 768;
        const baseFov = isMobile ? 60 : 40; // Narrower FOV to zoom in more on ingredients
        let targetFov = baseFov;
        // Brought camera closer and slightly lower
        let baseCameraPos = new THREE.Vector3(0, 9, 13); 
        let cameraTarget = new THREE.Vector3(0, 2.5, 0); 

        // UI Elements
        const uiLayer = document.getElementById('ui-layer');
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const scoreDisplay = document.getElementById('score-display');
        const timeDisplay = document.getElementById('time-display');
        const levelDisplay = document.getElementById('level-display');
        const orderNameDisplay = document.getElementById('order-name');
        const orderVisual = document.getElementById('order-visual');
        const crosshair = document.getElementById('crosshair');

        // Sounds (Synthesized)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if (type === 'pop') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'thud') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.15);
                gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                osc.start(); osc.stop(audioCtx.currentTime + 0.15);
            } else if (type === 'success') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(440, audioCtx.currentTime);
                osc.frequency.setValueAtTime(554.37, audioCtx.currentTime + 0.1); // C#
                osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.2); // E
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.4);
                osc.start(); osc.stop(audioCtx.currentTime + 0.4);
            } else if (type === 'error') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.3);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            } else if (type === 'trash') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(100, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.2);
                osc.start(); osc.stop(audioCtx.currentTime + 0.2);
            } else if (type === 'bell') {
                const osc2 = audioCtx.createOscillator();
                osc.type = 'sine'; osc2.type = 'sine';
                osc.frequency.setValueAtTime(1046.50, audioCtx.currentTime); // C6
                osc2.frequency.setValueAtTime(1318.51, audioCtx.currentTime); // E6
                gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1.2);
                osc2.connect(gain);
                osc.start(); osc2.start();
                osc.stop(audioCtx.currentTime + 1.2); osc2.stop(audioCtx.currentTime + 1.2);
            }
        }

        // Custom Tween Manager
        function tweenObj(obj, props, duration, easing = 'linear', onComplete = null) {
            let startProps = {};
            for (let k in props) startProps[k] = obj[k];
            
            tweens.push({
                obj: obj,
                start: startProps,
                end: props,
                startTime: performance.now(),
                duration: duration,
                easing: easing,
                onComplete: onComplete
            });
        }

        function updateTweens(time) {
            for (let i = tweens.length - 1; i >= 0; i--) {
                let t = tweens[i];
                let elapsed = time - t.startTime;
                let progress = Math.min(elapsed / t.duration, 1);
                
                // Easing
                let easeProgress = progress;
                if (t.easing === 'outBack') {
                    const c1 = 1.70158;
                    const c3 = c1 + 1;
                    easeProgress = 1 + c3 * Math.pow(progress - 1, 3) + c1 * Math.pow(progress - 1, 2);
                } else if (t.easing === 'outQuad') {
                    easeProgress = progress * (2 - progress);
                } else if (t.easing === 'inQuad') {
                    easeProgress = progress * progress;
                }

                for (let k in t.end) {
                    t.obj[k] = t.start[k] + (t.end[k] - t.start[k]) * easeProgress;
                }

                // Parabolic arc for position tweens
                if (t.end.isJump) {
                    let jumpHeight = t.end.jumpHeight || 4;
                    let parabola = Math.sin(progress * Math.PI) * jumpHeight;
                    let endY = t.end.y !== undefined ? t.end.y : t.start.y;
                    t.obj.y = t.start.y + (endY - t.start.y) * progress + parabola;
                }

                if (progress === 1) {
                    if (t.onComplete) t.onComplete();
                    tweens.splice(i, 1);
                }
            }
        }

        function init() {
            // Scene & Camera
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a24);
            scene.fog = new THREE.FogExp2(0x1a1a24, 0.02);

            camera = new THREE.PerspectiveCamera(baseFov, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.copy(baseCameraPos);
            camera.lookAt(cameraTarget);

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.outputEncoding = THREE.sRGBEncoding;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.2; 
            document.getElementById('game-container').appendChild(renderer.domElement);

            // Lighting
            const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444455, 0.6);
            hemiLight.position.set(0, 10, 0);
            scene.add(hemiLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.7);
            dirLight.position.set(5, 10, 5);
            dirLight.castShadow = true;
            dirLight.shadow.bias = -0.002;
            dirLight.shadow.mapSize.width = 2048;
            dirLight.shadow.mapSize.height = 2048;
            dirLight.shadow.camera.near = 0.5;
            dirLight.shadow.camera.far = 25;
            dirLight.shadow.camera.left = -12;
            dirLight.shadow.camera.right = 12;
            dirLight.shadow.camera.top = 12;
            dirLight.shadow.camera.bottom = -12;
            scene.add(dirLight);

            const fillLight = new THREE.PointLight(0xffaa55, 0.4, 20);
            fillLight.position.set(-5, 5, 2);
            scene.add(fillLight);

            // Dramatic Spotlight over the cutting board
            const spotLight = new THREE.SpotLight(0xffeedd, 2.5);
            spotLight.position.set(0, 15, 2);
            spotLight.angle = Math.PI / 4;
            spotLight.penumbra = 0.8;
            spotLight.decay = 1.5;
            spotLight.distance = 25;
            spotLight.castShadow = true;
            spotLight.shadow.bias = -0.002; 
            spotLight.shadow.mapSize.width = 1024;
            spotLight.shadow.mapSize.height = 1024;
            scene.add(spotLight);

            // Generate AAA Environment Reflections
            generateEnvironmentMap();

            // Environment
            initTextures();
            createEnvironment();
            createSpawners();
            createAmbientDust();

            // Interaction setup
            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();

            window.addEventListener('resize', onWindowResize);
            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('mousedown', onMouseClick);
            window.addEventListener('touchstart', onTouchStart, {passive: false});
            
            // Keyboard Controls
            window.addEventListener('keydown', (event) => {
                if (event.code === 'Space') {
                    event.preventDefault(); 
                    if (gameState.isRunning && !gameState.isTransitioning) {
                        const serveBtn = document.getElementById('btn-serve');
                        serveBtn.style.transform = 'scale(0.95)';
                        setTimeout(() => serveBtn.style.transform = '', 100);
                        serveOrder();
                    }
                }
            });

            // UI Listeners
            document.getElementById('start-btn').addEventListener('click', startGame);
            document.getElementById('restart-btn').addEventListener('click', startGame);

        // --- CUSTOMER LOGIC ---
        function createCustomerMesh() {
            const group = new THREE.Group();
            
            const color = new THREE.Color().setHSL(Math.random(), 0.7, 0.5);
            const mat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.8 });
            
            const bodyHeight = 5 + Math.random() * 2;
            const bodyGeo = new THREE.CylinderGeometry(1.5, 1.5, bodyHeight, 16);
            const body = new THREE.Mesh(bodyGeo, mat);
            body.position.y = bodyHeight / 2 - 0.5; 
            body.castShadow = true;
            body.receiveShadow = true;
            group.add(body);
            
            const headGeo = new THREE.SphereGeometry(1.2, 16, 16);
            const headMat = new THREE.MeshStandardMaterial({ color: 0xffdbac, roughness: 0.5 });
            const head = new THREE.Mesh(headGeo, headMat);
            head.position.y = bodyHeight + 0.3;
            head.castShadow = true;
            head.receiveShadow = true;
            group.add(head);

            const eyeGeo = new THREE.SphereGeometry(0.2, 8, 8);
            const eyeMat = new THREE.MeshBasicMaterial({color: 0x111111});
            const eyeL = new THREE.Mesh(eyeGeo, eyeMat);
            eyeL.position.set(-0.4, bodyHeight + 0.4, 1.1);
            const eyeR = new THREE.Mesh(eyeGeo, eyeMat);
            eyeR.position.set(0.4, bodyHeight + 0.4, 1.1);
            group.add(eyeL);
            group.add(eyeR);

            if (Math.random() > 0.3) {
                const hatGeo = new THREE.CylinderGeometry(0.8, 1.2, 1.5, 16);
                const hatMat = new THREE.MeshStandardMaterial({ color: Math.random() > 0.5 ? 0xffffff : color, roughness: 0.9 });
                const hat = new THREE.Mesh(hatGeo, hatMat);
                hat.position.y = bodyHeight + 1.5;
                hat.castShadow = true;
                group.add(hat);
            }

            return group;
        }

        function nextCustomer() {
            const panel = document.getElementById('order-panel');
            panel.style.opacity = '0';
            panel.style.transform = 'scale(0.8)';
            
            setTimeout(() => {
                panel.classList.remove('ring-4', 'ring-green-400', 'bg-green-900/50', 'ring-red-500', 'bg-red-900/50');
                
                currentCustomer = createCustomerMesh();
                currentCustomer.position.set(0, -0.5, -20); 
                scene.add(currentCustomer);

                tweenObj(currentCustomer.position, { z: -8 }, 800, 'outQuad', () => {
                    gameState.isTransitioning = false; 
                    generateNewOrder();
                    panel.style.opacity = '1';
                    panel.style.transform = 'scale(1)';
                });
                
                tweenObj(currentCustomer.position, { isJump: true, jumpHeight: 1 }, 800);
                
            }, gameState.customerDelay); 
        }

        function dismissCustomer(isSuccess) {
            if (!currentCustomer) return;
            const c = currentCustomer;
            currentCustomer = null;
            
            if (isSuccess) {
                tweenObj(c.position, { isJump: true, jumpHeight: 1.5 }, 300);
                setTimeout(() => walkAway(c), 300);
            } else {
                tweenObj(c.rotation, { y: Math.PI / 4 }, 100, 'linear', () => {
                    tweenObj(c.rotation, { y: -Math.PI / 4 }, 100, 'linear', () => {
                         tweenObj(c.rotation, { y: 0 }, 100, 'linear', () => {
                             walkAway(c);
                         });
                    });
                });
            }
            
            function walkAway(mesh) {
                // Customer walks off to the right
                tweenObj(mesh.position, { x: 18, z: -4 }, 1500, 'inQuad', () => {
                    scene.remove(mesh);
                });
                tweenObj(mesh.position, { isJump: true, jumpHeight: 0.5 }, 1500);
            }
        }

            const pmremGenerator = new THREE.PMREMGenerator(renderer);
            pmremGenerator.compileEquirectangularShader();

            envScene.background = new THREE.Color(0x1a1a24);

        // --- PROCEDURAL TEXTURES ---
        const generatedTextures = {};
        const generatedBumpMaps = {};
        
        function drawNoise(ctx, width, height, intensity) {
            const imgData = ctx.getImageData(0,0,width,height);
            const data = imgData.data;
            for(let i=0; i<data.length; i+=4) {
                let val = (Math.random() - 0.5) * intensity;
                data[i] = Math.min(255, Math.max(0, data[i] + val));
                data[i+1] = Math.min(255, Math.max(0, data[i+1] + val));
                data[i+2] = Math.min(255, Math.max(0, data[i+2] + val));
            }
            ctx.putImageData(imgData, 0, 0);
        }

            for(let i=0; i<6; i++) {
                let cx = 256 + Math.cos(i*Math.PI*2/6)*130;
                let cy = 256 + Math.sin(i*Math.PI*2/6)*130;

            tCtx.fillStyle = '#ff6b52';
            tCtx.beginPath();

            generatedTextures.tomato = new THREE.CanvasTexture(tomatoCanvas);
            generatedBumpMaps.tomato = new THREE.CanvasTexture(tomatoBump);
        }

        // --- MESH GENERATORS (HYPER REALISTIC UPGRADES) ---
        function createIngredientMesh(ingredientData) {
            let mesh, geo, mat;
            mat = new THREE.MeshPhysicalMaterial({ 
                roughness: 0.8,
                metalness: 0.05
            });

            let rType = ingredientData.renderType || ingredientData.type;
            if (rType === 'bun') rType = 'top_bun';

            switch(rType) {
                case 'top_bun':
                    geo = new THREE.SphereGeometry(1.2, 64, 32); // Higher poly count
                    geo.scale(1, 0.4, 1); 
                    mat.color.setHex(0xffffff);
                    mat.map = generatedTextures.top_bun;
                    mat.bumpMap = generatedBumpMaps.top_bun;
                    mat.bumpScale = 0.05;
                    mat.roughness = 0.5; // Slightly glossier crust
                    break;
                case 'bottom_bun':
                    geo = new THREE.CylinderGeometry(1.2, 1.15, ingredientData.height, 64);
                    mat.color.setHex(0xffffff); 
                    mat.map = generatedTextures.bottom_bun;
                    mat.roughness = 0.85; 
                    break;
                case 'patty':
                    geo = new THREE.CylinderGeometry(1.15, 1.15, ingredientData.height, 64, 4);
                    // Advanced noise displacement for chunky ground beef look
                    const posP = geo.attributes.position;
                    for(let i=0; i<posP.count; i++) {
                        const x = posP.getX(i);
                        const y = posP.getY(i);
                        const z = posP.getZ(i);
                        const dist = Math.sqrt(x*x + z*z);
                        if (dist > 0.5) {
                            const noise = 1 + (Math.sin(x*15) * Math.cos(z*15)) * 0.03 + (Math.random()-0.5)*0.04;
                            posP.setX(i, x * noise);
                            posP.setZ(i, z * noise);
                        }
                    }
                    geo.computeVertexNormals();

                    mat.color.setHex(0xffffff); 
                    mat.map = generatedTextures.patty;
                    mat.bumpMap = generatedBumpMaps.patty;
                    mat.bumpScale = 0.1;
                    mat.roughness = 0.3; 
                    mat.clearcoat = 0.5; // High grease
                    mat.clearcoatRoughness = 0.3;
                    break;
                case 'cheese':
                    geo = new THREE.BoxGeometry(2.1, ingredientData.height, 2.1, 16, 1, 16);
                    const posC = geo.attributes.position;
                    for(let i=0; i<posC.count; i++) {
                        const x = posC.getX(i);
                        const z = posC.getZ(i);
                        const dist = Math.sqrt(x*x + z*z);
                        if (dist > 1.0) {
                            // Quadratic droop for realistic melting
                            let droop = Math.pow(dist - 1.0, 2) * 0.7; 
                            posC.setY(i, posC.getY(i) - droop);
                        }
                    }
                    geo.computeVertexNormals();
                    mat.color.setHex(0xffffff);
                    mat.map = generatedTextures.cheese;
                    mat.roughness = 0.1;
                    mat.transmission = 0.5; // Let light pass through melted corners
                    mat.thickness = 0.5;
                    mat.ior = 1.3;
                    break;
                case 'lettuce':
                    const lettuceGroup = new THREE.Group();
                    const leafGeo = new THREE.SphereGeometry(0.7, 24, 24); // High poly
                    const posL = leafGeo.attributes.position;
                    for(let i=0; i<posL.count; i++) {
                        const noise = 1 + (Math.random() - 0.5) * 0.3;
                        posL.setX(i, posL.getX(i) * noise);
                        posL.setY(i, posL.getY(i) * noise);
                        posL.setZ(i, posL.getZ(i) * noise);
                    }
                    leafGeo.computeVertexNormals();
                    
                    for(let i=0; i<8; i++) { // Less leaves but higher quality
                        let leafMat = mat.clone();
                        leafMat.color.setHex(0xffffff);
                        leafMat.map = generatedTextures.lettuce;
                        leafMat.bumpMap = generatedBumpMaps.lettuce;
                        leafMat.bumpScale = 0.05;
                        leafMat.roughness = 0.4;
                        leafMat.transmission = 0.4; // Subsurface scattering for leaves
                        leafMat.thickness = 0.1;
                        leafMat.side = THREE.DoubleSide; // Render both sides of thin leaf
                        
                        let leaf = new THREE.Mesh(leafGeo, leafMat);
                        leaf.scale.set(1.2, 0.08, 1.2); 
                        leaf.position.set((Math.random()-0.5)*1.2, (Math.random()-0.5)*0.1, (Math.random()-0.5)*1.2);
                        leaf.rotation.set((Math.random()-0.5)*0.6, Math.random()*Math.PI, (Math.random()-0.5)*0.6);
                        leaf.castShadow = true;
                        leaf.receiveShadow = true;
                        lettuceGroup.add(leaf);
                    }
                    lettuceGroup.userData = ingredientData;
                    return lettuceGroup;
                case 'tomato':
                    const tomatoGroup = new THREE.Group();
                    
                    const skinGeo = new THREE.CylinderGeometry(1.1, 1.1, ingredientData.height, 64);
                    const skinMat = mat.clone(); 
                    skinMat.color.setHex(0x991100); 
                    skinMat.roughness = 0.05; 
                    skinMat.clearcoat = 1.0; 
                    const skin = new THREE.Mesh(skinGeo, skinMat);
                    skin.castShadow = true;
                    skin.receiveShadow = true;
                    
                    const fleshGeo = new THREE.CylinderGeometry(1.0, 1.0, ingredientData.height + 0.01, 64);
                    const fleshMat = mat.clone(); 
                    fleshMat.color.setHex(0xffffff); 
                    fleshMat.map = generatedTextures.tomato;
                    fleshMat.bumpMap = generatedBumpMaps.tomato;
                    fleshMat.bumpScale = 0.05;
                    fleshMat.roughness = 0.1;
                    fleshMat.clearcoat = 1.0; // Wet interior
                    fleshMat.clearcoatRoughness = 0.1;
                    const flesh = new THREE.Mesh(fleshGeo, fleshMat);
                    flesh.receiveShadow = true;
                    
                    tomatoGroup.add(skin);
                    tomatoGroup.add(flesh);
                    tomatoGroup.userData = ingredientData;
                    return tomatoGroup;
            }

            mesh = new THREE.Mesh(geo, mat);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            mesh.userData = ingredientData;

            return mesh;
        }

        // --- ERGONOMIC HORSESHOE LAYOUT (Repositioned to avoid UI) ---
        function createSpawners() {
            const keys = Object.keys(INGREDIENTS);
            
            const arcRadiusX = isMobile ? 6.5 : 8.5; 
            const arcRadiusZ = isMobile ? 4.0 : 5.5;
            const centerZ = -1.0; // Pushed deeper into the scene
            
            const startAngle = Math.PI * 0.95;
            const endAngle = Math.PI * 0.05;
            const angleStep = (startAngle - endAngle) / (keys.length - 1);

            keys.forEach((key, index) => {
                const ing = INGREDIENTS[key];
                
                const angle = startAngle - (index * angleStep);
                const x = Math.cos(angle) * arcRadiusX;
                const z = -Math.sin(angle) * arcRadiusZ + centerZ;
                const y = 1.4; 

                const mesh = createIngredientMesh(ing);
                mesh.position.set(x, y, z);
                mesh.rotation.x = Math.PI * 0.2;

                const pedGeo = new THREE.CylinderGeometry(1.6, 1.8, 0.8, 32);
                const pedMat = new THREE.MeshStandardMaterial({ color: 0x778899, roughness: 0.1, metalness: 0.9 });
                const pedestal = new THREE.Mesh(pedGeo, pedMat);
                pedestal.position.set(x, 0.4, z);
                pedestal.receiveShadow = true;
                pedestal.castShadow = true;
                scene.add(pedestal);

                const baseGeo = new THREE.CylinderGeometry(1.4, 1.4, 0.02, 32);
                const baseMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.15 });
                const base = new THREE.Mesh(baseGeo, baseMat);
                base.position.set(x, 0.81, z); 
                scene.add(base);

                const hitGeo = new THREE.BoxGeometry(2.8, 4, 2.8);
                const hitMat = new THREE.MeshBasicMaterial({visible: false});
                const hitBox = new THREE.Mesh(hitGeo, hitMat);
                hitBox.position.set(x, y + 0.5, z);
                hitBox.userData = { isSpawner: true, ingredient: ing, visualMesh: mesh };
                
                scene.add(mesh);
                scene.add(hitBox);
                spawners.push(hitBox);

                tweenObj(mesh.position, { y: y + 0.3 }, 1500, 'easeInOutSine', () => bounceLoop2(mesh, y, y + 0.3));
            });
        }

        function bounceLoop2(mesh, low, high) {
            let targetY = mesh.position.y > (low + 0.1) ? low : high;
            tweenObj(mesh.position, { y: targetY }, 1500, 'easeInOutSine', () => bounceLoop2(mesh, low, high));
        }

        // --- INTERACTION ---
        function onMouseMove(event) {
            if(!gameState.isRunning || gameState.isTransitioning) return;
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(spawners);

            spawners.forEach(s => {
                s.userData.visualMesh.scale.set(1, 1, 1);
            });
            crosshair.style.transform = 'translate(-50%, -50%) scale(1)';
            crosshair.style.background = 'rgba(255,255,255,0.5)';

            if (intersects.length > 0) {
                const spawner = intersects[0].object;
                spawner.userData.visualMesh.scale.set(1.2, 1.2, 1.2);
                crosshair.style.transform = 'translate(-50%, -50%) scale(2)';
                crosshair.style.background = 'rgba(255, 75, 43, 0.8)';
                document.body.style.cursor = 'pointer';
            } else {
                document.body.style.cursor = 'default';
            }
        }

        function onTouchStart(event) {
            if(!gameState.isRunning || gameState.isTransitioning) return;
            if(event.touches.length > 0 && event.target.tagName !== 'BUTTON' && event.target.tagName !== 'svg' && event.target.tagName !== 'path') {
                mouse.x = (event.touches[0].clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(event.touches[0].clientY / window.innerHeight) * 2 + 1;
                handleClick();
            }
        }

        function onMouseClick(event) {
            if(!gameState.isRunning || gameState.isTransitioning) return;
            if(event.target.tagName === 'BUTTON' || event.target.closest('button')) return; 
            handleClick();
        }

        function handleClick() {
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(spawners);

            if (intersects.length > 0) {
                const spawner = intersects[0].object;
                spawnIngredientToPlate(spawner);
            }
        }

        function spawnImpactRing(pos, size) {
            const geo = new THREE.RingGeometry(size, size + 0.2, 32);
            const mat = new THREE.MeshBasicMaterial({color: 0xffffff, transparent: true, opacity: 0.8, side: THREE.DoubleSide});
            const ring = new THREE.Mesh(geo, mat);
            ring.position.copy(pos);
            ring.rotation.x = -Math.PI/2;
            scene.add(ring);
            tweenObj(ring.scale, {x: 2.5, y: 2.5, z: 2.5}, 400, 'outQuad');
            tweenObj(ring.material, {opacity: 0}, 400, 'outQuad', () => scene.remove(ring));
        }

        function spawnIngredientToPlate(spawner) {
            if(gameState.isTransitioning) return;

            let ingData = Object.assign({}, spawner.userData.ingredient);
            
            if (ingData.id === 'bun') {
                let placedBuns = gameState.plateStack.filter(m => m.userData.id === 'bun').length;
                let expectedBuns = gameState.currentOrder.stack.filter(i => i.id === 'bun').length;
                
                if (placedBuns < expectedBuns - 1) {
                    ingData.renderType = 'bottom_bun';
                    ingData.height = 0.3; 
                } else {
                    ingData.renderType = 'top_bun';
                    ingData.height = 0.4; 
                }
            }

            const newMesh = createIngredientMesh(ingData);
            newMesh.rotation.x = 0; 

            newMesh.position.copy(spawner.position);
            scene.add(newMesh);

            spawner.userData.visualMesh.scale.set(0.8, 0.8, 0.8);
            tweenObj(spawner.userData.visualMesh.scale, { x: 1, y: 1, z: 1 }, 300, 'outBack');

            let heightOffset = ingData.height / 2; 
            const targetY = plateBase.position.y + 0.08 + gameState.currentHeight + heightOffset;
            const targetPos = new THREE.Vector3(0, targetY, 0);

            const targetRotY = (Math.random() - 0.5) * 0.5;

            tweenObj(newMesh.position, { 
                x: targetPos.x, 
                y: targetPos.y, 
                z: targetPos.z, 
                isJump: true, 
                jumpHeight: 3.5 
            }, 400, 'linear', () => {
                playSound('thud');
                spawnImpactRing(newMesh.position, 1.5);
                triggerScreenShake(0.15); 
                
                newMesh.scale.set(1.2, 0.8, 1.2);
                tweenObj(newMesh.scale, { x: 1, y: 1, z: 1 }, 200, 'outBack');
                spawnDustParticles(targetPos);
            });

            tweenObj(newMesh.rotation, { y: targetRotY }, 400);

            gameState.plateStack.push(newMesh);
            gameState.currentHeight += ingData.height + 0.02; 
        }

        function clearPlate() {
            if(gameState.plateStack.length === 0 || gameState.isTransitioning) return;
            playSound('trash');
            
            gameState.plateStack.forEach((mesh, index) => {
                tweenObj(mesh.position, { 
                    x: -10, 
                    y: -5, 
                    z: 5,
                    isJump: true,
                    jumpHeight: 2
                }, 500 + index * 50, 'linear', () => {
                    scene.remove(mesh);
                });
                tweenObj(mesh.rotation, { x: Math.PI*2, z: Math.PI*2 }, 500);
            });

            gameState.plateStack = [];
            gameState.currentHeight = 0;
            triggerScreenShake(0.3);
        }

        // --- GAMEPLAY LOOP ---
        function startGame() {
            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');
            uiLayer.classList.remove('hidden');
            
            gameState.isRunning = true;
            gameState.isTransitioning = true; 
            gameState.score = 0;
            gameState.timeLeft = 60;
            gameState.ordersServed = 0;
            gameState.customerDelay = 500;
            gameState.combo = 1;
            gameState.lastOrderTime = performance.now();
            updateScoreUI();
            timeDisplay.innerText = gameState.timeLeft;
            
            levelDisplay.innerText = "1";
            document.getElementById('combo-display').classList.add('hidden');
            timeDisplay.classList.remove('animate-pulse-fast');
            timeDisplay.style.color = '#f87171';
            
            gameState.plateStack.forEach(mesh => scene.remove(mesh));
            gameState.plateStack = [];
            gameState.currentHeight = 0;
            
            if(currentCustomer) {
                scene.remove(currentCustomer);
                currentCustomer = null;
            }
            
            document.getElementById('order-panel').style.opacity = '0';
            nextCustomer();

            if(gameState.timerTimeout) clearTimeout(gameState.timerTimeout);
            
            function tickTimer() {
                if(!gameState.isRunning) return;
                
                gameState.timeLeft--;
                timeDisplay.innerText = gameState.timeLeft;
                
                if(gameState.timeLeft <= 10) {
                    timeDisplay.classList.add('animate-pulse-fast');
                    timeDisplay.style.color = '#ef473a'; 
                } else {
                    timeDisplay.classList.remove('animate-pulse-fast');
                    timeDisplay.style.color = '#f87171'; 
                }

                if(gameState.timeLeft <= 0) {
                    endGame();
                } else {
                    let delay = Math.max(250, 1000 - (gameState.ordersServed * 35));
                    gameState.timerTimeout = setTimeout(tickTimer, delay);
                }
            }
            
            gameState.timerTimeout = setTimeout(tickTimer, 1000);
        }

        function endGame() {
            gameState.isRunning = false;
            uiLayer.classList.add('hidden');
            gameOverScreen.classList.remove('hidden');
            document.getElementById('final-score').innerText = gameState.score;
            
            let finalLevel = Math.floor(gameState.ordersServed / 2) + 1;
            document.getElementById('final-level').innerText = finalLevel;
            
            if(gameState.timerTimeout) clearTimeout(gameState.timerTimeout);
        }

        function generateNewOrder() {
            playSound('bell'); 
            const randomRecipe = RECIPES[Math.floor(Math.random() * RECIPES.length)];
            gameState.currentOrder = randomRecipe;
            
            orderNameDisplay.innerText = randomRecipe.name;
            orderVisual.innerHTML = '';
            
            randomRecipe.stack.forEach(ing => {
                const div = document.createElement('div');
                div.className = `ing-icon ${ing.css} shadow-sm`;
                orderVisual.appendChild(div);
            });
        }

        function serveOrder() {
            if(!gameState.isRunning || gameState.plateStack.length === 0 || gameState.isTransitioning) return;

            gameState.isTransitioning = true;

            let isCorrect = true;
            const currentStackData = gameState.plateStack.map(mesh => mesh.userData);
            const targetStackData = gameState.currentOrder.stack;

            if (currentStackData.length !== targetStackData.length) {
                isCorrect = false;
            } else {
                for(let i=0; i<currentStackData.length; i++) {
                    if(currentStackData[i].id !== targetStackData[i].id) {
                        isCorrect = false;
                        break;
                    }
                }
            }

            if (isCorrect) {
                gameState.isFrozen = true; 
                setTimeout(() => { gameState.isFrozen = false; }, 80);
                playSound('success');
                
                let now = performance.now();
                if (now - gameState.lastOrderTime < 10000) { 
                    gameState.combo++;
                } else {
                    gameState.combo = 1;
                }
                gameState.lastOrderTime = now;

                gameState.ordersServed++;
                gameState.customerDelay = Math.max(0, gameState.customerDelay - 10); 
                
                let rushLevel = Math.floor(gameState.ordersServed / 2) + 1;
                levelDisplay.innerText = rushLevel;
                levelDisplay.style.transform = 'scale(1.5)';
                setTimeout(() => levelDisplay.style.transform = 'scale(1)', 200);

                let basePoints = (currentStackData.length * 10) + 50;
                let earnedPoints = basePoints * gameState.combo;
                gameState.score += earnedPoints;
                
                // +5 Time Bonus
                gameState.timeLeft += 5;
                timeDisplay.innerText = gameState.timeLeft;
                updateScoreUI();
                spawnConfetti();

                showFloatingText(`+${earnedPoints} PTS | +5s`, '#38ef7d');
                if(gameState.combo > 1) {
                    document.getElementById('combo-display').innerText = `${gameState.combo}x COMBO!`;
                    document.getElementById('combo-display').classList.remove('hidden');
                    setTimeout(() => showFloatingText(`${gameState.combo}x COMBO!`, '#ffaa00'), 200);
                }

                // AAA Camera Action - Quick Zoom (No pan)
                targetFov = baseFov - 15;
                setTimeout(() => { targetFov = baseFov; }, 600);

                const burgerGroup = new THREE.Group();
                gameState.plateStack.forEach(m => burgerGroup.add(m));
                scene.add(burgerGroup);

                // Burger flies to customer
                tweenObj(burgerGroup.position, { 
                    x: 0, y: 4.5, z: -7, isJump: true, jumpHeight: 3 
                }, 400, 'linear', () => {
                    // Attach built burger to customer model
                    if(currentCustomer) {
                        currentCustomer.add(burgerGroup);
                        burgerGroup.position.set(0, 5.0, 1.5); 
                    } else {
                        scene.remove(burgerGroup);
                    }
                    dismissCustomer(true);
                    nextCustomer();
                });

                document.getElementById('order-panel').classList.add('ring-4', 'ring-green-400', 'bg-green-900/50');

            } else {
                // Fail
                playSound('error');
                triggerScreenShake(0.8);
                
                gameState.ordersServed = 0;
                gameState.customerDelay = 500;
                gameState.combo = 1;
                document.getElementById('combo-display').classList.add('hidden');
                levelDisplay.innerText = "1";
                
                levelDisplay.style.transform = 'scale(1.5)';
                levelDisplay.style.color = '#ef473a'; 
                setTimeout(() => {
                    levelDisplay.style.transform = 'scale(1)';
                    levelDisplay.style.color = ''; 
                }, 400);

                gameState.score = Math.max(0, gameState.score - 20);
                
                // -10 Time Penalty
                gameState.timeLeft -= 10;
                if(gameState.timeLeft < 0) gameState.timeLeft = 0;
                timeDisplay.innerText = gameState.timeLeft;
                updateScoreUI();

                showFloatingText(`-20 PTS | -10s`, '#ef473a');
                
                gameState.plateStack.forEach(mesh => {
                    tweenObj(mesh.position, {
                        x: (Math.random() - 0.5) * 10,
                        y: 5 + Math.random() * 5,
                        z: (Math.random() - 0.5) * 10
                    }, 400, 'outQuad', () => { scene.remove(mesh); });
                    
                    tweenObj(mesh.rotation, {
                        x: Math.random() * Math.PI * 4,
                        z: Math.random() * Math.PI * 4
                    }, 400);
                });

                document.getElementById('order-panel').classList.add('ring-4', 'ring-red-500', 'bg-red-900/50');
                
                dismissCustomer(false);
                nextCustomer();
            }

            gameState.plateStack = [];
            gameState.currentHeight = 0;
        }

        function updateScoreUI() {
            scoreDisplay.innerText = gameState.score;
            scoreDisplay.style.transform = 'scale(1.5)';
            scoreDisplay.style.color = '#38ef7d';
            setTimeout(() => {
                scoreDisplay.style.transform = 'scale(1)';
                scoreDisplay.style.color = 'white';
            }, 200);
        }

        function showFloatingText(text, color) {
            const el = document.createElement('div');
            el.className = 'floating-text text-4xl sm:text-6xl font-black italic';
            el.style.color = color;
            el.innerText = text;
            document.body.appendChild(el);
            setTimeout(() => { if(el.parentNode) el.parentNode.removeChild(el); }, 1200);
        }

        // --- EFFECTS ---
        function triggerScreenShake(intensity) {
            shakeIntensity = intensity;
            shakeTime = 20; 
        }

        function applyCameraEffects() {
            if (Math.abs(camera.fov - targetFov) > 0.1) {
                camera.fov += (targetFov - camera.fov) * 0.1;
                camera.updateProjectionMatrix();
            }

            if (shakeTime > 0) {
                camera.position.x = baseCameraPos.x + (Math.random() - 0.5) * shakeIntensity;
                camera.position.y = baseCameraPos.y + (Math.random() - 0.5) * shakeIntensity;
                camera.position.z = baseCameraPos.z + (Math.random() - 0.5) * shakeIntensity;
                shakeTime--;
                shakeIntensity *= 0.9; 
            } else {
                const targetX = baseCameraPos.x + (mouse.x * 0.5);
                const targetY = baseCameraPos.y + (mouse.y * 0.5);
                camera.position.x += (targetX - camera.position.x) * 0.05;
                camera.position.y += (targetY - camera.position.y) * 0.05;
                camera.position.z = baseCameraPos.z;
            }
            camera.lookAt(cameraTarget);
        }

        function spawnDustParticles(pos) {
            const mat = new THREE.MeshBasicMaterial({color: 0xffffff, transparent: true, opacity: 0.6});
            const geo = new THREE.BoxGeometry(0.1, 0.1, 0.1);
            for(let i=0; i<5; i++){
                let p = new THREE.Mesh(geo, mat);
                p.position.copy(pos);
                p.position.y -= 0.1; 
                scene.add(p);
                particles.push({
                    mesh: p,
                    vel: new THREE.Vector3((Math.random()-0.5)*0.15, Math.random()*0.05, (Math.random()-0.5)*0.15),
                    life: 1.0
                });
            }
        }

        function createAmbientDust() {
            const dustGeo = new THREE.SphereGeometry(0.04, 4, 4);
            const dustMat = new THREE.MeshBasicMaterial({color: 0xffffff, transparent: true, opacity: 0.2});
            for(let i=0; i<50; i++) {
                let d = new THREE.Mesh(dustGeo, dustMat);
                d.position.set((Math.random()-0.5)*15, Math.random()*15, (Math.random()-0.5)*15);
                scene.add(d);
                ambientDust.push({
                    mesh: d,
                    speed: 0.01 + Math.random()*0.01,
                    swayOffset: Math.random() * Math.PI * 2
                });
            }
        }

        function spawnConfetti() {
            const colors = [0xff4b2b, 0xffcc00, 0x38ef7d, 0x00c6ff];
            const geo = new THREE.PlaneGeometry(0.2, 0.4);
            for(let i=0; i<50; i++){
                const mat = new THREE.MeshBasicMaterial({color: colors[Math.floor(Math.random()*colors.length)], side: THREE.DoubleSide});
                let p = new THREE.Mesh(geo, mat);
                p.position.set((Math.random()-0.5)*5, 8, (Math.random()-0.5)*5);
                p.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, 0);
                scene.add(p);
                particles.push({
                    mesh: p,
                    vel: new THREE.Vector3((Math.random()-0.5)*0.2, -Math.random()*0.1 - 0.05, (Math.random()-0.5)*0.2),
                    rotVel: new THREE.Vector3(Math.random()*0.2, Math.random()*0.2, Math.random()*0.2),
                    life: 3.0 
                });
            }
        }

        function updateParticles(time) {
            for(let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.mesh.position.add(p.vel);
                if(p.rotVel) {
                    p.mesh.rotation.x += p.rotVel.x;
                    p.mesh.rotation.y += p.rotVel.y;
                }
                p.life -= 0.02;
                if(p.mesh.material.opacity !== undefined) {
                    p.mesh.material.opacity = p.life;
                }
                if(p.life <= 0) {
                    scene.remove(p.mesh);
                    particles.splice(i, 1);
                }
            }

            ambientDust.forEach(d => {
                d.mesh.position.y += d.speed;
                d.mesh.position.x += Math.sin(time*0.001 + d.swayOffset)*0.01;
                if(d.mesh.position.y > 15) {
                    d.mesh.position.y = -2;
                    d.mesh.position.x = (Math.random()-0.5)*15;
                }
            });
        }

        // --- RENDER LOOP ---
        function onWindowResize() {
            const isMobile = window.innerWidth < 768;
            camera.aspect = window.innerWidth / window.innerHeight;
            targetFov = isMobile ? 60 : 40;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate(time) {
            requestAnimationFrame(animate);
            
            if (gameState.isFrozen) return;
            
            updateTweens(time);
            updateParticles(time);
            applyCameraEffects();

            if(plateBase) {
                plateBase.rotation.y += 0.002;
            }

            renderer.render(scene, camera);
        }

        // Boot
        window.onload = () => {
            init();
        };

    </script>
</body>
</html>
