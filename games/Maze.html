<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Isometric Horror Maze</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .pixelated-canvas {
      image-rendering: -moz-crisp-edges;
      image-rendering: -webkit-crisp-edges;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    @keyframes scanline {
      0% { transform: translateY(-100%); }
      100% { transform: translateY(100vh); }
    }
    @keyframes jumpscare-shake {
      0%, 100% { transform: translate(0, 0) scale(1.1); }
      25% { transform: translate(-30px, 20px) scale(1.1) rotate(-2deg); }
      50% { transform: translate(20px, -30px) scale(1.1) rotate(2deg); }
      75% { transform: translate(-20px, -20px) scale(1.1) rotate(-1deg); }
    }
    @keyframes jumpscare-flash {
      0%, 100% { filter: invert(0) brightness(1); }
      50% { filter: invert(1) brightness(2); }
    }
    /* Add a custom shake/flash class for JS toggling if needed */
    .animate-jumpscare-shake { animation: jumpscare-shake 0.2s ease-in-out infinite; }
    .animate-jumpscare-flash { animation: jumpscare-flash 0.1s infinite; }
  </style>
</head>
<body class="bg-black m-0 p-0 overflow-hidden">

  <div class="relative w-full h-screen bg-black overflow-hidden flex items-center justify-center font-mono text-white select-none">
    
    <!-- Game Canvas container - fixed aspect ratio, scaled up -->
    <div class="relative w-full h-full max-w-5xl aspect-video bg-black shadow-2xl">
      <canvas id="mainCanvas" width="640" height="360" class="w-full h-full block pixelated-canvas"></canvas>

      <!-- Scanlines Overlay for retro feel -->
      <div class="absolute inset-0 pointer-events-none opacity-20 bg-[linear-gradient(rgba(18,16,16,0)_50%,rgba(0,0,0,0.25)_50%),linear-gradient(90deg,rgba(255,0,0,0.06),rgba(0,255,0,0.02),rgba(0,0,255,0.06))] [background-size:100%_4px,3px_100%]"></div>
      
      <!-- CRT Flicker Overlay -->
      <div class="absolute inset-0 pointer-events-none animate-pulse bg-white mix-blend-overlay opacity-[0.02]"></div>

      <!-- UI Layer -->
      <div id="ui-layer" class="absolute inset-0 flex flex-col items-center justify-center p-4 text-center pointer-events-none">
        
        <!-- Menu -->
        <div id="menu-ui" class="bg-black/80 p-8 border border-red-900 rounded-sm pointer-events-auto shadow-[0_0_20px_rgba(255,0,0,0.2)]">
          <h1 class="text-4xl text-red-600 font-bold mb-4 tracking-widest uppercase [text-shadow:2px_2px_0px_#000,-1px_-1px_0px_#f00]">The Entity</h1>
          <p class="mb-6 text-gray-400 text-sm">Navigate the isometric maze. Find the yellow exit.<br/>Something is hunting you.</p>
          <p class="mb-8 text-xs text-gray-500">Controls: WASD or Arrow Keys</p>
          <button id="btn-start" class="px-6 py-2 bg-red-900 text-red-100 hover:bg-red-700 transition-colors uppercase font-bold tracking-wider">
            Enter Maze
          </button>
        </div>

        <!-- Jumpscare -->
        <div id="jumpscare-ui" class="fixed inset-0 z-50 flex items-center justify-center bg-black animate-jumpscare-shake hidden" style="display: none;">
          <div class="relative w-full h-full flex items-center justify-center animate-jumpscare-flash">
            <!-- Spooky Geometric Face -->
            <div class="relative w-64 h-64">
               <div class="absolute top-12 left-4 w-16 h-20 bg-red-600 rounded-full blur-[2px]"></div>
               <div class="absolute top-12 right-4 w-16 h-20 bg-red-600 rounded-full blur-[2px]"></div>
               <div class="absolute top-16 left-8 w-8 h-12 bg-white rounded-full animate-ping"></div>
               <div class="absolute top-16 right-8 w-8 h-12 bg-white rounded-full animate-ping"></div>
               <div class="absolute bottom-10 left-8 w-48 h-16 bg-white" style="clip-path: polygon(0% 50%, 10% 0%, 20% 50%, 30% 0%, 40% 50%, 50% 0%, 60% 50%, 70% 0%, 80% 50%, 90% 0%, 100% 50%, 90% 100%, 80% 50%, 70% 100%, 60% 50%, 50% 100%, 40% 50%, 30% 100%, 20% 50%, 10% 100%)"></div>
            </div>
          </div>
        </div>

        <!-- Dead -->
        <div id="dead-ui" class="bg-black/90 p-8 border border-red-600 rounded-sm pointer-events-auto hidden" style="display: none;">
          <h1 class="text-5xl text-red-600 font-bold mb-4 uppercase animate-pulse">You Were Found</h1>
          <button id="btn-retry" class="mt-6 px-6 py-2 bg-gray-800 text-white hover:bg-red-900 transition-colors uppercase">
            Try Again
          </button>
        </div>

        <!-- Won -->
        <div id="won-ui" class="bg-black/90 p-8 border border-green-600 rounded-sm pointer-events-auto hidden" style="display: none;">
          <h1 class="text-4xl text-green-500 font-bold mb-4 uppercase">You Escaped</h1>
          <button id="btn-next" class="mt-6 px-6 py-2 bg-gray-800 text-white hover:bg-green-900 transition-colors uppercase">
            Descend Deeper
          </button>
        </div>

      </div>
    </div>
  </div>

  <script>
    // --- Constants & Config ---
    const LOGICAL_WIDTH = 640;
    const LOGICAL_HEIGHT = 360;
    // 2:1 ratio for exact 26.57 degree isometric projection
    const TILE_W = 48; 
    const TILE_H = 24;
    const WALL_H = 40;
    const MAZE_SIZE = 21; // Must be odd
    const VISIBILITY_RADIUS = 5;
    const MONSTER_SPEED_MS = 400;

    // Palettes (Improved dark eerie theme)
    const COLORS = {
      bg: '#050508',
      floor: { light: '#1c2230', dark: '#141824' },
      wall: { top: '#2a3b4c', left: '#1b2633', right: '#0f161f' },
      wallDetail: '#000000',
      player: '#00ffff',
      monster: '#ff0055',
      exit: '#ffdd00'
    };

    // --- State Variables ---
    let gameState = 'menu'; // menu, playing, jumpscare, won, dead
    let maze = [];
    let player = { x: 1, y: 1 };
    let monster = { x: 19, y: 19 };
    
    let lastMonsterMove = 0;
    let keys = {};
    let animationFrameId = null;

    // Add floating particles for atmosphere
    let particles = Array.from({ length: 40 }, () => ({
      x: Math.random() * LOGICAL_WIDTH,
      y: Math.random() * LOGICAL_HEIGHT,
      speed: 0.2 + Math.random() * 0.5,
      size: Math.random() * 2 + 1
    }));

    // --- DOM Elements ---
    const mainCanvas = document.getElementById('mainCanvas');
    const mainCtx = mainCanvas.getContext('2d');
    const bufferCanvas = document.createElement('canvas');
    const ctx = bufferCanvas.getContext('2d');

    const menuUi = document.getElementById('menu-ui');
    const jumpscareUi = document.getElementById('jumpscare-ui');
    const deadUi = document.getElementById('dead-ui');
    const wonUi = document.getElementById('won-ui');

    // --- Maze Generator (Recursive Backtracker) ---
    const generateMaze = (width, height) => {
      const newMaze = Array(height).fill().map(() => Array(width).fill(1)); // 1 = wall, 0 = path
      
      const carve = (x, y) => {
        newMaze[y][x] = 0;
        const dirs = [[0, -2], [0, 2], [-2, 0], [2, 0]].sort(() => Math.random() - 0.5);
        
        for (let [dx, dy] of dirs) {
          const nx = x + dx, ny = y + dy;
          if (nx > 0 && nx < width - 1 && ny > 0 && ny < height - 1 && newMaze[ny][nx] === 1) {
            newMaze[y + dy / 2][x + dx / 2] = 0; // Carve through intermediate wall
            carve(nx, ny);
          }
        }
      };

      carve(1, 1);
      
      // Set exit at bottom right
      newMaze[height - 2][width - 2] = 2; // 2 = exit
      return newMaze;
    };

    // --- UI Management ---
    function updateUI() {
      menuUi.style.display = gameState === 'menu' ? 'block' : 'none';
      jumpscareUi.style.display = gameState === 'jumpscare' ? 'flex' : 'none';
      deadUi.style.display = gameState === 'dead' ? 'block' : 'none';
      wonUi.style.display = gameState === 'won' ? 'block' : 'none';
    }

    function setGameState(newState) {
      gameState = newState;
      updateUI();
    }

    // --- Initialization ---
    const initGame = () => {
      maze = generateMaze(MAZE_SIZE, MAZE_SIZE);
      player = { x: 1, y: 1 };
      // Spawn monster somewhat far away
      monster = { x: MAZE_SIZE - 2, y: MAZE_SIZE - 2 };
      setGameState('playing');
    };

    // Event Listeners for UI buttons
    document.getElementById('btn-start').addEventListener('click', initGame);
    document.getElementById('btn-retry').addEventListener('click', initGame);
    document.getElementById('btn-next').addEventListener('click', initGame);

    // Keyboard Input Handling
    window.addEventListener('keydown', (e) => {
      keys[e.key] = true;
      if (gameState === 'playing') handlePlayerMovement(e.key);
    });
    
    window.addEventListener('keyup', (e) => { 
      keys[e.key] = false; 
    });

    const handlePlayerMovement = (key) => {
      let { x, y } = player;
      
      // Isometric Movement Mapping (matching keys to visual screen directions)
      // Up arrow moves Up-Right in grid.
      if (key === 'ArrowUp' || key === 'w') y -= 1;
      if (key === 'ArrowDown' || key === 's') y += 1;
      if (key === 'ArrowLeft' || key === 'a') x -= 1;
      if (key === 'ArrowRight' || key === 'd') x += 1;

      // Collision Check
      if (maze[y] && maze[y][x] !== undefined && maze[y][x] !== 1) {
        player = { x, y };
        if (maze[y][x] === 2) {
          setGameState('won');
        }
      }
    };

    // --- Helpers ---
    const moveMonster = () => {
      let { x, y } = monster;
      const dx = player.x - x;
      const dy = player.y - y;
      
      // Simple pathing: try to close distance on major axis
      let possibleMoves = [
        { nx: x + Math.sign(dx), ny: y, valid: dx !== 0 },
        { nx: x, ny: y + Math.sign(dy), valid: dy !== 0 }
      ];

      // Shuffle to prevent getting stuck in alternating loops sometimes
      if (Math.random() > 0.5) possibleMoves.reverse();

      for (let move of possibleMoves) {
        if (move.valid && maze[move.ny] && maze[move.ny][move.nx] !== 1) {
          monster = { x: move.nx, y: move.ny };
          return;
        }
      }

      // If blocked, random valid move
      const dirs = [[0,1], [0,-1], [1,0], [-1,0]];
      const validDirs = dirs.filter(([vx, vy]) => maze[y+vy] && maze[y+vy][x+vx] !== 1);
      if (validDirs.length > 0) {
        const [vx, vy] = validDirs[Math.floor(Math.random() * validDirs.length)];
        monster = { x: x + vx, y: y + vy };
      }
    };

    const applyLighting = (hex, intensity) => {
      // Super basic multiply for hex colors to simulate darkness
      const r = parseInt(hex.slice(1, 3), 16) * intensity;
      const g = parseInt(hex.slice(3, 5), 16) * intensity;
      const b = parseInt(hex.slice(5, 7), 16) * intensity;
      return `rgb(${r},${g},${b})`;
    };

    const drawIsometricFloor = (ctx, x, y, light, isAlt) => {
      const color = isAlt ? COLORS.floor.light : COLORS.floor.dark;
      ctx.fillStyle = applyLighting(color, light);
      ctx.beginPath();
      ctx.moveTo(x, y); // Top
      ctx.lineTo(x + TILE_W / 2, y + TILE_H / 2); // Right
      ctx.lineTo(x, y + TILE_H); // Bottom
      ctx.lineTo(x - TILE_W / 2, y + TILE_H / 2); // Left
      ctx.closePath();
      ctx.fill();

      // Improved Art: Add inner tile details
      ctx.strokeStyle = applyLighting(COLORS.wallDetail, light * 0.4);
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(x, y + 4);
      ctx.lineTo(x + TILE_W / 2 - 4, y + TILE_H / 2);
      ctx.lineTo(x, y + TILE_H - 4);
      ctx.lineTo(x - TILE_W / 2 + 4, y + TILE_H / 2);
      ctx.closePath();
      ctx.stroke();
    };

    const drawIsometricCube = (ctx, x, y, light) => {
      const palette = COLORS.wall;
      
      // Top face
      ctx.fillStyle = applyLighting(palette.top, light);
      ctx.beginPath();
      ctx.moveTo(x, y - WALL_H);
      ctx.lineTo(x + TILE_W / 2, y + TILE_H / 2 - WALL_H);
      ctx.lineTo(x, y + TILE_H - WALL_H);
      ctx.lineTo(x - TILE_W / 2, y + TILE_H / 2 - WALL_H);
      ctx.closePath();
      ctx.fill();

      // Left face
      ctx.fillStyle = applyLighting(palette.left, light);
      ctx.beginPath();
      ctx.moveTo(x - TILE_W / 2, y + TILE_H / 2 - WALL_H);
      ctx.lineTo(x, y + TILE_H - WALL_H);
      ctx.lineTo(x, y + TILE_H);
      ctx.lineTo(x - TILE_W / 2, y + TILE_H / 2);
      ctx.closePath();
      ctx.fill();

      // Improved Art: Left face brick lines
      ctx.strokeStyle = applyLighting(COLORS.wallDetail, light * 0.6);
      ctx.beginPath();
      ctx.moveTo(x - TILE_W / 4, y + TILE_H / 2 - WALL_H + TILE_H / 4);
      ctx.lineTo(x - TILE_W / 4, y + TILE_H - WALL_H + TILE_H / 4);
      ctx.stroke();

      // Right face
      ctx.fillStyle = applyLighting(palette.right, light);
      ctx.beginPath();
      ctx.moveTo(x, y + TILE_H - WALL_H);
      ctx.lineTo(x + TILE_W / 2, y + TILE_H / 2 - WALL_H);
      ctx.lineTo(x + TILE_W / 2, y + TILE_H / 2);
      ctx.lineTo(x, y + TILE_H);
      ctx.closePath();
      ctx.fill();

      // Improved Art: Right face brick lines
      ctx.beginPath();
      ctx.moveTo(x + TILE_W / 4, y + TILE_H / 2 - WALL_H + TILE_H / 4);
      ctx.lineTo(x + TILE_W / 4, y + TILE_H - WALL_H + TILE_H / 4);
      ctx.stroke();
    };

    const drawEntity = (ctx, x, y, color, light, isExit=false) => {
      const h = isExit ? 10 : 22;
      
      // Improved Art: Outer glowing aura
      ctx.fillStyle = applyLighting(color, light * 0.4);
      ctx.beginPath();
      ctx.moveTo(x, y + TILE_H/2 - h);
      ctx.lineTo(x + TILE_W/3, y + TILE_H/2 - h/2);
      ctx.lineTo(x, y + TILE_H/2);
      ctx.lineTo(x - TILE_W/3, y + TILE_H/2 - h/2);
      ctx.closePath();
      ctx.fill();

      // Improved Art: Solid inner core
      ctx.fillStyle = applyLighting(isExit ? '#ffffff' : color, light);
      ctx.beginPath();
      ctx.moveTo(x, y + TILE_H/2 - h + 4);
      ctx.lineTo(x + TILE_W/5, y + TILE_H/2 - h/2);
      ctx.lineTo(x, y + TILE_H/2 - 4);
      ctx.lineTo(x - TILE_W/5, y + TILE_H/2 - h/2);
      ctx.closePath();
      ctx.fill();
    };

    // --- Main Rendering Loop ---
    const render = (time) => {
      animationFrameId = requestAnimationFrame(render);

      if (gameState !== 'playing') return;

      bufferCanvas.width = LOGICAL_WIDTH;
      bufferCanvas.height = LOGICAL_HEIGHT;
      ctx.imageSmoothingEnabled = false; // Pixel art look
      mainCtx.imageSmoothingEnabled = false;

      // --- Monster AI ---
      if (time - lastMonsterMove > MONSTER_SPEED_MS) {
        moveMonster();
        lastMonsterMove = time;
      }

      // Check Death & Trigger Jumpscare
      if (player.x === monster.x && player.y === monster.y) {
        if (gameState !== 'jumpscare') {
          setGameState('jumpscare');
          setTimeout(() => setGameState('dead'), 1000); // 1 second jumpscare duration
        }
        return;
      }

      // --- Rendering Logic ---
      ctx.fillStyle = COLORS.bg;
      ctx.fillRect(0, 0, LOGICAL_WIDTH, LOGICAL_HEIGHT);

      // Camera Offset (Keep player centered)
      const basePlayerScreenX = (player.x - player.y) * TILE_W / 2;
      const basePlayerScreenY = (player.x + player.y) * TILE_H / 2;
      const offsetX = LOGICAL_WIDTH / 2 - basePlayerScreenX;
      const offsetY = LOGICAL_HEIGHT / 2 - basePlayerScreenY;

      // Dynamic light flicker
      const currentFlicker = 0.95 + Math.random() * 0.1;

      // Painter's Algorithm: Draw from back to front
      for (let y = 0; y < MAZE_SIZE; y++) {
        for (let x = 0; x < MAZE_SIZE; x++) {
          const isWall = maze[y][x] === 1;
          const isExit = maze[y][x] === 2;
          
          // Calculate screen coordinates
          const sx = (x - y) * TILE_W / 2 + offsetX;
          const sy = (x + y) * TILE_H / 2 + offsetY;

          // Lighting distance
          const distToPlayer = Math.sqrt(Math.pow(x - player.x, 2) + Math.pow(y - player.y, 2));
          if (distToPlayer > VISIBILITY_RADIUS) continue; // Culling
          
          const lightIntensity = Math.max(0, 1 - (distToPlayer / (VISIBILITY_RADIUS * currentFlicker)));
          
          if (isWall) {
            drawIsometricCube(ctx, sx, sy, lightIntensity);
          } else {
            drawIsometricFloor(ctx, sx, sy, lightIntensity, (x + y) % 2 === 0);
          }

          // Draw Entities if they are on this tile
          if (x === player.x && y === player.y) {
            drawEntity(ctx, sx, sy, COLORS.player, 1.0);
          }
          if (x === monster.x && y === monster.y && distToPlayer <= VISIBILITY_RADIUS) {
            drawEntity(ctx, sx, sy, COLORS.monster, lightIntensity + 0.2); // Monster glows slightly
          }
          if (isExit) {
             drawEntity(ctx, sx, sy, COLORS.exit, lightIntensity, true);
          }
        }
      }

      // Draw particles (Fog/Dust)
      ctx.fillStyle = applyLighting('#ffffff', 0.15);
      particles.forEach(p => {
        p.y -= p.speed;
        if (p.y < 0) p.y = LOGICAL_HEIGHT;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
      });

      // Darkness overlay/vignette
      const gradient = ctx.createRadialGradient(
        LOGICAL_WIDTH/2, LOGICAL_HEIGHT/2 - TILE_H/2, 10, 
        LOGICAL_WIDTH/2, LOGICAL_HEIGHT/2 - TILE_H/2, LOGICAL_WIDTH/2.5
      );
      gradient.addColorStop(0, 'rgba(0,0,0,0)');
      gradient.addColorStop(0.8, 'rgba(0,0,0,0.8)');
      gradient.addColorStop(1, 'rgba(0,0,0,1)');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, LOGICAL_WIDTH, LOGICAL_HEIGHT);

      // Draw Buffer to Main Canvas (Scaling up)
      mainCtx.clearRect(0, 0, mainCanvas.width, mainCanvas.height);
      mainCtx.drawImage(bufferCanvas, 0, 0, mainCanvas.width, mainCanvas.height);
    };

    // Start rendering loop once loaded
    window.onload = () => {
      updateUI();
      animationFrameId = requestAnimationFrame(render);
    };
  </script>
</body>
</html>
